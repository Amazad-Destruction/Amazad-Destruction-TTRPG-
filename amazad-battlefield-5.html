<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>أرض المعركة — أمازاد</title>
  <meta name="theme-color" content="#060810">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="أرض المعركة">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700;900&display=swap');

    :root {
      --bg:       #060810;
      --bg2:      #0a0e1a;
      --bg3:      #0e1220;
      --border:   #1a2035;
      --border2:  #232840;
      --accent:   #7c3aed;
      --accent2:  #a855f7;
      --red:      #ef4444;
      --gold:     #f59e0b;
      --blue:     #3b82f6;
      --green:    #22c55e;
      --text:     #e2e8f0;
      --muted:    #6b7280;
      --muted2:   #374151;
      --grid-clr: rgba(200,30,30,0.55);
      --grid-clr2:rgba(180,10,10,0.25);
    }

    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Cairo',sans-serif;direction:rtl;}
    #app{display:flex;flex-direction:column;height:100vh;width:100vw;overflow:hidden;}

    /* ═══ HEADER ═══ */
    .header{
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 14px;background:var(--bg2);
      border-bottom:1px solid var(--border);
      min-height:52px;z-index:100;flex-shrink:0;
    }
    .header-title{font-size:15px;font-weight:900;color:var(--accent2);letter-spacing:.05em;}
    .header-sub{font-size:10px;color:var(--muted);margin-top:1px;}
    .header-btn{
      display:flex;align-items:center;gap:6px;padding:7px 14px;
      background:var(--bg3);border:1px solid var(--border2);border-radius:10px;
      color:var(--text);font-size:12px;font-weight:700;cursor:pointer;
      font-family:'Cairo',sans-serif;white-space:nowrap;transition:border-color .2s,background .2s;
    }
    .header-btn:hover{border-color:var(--accent);background:#12172a;}
    .header-btn.danger{border-color:#ef444455;color:#ef4444;}
    .header-btn.danger:hover{border-color:#ef4444;background:#1a0808;}

    /* ═══ TOOLBAR ═══ */
    .toolbar{
      display:flex;align-items:center;gap:8px;padding:8px 14px;
      background:var(--bg2);border-bottom:1px solid var(--border);
      overflow-x:auto;flex-shrink:0;
    }
    .toolbar::-webkit-scrollbar{height:0;}
    .tool-btn{
      display:flex;align-items:center;gap:5px;padding:6px 12px;
      background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
      color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;
      font-family:'Cairo',sans-serif;white-space:nowrap;transition:all .2s;flex-shrink:0;
    }
    .tool-btn:hover{border-color:var(--accent);color:var(--text);}
    .tool-btn.active{border-color:var(--accent);color:var(--accent2);background:#12102a;}
    .tool-divider{width:1px;height:24px;background:var(--border2);flex-shrink:0;}

    /* ═══ BATTLEFIELD WRAPPER ═══ */
    #bf-wrap{
      flex:1;overflow:hidden;position:relative;background:var(--bg);
      cursor:grab;
      -webkit-user-select:none;user-select:none;
    }
    #bf-wrap.panning{cursor:grabbing;}

    /* ═══ CANVAS AREA ═══ */
    #bf-canvas{
      position:absolute;top:0;left:0;
      transform-origin:0 0;
      will-change:transform;
    }

    /* MAP IMAGE + GRID OVERLAY */
    #grid-svg{
      position:absolute;top:0;left:0;
      pointer-events:none;overflow:visible;
      z-index:2;
    }
    #map-img{
      position:absolute;top:0;left:0;
      z-index:1;
      display:block;
      image-rendering:crisp-edges;
    }

    /* ═══ TOKENS ═══ */
    .token{
      position:absolute;
      transform:translate(-50%,-50%);
      cursor:pointer;
      display:flex;flex-direction:column;align-items:center;gap:2px;
      z-index:10;
      -webkit-user-select:none;user-select:none;
      transition:filter .15s;
    }
    .token:hover{filter:drop-shadow(0 0 8px var(--accent));}
    .token.selected{filter:drop-shadow(0 0 10px #a855f7) drop-shadow(0 0 18px #7c3aed88);}

    .token-avatar{
      border-radius:50%;border:2px solid #7c3aed;
      object-fit:cover;background:#1a2035;
      display:flex;align-items:center;justify-content:center;
      font-size:18px;overflow:hidden;flex-shrink:0;
      box-shadow:0 2px 12px #00000088;
    }
    .token-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
    .token-avatar.no-img{font-size:inherit;}

    .token-bars{
      display:flex;flex-direction:column;gap:1px;
      background:#00000099;border-radius:4px;padding:2px 4px;
      backdrop-filter:blur(4px);
      transition:transform .05s;
    }
    .token-bar-row{display:flex;align-items:center;gap:3px;font-size:9px;font-weight:700;font-family:'Cairo',sans-serif;}
    .token-bar-track{width:40px;height:4px;background:#1a2035;border-radius:2px;overflow:hidden;flex-shrink:0;}
    .token-bar-fill{height:100%;border-radius:2px;transition:width .3s;}

    .token-name{
      font-size:9px;font-weight:700;color:var(--text);
      background:#00000099;border-radius:3px;padding:1px 5px;
      white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis;
      text-align:center;backdrop-filter:blur(4px);
      transition:transform .05s;
    }

    /* ═══ EMPTY STATE ═══ */
    #empty-bf{
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:16px;
      pointer-events:none;
    }
    .empty-icon{font-size:64px;opacity:.15;}
    .empty-text{font-size:13px;color:var(--muted);font-weight:600;text-align:center;opacity:.6;}

    /* ═══ MODALS ═══ */
    .modal-bg{
      position:fixed;inset:0;background:#00000099;backdrop-filter:blur(4px);
      display:flex;align-items:flex-end;justify-content:center;
      z-index:1000;animation:fadeIn .2s ease;
    }
    .modal-bg.center{align-items:center;}
    .modal{
      background:var(--bg2);border:1px solid var(--border2);
      border-radius:20px 20px 0 0;width:100%;max-width:480px;
      max-height:90vh;overflow-y:auto;padding:20px 16px 32px;
      animation:slideUp .25s cubic-bezier(.22,1,.36,1);
    }
    .modal.center{border-radius:16px;margin:16px;}
    .modal::-webkit-scrollbar{width:0;}
    .modal-title{font-size:16px;font-weight:900;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
    .modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;display:block;}

    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}

    /* ═══ FORM ELEMENTS ═══ */
    .form-label{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:5px;letter-spacing:.05em;}
    .form-group{margin-bottom:14px;}
    .form-input{
      width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;
      color:var(--text);font-size:13px;padding:10px 12px;outline:none;
      font-family:'Cairo',sans-serif;direction:rtl;transition:border-color .2s;
    }
    .form-input:focus{border-color:var(--accent);}
    .form-row{display:flex;gap:8px;}
    .form-row .form-group{flex:1;}

    /* ═══ BUTTONS ═══ */
    .btn{
      padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;
      cursor:pointer;font-family:'Cairo',sans-serif;border:none;transition:all .2s;
    }
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-primary:hover{background:#6d28d9;}
    .btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted);}
    .btn-ghost:hover{border-color:var(--border);color:var(--text);}
    .btn-red{background:#ef444422;border:1px solid #ef444455;color:#ef4444;}
    .btn-red:hover{background:#ef444433;}
    .btn-row{display:flex;gap:8px;margin-top:16px;}

    /* ═══ NPC PICKER ═══ */
    .npc-pick-item{
      display:flex;align-items:center;gap:10px;
      padding:10px 12px;background:var(--bg3);border:1px solid var(--border);
      border-radius:10px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;
    }
    .npc-pick-item:hover{border-color:var(--accent);}
    .npc-pick-avatar{
      width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border2);
      background:var(--bg2);display:flex;align-items:center;justify-content:center;
      font-size:16px;overflow:hidden;flex-shrink:0;
    }
    .npc-pick-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
    .npc-pick-info{}
    .npc-pick-name{font-size:13px;font-weight:700;color:var(--text);}
    .npc-pick-sub{font-size:10px;color:var(--muted);}

    /* ═══ BATTLE POPUP (multi, draggable) ═══ */
    .battle-popup{
      position:fixed;z-index:500;
      background:var(--bg2);border:1px solid var(--border2);border-radius:16px;
      padding:14px;width:270px;
      box-shadow:0 8px 32px #000000cc;
      animation:fadeIn .15s ease;
      touch-action:none;
    }
    .bp-drag-bar{
      cursor:grab;height:22px;display:flex;align-items:center;justify-content:center;
      margin:-4px -4px 8px;border-radius:12px 12px 0 0;background:#ffffff08;
    }
    .bp-drag-bar:active{cursor:grabbing;}
    .bp-drag-handle{width:34px;height:4px;background:var(--border2);border-radius:2px;}
    .bp-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
    .bp-avatar{
      width:44px;height:44px;border-radius:50%;border:2px solid var(--accent);
      overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;
      font-size:20px;flex-shrink:0;
    }
    .bp-avatar img{width:100%;height:100%;object-fit:cover;}
    .bp-name{font-size:14px;font-weight:900;color:var(--text);}
    .bp-sub{font-size:10px;color:var(--muted);}
    .bp-stat-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .bp-stat-label{font-size:10px;color:var(--muted);width:40px;font-weight:700;}
    .bp-bar-wrap{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;cursor:pointer;}
    .bp-bar{height:100%;border-radius:4px;transition:width .3s;}
    .bp-val{font-size:11px;color:var(--text);font-weight:700;min-width:50px;text-align:left;}
    .bp-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
    .bp-action-btn{
      padding:5px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;
      color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;
      font-family:'Cairo',sans-serif;transition:all .15s;
    }
    .bp-action-btn:hover{border-color:var(--accent);color:var(--accent2);}
    .bp-close{
      position:absolute;top:10px;left:10px;background:transparent;border:none;
      color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:0 4px;
    }
    .bp-close:hover{color:var(--red);}

    /* Techniques panel inside popup */
    .bp-tech-list{
      max-height:140px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;
      margin-top:6px;
    }
    .bp-tech-item{
      background:var(--bg3);border:1px solid var(--border);border-radius:8px;
      padding:7px 10px;cursor:pointer;transition:border-color .15s;
    }
    .bp-tech-item:hover{border-color:var(--accent);}
    .bp-tech-name{font-size:11px;font-weight:700;color:var(--text);}
    .bp-tech-sub{font-size:9px;color:var(--muted);margin-top:2px;}
    .bp-tech-desc{font-size:10px;color:var(--muted);margin-top:5px;line-height:1.5;display:none;}
    .bp-tech-item.open .bp-tech-desc{display:block;}

    /* profile link btn */
    .bp-profile-link{
      width:100%;padding:6px;background:transparent;
      border:1px solid var(--border2);border-radius:8px;
      color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;
      font-family:'Cairo',sans-serif;margin-top:8px;transition:all .15s;
      text-align:center;
    }
    .bp-profile-link:hover{border-color:var(--accent2);color:var(--accent2);}

    /* ═══ MAP SETUP ═══ */
    .map-upload-zone{
      border:2px dashed var(--border2);border-radius:12px;padding:24px;
      text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:14px;
      background:var(--bg3);
    }
    .map-upload-zone:hover,.map-upload-zone.drag{border-color:var(--accent);}
    .map-upload-zone-icon{font-size:32px;margin-bottom:8px;}
    .map-upload-zone-text{font-size:12px;color:var(--muted);}

    /* ═══ GRID SIZE CONTROLS ═══ */
    .grid-control{
      display:flex;align-items:center;gap:8px;background:var(--bg3);
      border:1px solid var(--border2);border-radius:10px;padding:8px 12px;
      margin-bottom:10px;
    }
    .grid-control label{font-size:11px;color:var(--muted);font-weight:700;flex:1;}
    .grid-control input[type=range]{
      flex:2;-webkit-appearance:none;height:4px;border-radius:2px;
      background:var(--border2);outline:none;cursor:pointer;
    }
    .grid-control input[type=range]::-webkit-slider-thumb{
      -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
      background:var(--accent);cursor:pointer;
    }
    .grid-control .val{font-size:12px;color:var(--text);font-weight:700;min-width:40px;text-align:center;}

    /* ═══ STAT EDIT POPUP ═══ */
    .se-row{
      display:flex;align-items:center;gap:8px;margin-bottom:8px;
    }
    .se-label{font-size:11px;color:var(--muted);width:55px;font-weight:700;}
    .se-input-wrap{display:flex;align-items:center;gap:4px;flex:1;}
    .se-btn{
      width:28px;height:28px;background:var(--bg3);border:1px solid var(--border2);
      border-radius:6px;color:var(--text);font-size:14px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;
    }
    .se-btn:hover{border-color:var(--accent);}
    .se-val{
      flex:1;text-align:center;font-size:13px;font-weight:700;color:var(--text);
      background:var(--bg3);border:1px solid var(--border2);border-radius:6px;
      padding:4px 0;
    }
    .se-max{font-size:10px;color:var(--muted);}

    /* ═══ ZOOM CONTROLS ═══ */
    .zoom-controls{
      position:absolute;bottom:20px;left:14px;
      display:flex;flex-direction:column;gap:6px;z-index:50;
    }
    .zoom-btn{
      width:36px;height:36px;background:var(--bg2);border:1px solid var(--border2);
      border-radius:9px;color:var(--text);font-size:16px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-weight:700;
      backdrop-filter:blur(8px);transition:border-color .15s;
    }
    .zoom-btn:hover{border-color:var(--accent);}

    /* ═══ IMAGE UPLOAD IN PROFILE ═══ */
    .img-upload-circle{
      width:80px;height:80px;border-radius:50%;border:2px dashed var(--border2);
      background:var(--bg3);display:flex;align-items:center;justify-content:center;
      cursor:pointer;margin:0 auto 12px;overflow:hidden;transition:border-color .2s;
      font-size:28px;
    }
    .img-upload-circle:hover{border-color:var(--accent);}
    .img-upload-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

    /* ═══ TOAST ═══ */
    .toast{
      position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      background:#1a2035;border:1px solid var(--border2);border-radius:10px;
      padding:8px 18px;font-size:12px;color:var(--text);font-weight:700;
      z-index:2000;animation:fadeIn .2s ease;
      backdrop-filter:blur(8px);white-space:nowrap;
    }

    /* ═══ COORD DISPLAY ═══ */
    .coord-display{
      position:absolute;bottom:20px;right:14px;
      background:#00000088;border:1px solid var(--border2);border-radius:8px;
      padding:4px 10px;font-size:10px;color:var(--muted);
      backdrop-filter:blur(8px);z-index:50;font-family:monospace;
    }

    /* ═══ SCROLLBAR ═══ */
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:var(--bg2);}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

    /* ═══ SECTION DIVIDER ═══ */
    .sec-div{height:1px;background:var(--border);margin:12px 0;}

    /* ═══ IMAGE CROP OVERLAY ═══ */
    .crop-modal-inner{display:flex;flex-direction:column;align-items:center;gap:12px;}
    .crop-canvas-wrap{
      position:relative;width:220px;height:220px;border-radius:50%;overflow:hidden;
      border:2px solid var(--accent);cursor:move;flex-shrink:0;background:#000;
    }
    .crop-img{position:absolute;transform-origin:center center;}
    .crop-controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}

    /* ═══ ATTACK RANGE OVERLAY ═══ */
    .atk-range-circle{
      position:absolute;
      border-radius:50%;
      pointer-events:none;
      z-index:8;
      transform:translate(-50%,-50%);
      border:2px dashed rgba(255,80,80,0.85);
      background:rgba(255,30,30,0.08);
      box-shadow:0 0 12px rgba(255,50,50,0.4), inset 0 0 12px rgba(255,50,50,0.08);
      animation:atkPulse 1.6s ease-in-out infinite;
    }
    @keyframes atkPulse{
      0%,100%{box-shadow:0 0 12px rgba(255,50,50,0.4),inset 0 0 12px rgba(255,50,50,0.08);}
      50%{box-shadow:0 0 24px rgba(255,80,80,0.7),inset 0 0 20px rgba(255,50,50,0.15);}
    }
    .atk-range-label{
      position:absolute;
      transform:translate(-50%,-50%);
      background:rgba(20,5,5,0.88);border:1px solid rgba(255,80,80,0.6);
      border-radius:6px;padding:2px 8px;font-size:9px;font-weight:700;
      color:#ff8080;z-index:9;pointer-events:none;white-space:nowrap;
    }
    .atk-target-indicator{
      position:absolute;pointer-events:none;z-index:11;
      transform:translate(-50%,-50%);
      width:20px;height:20px;border-radius:50%;
      border:2.5px solid #ff4444;
      animation:targetBlink .5s ease-in-out infinite alternate;
    }
    @keyframes targetBlink{from{opacity:1;transform:translate(-50%,-50%) scale(1);}to{opacity:.5;transform:translate(-50%,-50%) scale(1.18);}}

    /* ═══ DAMAGE CALCULATOR POPUP ═══ */
    .dmg-popup{
      position:fixed;z-index:600;
      background:var(--bg2);border:1px solid #ef444455;border-radius:16px;
      padding:14px;width:310px;
      box-shadow:0 8px 32px #000000cc, 0 0 0 1px #ef444422;
      animation:fadeIn .15s ease;
      font-family:'Cairo',sans-serif;
      direction:rtl;
    }
    .dmg-drag-bar{
      cursor:grab;height:20px;display:flex;align-items:center;justify-content:center;
      margin:-4px -4px 10px;border-radius:12px 12px 0 0;background:#ef444411;
    }
    .dmg-drag-handle{width:34px;height:4px;background:#ef444444;border-radius:2px;}
    .dmg-section{margin-bottom:10px;}
    .dmg-section-title{font-size:10px;font-weight:900;color:#ef4444;margin-bottom:6px;
      letter-spacing:.05em;text-transform:uppercase;}
    .dmg-input-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
    .dmg-label{font-size:10px;color:var(--muted);width:90px;flex-shrink:0;text-align:right;}
    .dmg-input{
      flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;
      color:var(--text);font-size:12px;padding:5px 8px;font-family:'Cairo',sans-serif;
      outline:none;direction:ltr;text-align:center;
    }
    .dmg-input:focus{border-color:#ef4444;}
    .dmg-checkbox-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;cursor:pointer;}
    .dmg-checkbox-row input{accent-color:#ef4444;width:14px;height:14px;}
    .dmg-checkbox-row span{font-size:11px;color:var(--muted);}
    .target-chip{
      display:inline-flex;align-items:center;gap:4px;
      padding:3px 8px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;
      font-size:10px;font-weight:700;cursor:pointer;margin:2px;
      transition:border-color .15s,background .15s;
    }
    .target-chip.selected{border-color:#ef4444;background:#ef444418;color:#ff8080;}
    .target-chip .chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .dmg-result-item{
      background:var(--bg3);border:1px solid var(--border);border-radius:8px;
      padding:8px 10px;margin-bottom:6px;
    }
    .dmg-result-name{font-size:11px;font-weight:700;margin-bottom:4px;}
    .dmg-result-row{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:2px;}
    .dmg-result-final{font-size:14px;font-weight:900;margin-top:4px;}
    .dmg-result-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px;}
    .dmg-result-bar-fill{height:100%;background:#ef4444;border-radius:3px;transition:width .4s;}
    .atk-type-btn{
      flex:1;padding:5px 6px;background:var(--bg3);border:1px solid var(--border2);
      border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;
      font-family:'Cairo',sans-serif;color:var(--muted);transition:all .15s;text-align:center;
    }
    .atk-type-btn.active{border-color:#ef4444;color:#ff8080;background:#ef444418;}

    /* ═══ CONNECTED CHARS LIST ═══ */
    .connected-token{
      display:flex;align-items:center;gap:8px;padding:8px 10px;
      background:var(--bg3);border:1px solid var(--border);border-radius:9px;margin-bottom:6px;
    }
    .connected-token-avatar{
      width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border2);
      overflow:hidden;background:var(--bg2);flex-shrink:0;
      display:flex;align-items:center;justify-content:center;font-size:13px;
    }
    .connected-token-avatar img{width:100%;height:100%;object-fit:cover;}
    .connected-token-name{flex:1;font-size:12px;font-weight:700;color:var(--text);}
    .connected-token-pos{font-size:10px;color:var(--muted);font-family:monospace;}
    .remove-token-btn{
      background:transparent;border:1px solid #ef444433;border-radius:6px;
      color:#ef444488;font-size:11px;padding:2px 6px;cursor:pointer;
    }
    .remove-token-btn:hover{border-color:#ef4444;color:#ef4444;}
  </style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="header-title">⚔ أرض المعركة</div>
      <div class="header-sub" id="header-sub">لا توجد خريطة محملة</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="header-btn" onclick="openMapSetup()">🗺 خريطة</button>
      <button class="header-btn" onclick="openNpcPicker()">👤 شخصية</button>
      <button class="header-btn danger" onclick="clearBattlefield()" title="مسح الخريطة والشخصيات">🗑</button>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <button class="tool-btn active" id="tool-move" onclick="setTool('move')">✋ تحريك الخريطة</button>
    <div class="tool-divider"></div>
    <button class="tool-btn" id="tool-select" onclick="setTool('select')">🎯 تحديد</button>
    <div class="tool-divider"></div>
    <button class="tool-btn" id="tool-attack" onclick="openAttackLauncher()">⚔ هجمة</button>
    <div class="tool-divider"></div>
    <span style="font-size:10px;color:var(--muted);white-space:nowrap;">الشبكة:</span>
    <button class="tool-btn" id="grid-toggle" onclick="toggleGrid()">▦ إخفاء</button>
    <div class="tool-divider"></div>
    <span style="font-size:10px;color:var(--muted);white-space:nowrap;" id="token-count-display">لا توجد شخصيات</span>
  </div>

  <!-- BATTLEFIELD WRAP -->
  <div id="bf-wrap">
    <div id="bf-canvas">
      <img id="map-img" style="display:none;" draggable="false">
      <svg id="grid-svg" width="0" height="0"></svg>
      <!-- tokens injected here -->
    </div>

    <!-- Empty state -->
    <div id="empty-bf">
      <div class="empty-icon">🗡️</div>
      <div class="empty-text">اضغط على «خريطة» لتحميل خريطة المعركة<br>ثم أضف شخصياتك إليها</div>
    </div>

    <!-- Zoom controls -->
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="zoomIn()">+</button>
      <button class="zoom-btn" title="ملاءمة الخريطة للشاشة" onclick="zoomFit()">⊞</button>
      <button class="zoom-btn" onclick="zoomReset()">⊙</button>
      <button class="zoom-btn" onclick="zoomOut()">−</button>
    </div>

    <!-- Coord display -->
    <div class="coord-display" id="coord-display">—</div>
  </div>

</div>

<!-- BATTLE POPUPS CONTAINER (multiple draggable) -->
<div id="battle-popups-layer"></div>
<!-- DAMAGE CALC POPUPS -->
<div id="dmg-popups-layer"></div>

<!-- TOAST -->
<div id="toast" class="toast" style="display:none;"></div>


<script>
/* ══════════════════════════════════════════════════════════
   AMAZAD BATTLEFIELD v2.0
   Companion to amazad.html — reads savedProfiles + images
══════════════════════════════════════════════════════════ */

/* ═══ STORAGE KEYS (must match amazad.html) ═══ */
const AMAZAD_KEY        = "amazad_profiles";  // amazad.html saves here
const AMAZAD_KEY_ALT    = "amazad_v1";         // fallback
const IMG_KEY_PREFIX    = "amazad_img_";
const BF_KEY            = "amazad_bf_v2";

/* ═══ STATE ═══ */
let state = {
  mapSrc:    null,   // data URL of map image
  mapW:      0,      // logical map width  (grid cols * cellPx)
  mapH:      0,      // logical map height (grid rows * cellPx)
  mapNatW:   0,      // natural image width
  mapNatH:   0,      // natural image height
  gridCols:  20,     // number of columns
  gridRows:  20,     // number of rows
  cellPx:    60,     // pixel size of one grid cell
  gridVis:   true,
  tokens:    [],
  pan: {x:0, y:0},
  zoom:      1.0,
  tool:      'move',
};

let selectedTokenId = null;
// Map of open popups: tokId -> { el, offsetX, offsetY }
const openPopups = {};

/* ═══ PAN / ZOOM ═══ */
let isPanning   = false;
let panStart    = {x:0,y:0};
let panOrigin   = {x:0,y:0};

/* ═══ ELEMENTS ═══ */
const bfWrap    = document.getElementById('bf-wrap');
const bfCanvas  = document.getElementById('bf-canvas');
const mapImg    = document.getElementById('map-img');
const gridSvg   = document.getElementById('grid-svg');
const popup     = document.getElementById('battle-popup');

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
function init(){
  loadBfState();
  renderAll();
  setupPanZoom();
}

/* ═══════════════════════════════════════
   PERSISTENCE
═══════════════════════════════════════ */
function saveBfState(){
  try{
    const save = {
      mapSrc:   state.mapSrc,
      mapW:     state.mapW,
      mapH:     state.mapH,
      mapNatW:  state.mapNatW,
      mapNatH:  state.mapNatH,
      gridCols: state.gridCols,
      gridRows: state.gridRows,
      cellPx:   state.cellPx,
      gridVis:  state.gridVis,
      tokens:   state.tokens,
      pan:      state.pan,
      zoom:     state.zoom,
    };
    localStorage.setItem(BF_KEY, JSON.stringify(save));
  } catch(e){ showToast("⚠ فشل الحفظ: مساحة التخزين ممتلئة"); }
}

function loadBfState(){
  try{
    const raw = localStorage.getItem(BF_KEY);
    if(!raw) return;
    const s = JSON.parse(raw);
    Object.assign(state, s);
    // recalculate logical dimensions if missing
    if(state.mapSrc && (!state.mapW || !state.mapH)){
      state.mapW = state.gridCols * state.cellPx;
      state.mapH = state.gridRows * state.cellPx;
    }
  } catch(e){}
}

/* ═══════════════════════════════════════
   RENDER ALL
═══════════════════════════════════════ */
function renderAll(){
  applyTransform();
  renderMap();
  renderGrid();
  renderTokens();
  updateHeaderSub();
  updateTokenCountDisplay();
}

function applyTransform(){
  bfCanvas.style.transform = `translate(${state.pan.x}px,${state.pan.y}px) scale(${state.zoom})`;
  bfCanvas.style.transformOrigin = '0 0';
  updateTokenLabelScales();
}

function renderMap(){
  if(state.mapSrc){
    mapImg.src = state.mapSrc;
    mapImg.style.display = 'block';
    // stretch to fill entire logical grid area regardless of natural image size
    mapImg.style.width  = state.mapW + 'px';
    mapImg.style.height = state.mapH + 'px';
    document.getElementById('empty-bf').style.display = 'none';
  } else {
    mapImg.style.display = 'none';
    document.getElementById('empty-bf').style.display = 'flex';
  }
}

function renderGrid(){
  if(!state.mapSrc || !state.gridVis){ gridSvg.innerHTML=''; return; }
  // حساب الأبعاد إذا كانت مفقودة
  if(!state.mapW || !state.mapH){
    state.mapW = state.gridCols * state.cellPx;
    state.mapH = state.gridRows * state.cellPx;
  }
  const W = state.mapW, H = state.mapH;
  if(!W || !H){ gridSvg.innerHTML=''; return; }
  const cols = state.gridCols, rows = state.gridRows;
  gridSvg.setAttribute('width',  W);
  gridSvg.setAttribute('height', H);

  // glow filter for lines
  let paths = `<defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;
  // vertical lines
  for(let c=0; c<=cols; c++){
    const x = c * state.cellPx;
    const border = (c===0||c===cols);
    const w   = border ? 2.5 : 1.4;
    const clr = border ? 'rgba(255,30,30,0.95)' : 'rgba(220,40,40,0.65)';
    const filt = border ? '' : ' filter="url(#glow)"';
    paths += `<line x1="${x}" y1="0" x2="${x}" y2="${H}" stroke="${clr}" stroke-width="${w}"${filt}/>`;
  }
  // horizontal lines
  for(let r=0; r<=rows; r++){
    const y = r * state.cellPx;
    const border = (r===0||r===rows);
    const w   = border ? 2.5 : 1.4;
    const clr = border ? 'rgba(255,30,30,0.95)' : 'rgba(220,40,40,0.65)';
    const filt = border ? '' : ' filter="url(#glow)"';
    paths += `<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="${clr}" stroke-width="${w}"${filt}/>`;
  }
  // coord labels every 5 cells
  let labels = '';
  for(let c=0; c<=cols; c+=5){
    for(let r=0; r<=rows; r+=5){
      if(c===0&&r===0) continue;
      labels += `<text x="${c*state.cellPx+2}" y="${r*state.cellPx-2}" font-size="8" fill="rgba(220,80,80,0.5)" font-family="monospace">${c},${r}</text>`;
    }
  }
  gridSvg.innerHTML = paths + labels;
}

function renderTokens(){
  document.querySelectorAll('.token').forEach(el=>el.remove());
  if(!state.mapSrc) return;
  state.tokens.forEach(tok => renderToken(tok));
  // keep label sizes in sync with current zoom
  updateTokenLabelScales();
}

function renderToken(tok){
  const el = document.createElement('div');
  el.className = 'token' + (tok.id===selectedTokenId?' selected':'');
  el.id = 'tok_'+tok.id;
  el.style.left = tok.x + 'px';
  el.style.top  = tok.y + 'px';

  // token size: (charSize / 100) * cellPx — this is the ICON diameter in map-px
  const sizeRatio = Math.max(0.3, (tok.charSize||100) / 100);
  const tokPx = sizeRatio * state.cellPx;

  // avatar
  const avatarDiv = document.createElement('div');
  avatarDiv.className = 'token-avatar' + (!getCharImage(tok.profileId)?' no-img':'');
  avatarDiv.style.width    = tokPx + 'px';
  avatarDiv.style.height   = tokPx + 'px';
  avatarDiv.style.fontSize = (tokPx * 0.48) + 'px';
  avatarDiv.style.borderColor = tok.raceColor || '#7c3aed';

  const imgSrc = getCharImage(tok.profileId);
  if(imgSrc){
    const img = document.createElement('img');
    img.src = imgSrc;
    img.draggable = false;
    avatarDiv.appendChild(img);
  } else {
    avatarDiv.textContent = tok.emoji || '⚔';
  }

  // name label — will be counter-scaled vs zoom
  const nameDiv = document.createElement('div');
  nameDiv.className = 'token-name';
  nameDiv.textContent = tok.name || '؟';

  // stat bars label — also counter-scaled
  const barsDiv = document.createElement('div');
  barsDiv.className = 'token-bars';
  barsDiv.innerHTML = buildMiniBar('❤', tok.hp, tok.hpMax, '#ef4444')
    + buildMiniBar('✨', tok.hala, tok.halaMax, '#a855f7')
    + buildMiniBarPct('⚡', tok.stamina, tok.staminaMax, '#f59e0b');

  el.appendChild(nameDiv);   // اسم فوق الأيقونة
  el.appendChild(avatarDiv);
  el.appendChild(barsDiv);

  el.addEventListener('click', ev => { ev.stopPropagation(); openBattlePopup(tok.id); });
  el.addEventListener('mousedown', ev => { startTokenDrag(ev, tok.id); });
  el.addEventListener('touchstart', ev => { startTokenDrag(ev, tok.id); }, {passive:false});

  bfCanvas.appendChild(el);
}

/* Counter-scale token labels so they always appear at a readable size */
function updateTokenLabelScales(){
  const inv = 1 / state.zoom;
  document.querySelectorAll('.token-name, .token-bars').forEach(el=>{
    el.style.transform = `scale(${inv})`;
    el.style.transformOrigin = 'top center';
  });
}

function buildMiniBar(icon, cur, max, color){
  const pct = max>0 ? Math.max(0,Math.min(100,(cur/max)*100)) : 0;
  return `<div class="token-bar-row">
    <span style="color:${color};font-size:8px;">${icon}</span>
    <div class="token-bar-track"><div class="token-bar-fill" style="width:${pct}%;background:${color};"></div></div>
    <span style="color:${color};font-size:8px;">${cur}</span>
  </div>`;
}

function buildMiniBarPct(icon, cur, max, color){
  const pct = max>0 ? Math.max(0,Math.min(100,(cur/max)*100)) : 0;
  return `<div class="token-bar-row">
    <span style="color:${color};font-size:8px;">${icon}</span>
    <div class="token-bar-track"><div class="token-bar-fill" style="width:${pct}%;background:${color};"></div></div>
    <span style="color:${color};font-size:8px;">${Math.round(pct)}%</span>
  </div>`;
}

function updateHeaderSub(){
  const sub = document.getElementById('header-sub');
  if(state.mapSrc){
    sub.textContent = `${state.gridCols}×${state.gridRows} خلية — حجم الخلية: ${state.cellPx}px`;
  } else {
    sub.textContent = 'لا توجد خريطة محملة';
  }
}

function updateTokenCountDisplay(){
  const el = document.getElementById('token-count-display');
  const n = state.tokens.length;
  el.textContent = n===0 ? 'لا توجد شخصيات' : `${n} شخصيات على الخريطة`;
}

/* ═══════════════════════════════════════
   CHAR IMAGES  (localStorage)
═══════════════════════════════════════ */
function getCharImage(profileId){
  if(!profileId) return null;
  return localStorage.getItem(IMG_KEY_PREFIX + profileId) || null;
}

function saveCharImage(profileId, dataUrl){
  try{
    localStorage.setItem(IMG_KEY_PREFIX + profileId, dataUrl);
  } catch(e){ showToast("⚠ الصورة كبيرة جداً، جرب صورة أصغر"); }
}

function deleteCharImage(profileId){
  localStorage.removeItem(IMG_KEY_PREFIX + profileId);
}

/* ═══════════════════════════════════════
   READ AMAZAD PROFILES
═══════════════════════════════════════ */
function getAmazadProfiles(){
  try{
    // amazad.html saves profiles under "amazad_profiles"
    let raw = localStorage.getItem(AMAZAD_KEY);
    if(!raw) raw = localStorage.getItem(AMAZAD_KEY_ALT);
    if(!raw) return [];
    const data = JSON.parse(raw);
    if(Array.isArray(data)) return data;
    if(data && Array.isArray(data.profiles)) return data.profiles;
    return [];
  } catch(e){ return []; }
}

function getProfileById(id){
  return getAmazadProfiles().find(p=>String(p.saveId||p.id)===String(id)) || null;
}

function getProfileTransforms(profileId){
  const p = getProfileById(profileId);
  if(!p) return [];
  const ids = p._transformIds || p._transforms?.map((_,i)=>i+1) || [];
  if(p._transformIds){
    return p._transformIds.map((tid,i)=>{
      const tp = getProfileById(tid);
      return { id: tid, label: tp?._transformLabel || `تحول ${i+1}`, profile: tp };
    }).filter(t=>t.profile);
  }
  // old _transforms array fallback
  return (p._transforms||[]).map((t,i)=>({
    id: i+1, label: t._transformLabel || `تحول ${i+1}`, profile: {...p,...t}
  }));
}

function getSideDefenses(tok){
  const p = getProfileById(tok.profileId);
  const isGrade4 = p ? ['4','4 خاصة','5'].includes(p.lifeGrade||'') : false;
  const hasNature = p ? (p.classes||[]).some(c=>c.cls==='طبيعة') : false;
  const base = tok.dmgReduce || (p ? p.dmgReduce : 0) || 0;
  // also check custom overrides on token
  const side1extra = tok._customSide1 || 0;
  const side2extra = tok._customSide2 || 0;
  return {
    side1: (isGrade4 ? Math.floor(base*0.5) : 0) + side1extra,
    side2: ((isGrade4&&hasNature) ? Math.floor(base*0.5) : 0) + side2extra,
    hasNature, isGrade4, base,
  };
}

function getTechniques(profileId){
  try{
    const profiles = getAmazadProfiles();
    const p = profiles.find(x=>(x.saveId||x.id)===profileId || String(x.saveId)===String(profileId));
    if(!p) return [];
    const techs = Array.isArray(p._savedTechniques) ? p._savedTechniques : [];
    // Also include weapons
    const weapons = (p.weapons||[]).map(w=>({
      name: w.name||'سلاح',
      description: w.notes||'',
      _isWeapon: true,
      finalSize: (w.size||1),
      diceStr: w.dice||'',
      Y: null,
    }));
    return [...techs, ...weapons];
  } catch(e){ return []; }
}

/* ═══════════════════════════════════════
   ATTACK RANGE VISUALIZATION
═══════════════════════════════════════ */
let attackRangeLayer = null;

let attackRangeState = null; // {tokId, r, cx, cy, svgEl, techName}

function showAttackRange(tokId, rangeInCells, techName){
  clearAttackRanges();
  const tok = state.tokens.find(t=>t.id===tokId);
  if(!tok) return;
  const r = parseFloat(rangeInCells) || 1;
  const tokSizePx = (tok.charSize||100)/100 * state.cellPx;
  let cx = tok.x + tokSizePx/2;
  let cy = tok.y + tokSizePx/2;

  attackRangeState = {tokId, r, cx, cy, techName: techName||''};
  _drawAttackRange();
  _highlightTokensInRange();
}

function _drawAttackRange(){
  if(!attackRangeState) return;
  const {r, cx, cy, techName} = attackRangeState;
  const px = r * state.cellPx;

  if(attackRangeLayer) attackRangeLayer.remove();

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.style.cssText = 'position:absolute;top:0;left:0;overflow:visible;z-index:10;cursor:move;';
  svg.setAttribute('width', state.mapW);
  svg.setAttribute('height', state.mapH);

  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = `
    <filter id="rng-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;

  // outer glow circle
  const glow = document.createElementNS('http://www.w3.org/2000/svg','circle');
  glow.setAttribute('cx', cx); glow.setAttribute('cy', cy); glow.setAttribute('r', px+6);
  glow.setAttribute('fill','none'); glow.setAttribute('stroke','rgba(239,68,68,0.4)');
  glow.setAttribute('stroke-width','8'); glow.setAttribute('filter','url(#rng-glow)');

  // main circle
  const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('cx', cx); circle.setAttribute('cy', cy); circle.setAttribute('r', px);
  circle.setAttribute('fill','rgba(239,68,68,0.10)');
  circle.setAttribute('stroke','rgba(255,50,50,1)');
  circle.setAttribute('stroke-width','2.5');
  circle.setAttribute('stroke-dasharray','8 4');
  circle.setAttribute('filter','url(#rng-glow)');

  // center dot
  const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('cx', cx); dot.setAttribute('cy', cy); dot.setAttribute('r', 4);
  dot.setAttribute('fill','rgba(255,80,80,0.9)');

  // label with tech name inside circle
  const label = document.createElementNS('http://www.w3.org/2000/svg','text');
  label.setAttribute('x', cx); label.setAttribute('y', cy - px*0.6);
  label.setAttribute('fill','#ff6060'); label.setAttribute('font-size','12');
  label.setAttribute('font-weight','800'); label.setAttribute('text-anchor','middle');
  label.setAttribute('font-family','inherit');
  label.textContent = attackRangeState.techName || (r.toFixed(1)+' خلية');

  const rangeLabel = document.createElementNS('http://www.w3.org/2000/svg','text');
  rangeLabel.setAttribute('x', cx); rangeLabel.setAttribute('y', cy + px + 16);
  rangeLabel.setAttribute('fill','rgba(255,100,100,0.8)'); rangeLabel.setAttribute('font-size','10');
  rangeLabel.setAttribute('font-weight','700'); rangeLabel.setAttribute('text-anchor','middle');
  rangeLabel.textContent = '← '+r.toFixed(2)+' خلية →';

  svg.appendChild(defs);
  svg.appendChild(glow); svg.appendChild(circle); svg.appendChild(dot);
  svg.appendChild(label); svg.appendChild(rangeLabel);
  bfCanvas.appendChild(svg);
  attackRangeLayer = svg;

  // make draggable
  let dragging=false, startMX=0, startMY=0, startCX=cx, startCY=cy;
  svg.addEventListener('mousedown', e=>{
    if(e.button!==0) return;
    dragging=true; startMX=e.clientX; startMY=e.clientY;
    startCX=attackRangeState.cx; startCY=attackRangeState.cy;
    e.stopPropagation();
  });
  window.addEventListener('mousemove', e=>{
    if(!dragging) return;
    const dx=(e.clientX-startMX)/state.zoom;
    const dy=(e.clientY-startMY)/state.zoom;
    attackRangeState.cx = startCX+dx;
    attackRangeState.cy = startCY+dy;
    _drawAttackRange();
    _highlightTokensInRange();
  });
  window.addEventListener('mouseup', ()=>{ dragging=false; });
}

function _highlightTokensInRange(){
  if(!attackRangeState) return;
  const {cx, cy, r} = attackRangeState;
  const rangePx = r * state.cellPx;
  // find tokens whose center is within range
  const inRange = state.tokens.filter(t=>{
    const tokSizePx = (t.charSize||100)/100 * state.cellPx;
    const tcx = t.x + tokSizePx/2;
    const tcy = t.y + tokSizePx/2;
    return Math.sqrt((tcx-cx)**2+(tcy-cy)**2) <= rangePx;
  });
  // flash tokens in range
  document.querySelectorAll('.token').forEach(el=>{
    const id = el.id.replace('tok_','');
    const hit = inRange.some(t=>t.id===id);
    el.style.outline = hit ? '3px solid #ef4444' : '';
    el.style.filter  = hit ? 'drop-shadow(0 0 8px #ef4444)' : '';
  });
  return inRange;
}

function loadTransformForToken(tokId, transformId){

/* ═══════════════════════════════════════
   PAN & ZOOM
═══════════════════════════════════════ */
function setupPanZoom(){
  // Mouse
  bfWrap.addEventListener('mousedown', onPanStart);
  window.addEventListener('mousemove', onPanMove);
  window.addEventListener('mouseup',   onPanEnd);

  // Touch
  let lastTouchDist = 0;
  bfWrap.addEventListener('touchstart', e=>{
    if(e.touches.length===1){
      onPanStart(e.touches[0]);
    } else if(e.touches.length===2){
      lastTouchDist = getTouchDist(e.touches);
    }
  },{passive:false});
  bfWrap.addEventListener('touchmove', e=>{
    e.preventDefault();
    if(e.touches.length===1){
      onPanMove(e.touches[0]);
    } else if(e.touches.length===2){
      const dist = getTouchDist(e.touches);
      if(lastTouchDist>0){
        const delta = (dist - lastTouchDist) * 0.005;
        const rect2 = bfWrap.getBoundingClientRect();
        const cx = ((e.touches[0].clientX + e.touches[1].clientX)/2) - rect2.left;
        const cy = ((e.touches[0].clientY + e.touches[1].clientY)/2) - rect2.top;
        const mapCX = (cx - state.pan.x) / state.zoom;
        const mapCY = (cy - state.pan.y) / state.zoom;
        const minZ2 = Math.min(rect2.width/(state.mapW||rect2.width), rect2.height/(state.mapH||rect2.height))*0.3;
        state.zoom = Math.max(minZ2, Math.min(3.0, state.zoom + delta));
        state.pan.x = cx - mapCX * state.zoom;
        state.pan.y = cy - mapCY * state.zoom;
        applyTransform();
      }
      lastTouchDist = dist;
    }
  },{passive:false});
  bfWrap.addEventListener('touchend', e=>{ onPanEnd(); lastTouchDist=0; });

  // Wheel zoom — toward cursor
  bfWrap.addEventListener('wheel', e=>{
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.909;
    const rect = bfWrap.getBoundingClientRect();
    applyZoomAt(e.clientX - rect.left, e.clientY - rect.top, factor);
    saveBfState();
  },{passive:false});

  // Click outside tokens deselects
  bfWrap.addEventListener('click', e=>{
    if(e.target===bfWrap || e.target===bfCanvas || e.target===mapImg || e.target===gridSvg){
      selectToken(null);
      closeAllPopups();
    }
  });
}

function getTouchDist(touches){
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

function applyZoomAt(px, py, factor){
  const minZ = getMinZoom();
  const newZ = Math.max(minZ, Math.min(5, state.zoom * factor));
  state.pan.x = px - (px - state.pan.x) * (newZ / state.zoom);
  state.pan.y = py - (py - state.pan.y) * (newZ / state.zoom);
  state.zoom  = newZ;
  applyTransform();
}
function getMinZoom(){
  if(!state.mapW||!state.mapH) return 0.03;
  // allow zoom-out until map appears at 1/3 of viewport
  const wz = bfWrap.clientWidth  / state.mapW / 3;
  const hz = bfWrap.clientHeight / state.mapH / 3;
  return Math.min(wz, hz, 0.03);
}

function onPanStart(e){
  if(state.tool !== 'move') return;
  isPanning = true;
  bfWrap.classList.add('panning');
  panStart = {x: e.clientX||e.pageX, y: e.clientY||e.pageY};
  panOrigin = {...state.pan};
}
function onPanMove(e){
  if(!isPanning) return;
  const cx = e.clientX||e.pageX||0;
  const cy = e.clientY||e.pageY||0;
  state.pan.x = panOrigin.x + (cx - panStart.x);
  state.pan.y = panOrigin.y + (cy - panStart.y);
  applyTransform();
  const rect = bfWrap.getBoundingClientRect();
  updateCoord(cx - rect.left, cy - rect.top);
}
function onPanEnd(){
  if(isPanning){ isPanning=false; bfWrap.classList.remove('panning'); saveBfState(); }
}

function updateCoord(clientX, clientY){
  if(!state.mapSrc){ document.getElementById('coord-display').textContent='—'; return; }
  const mapX = (clientX - state.pan.x) / state.zoom;
  const mapY = (clientY - state.pan.y) / state.zoom;
  const col  = Math.floor(mapX / state.cellPx);
  const row  = Math.floor(mapY / state.cellPx);
  document.getElementById('coord-display').textContent = `عمود ${col} — صف ${row}`;
}

function zoomIn(){
  const cx=bfWrap.clientWidth/2, cy=bfWrap.clientHeight/2;
  applyZoomAt(cx,cy,1.2); saveBfState();
}
function zoomOut(){
  const cx=bfWrap.clientWidth/2, cy=bfWrap.clientHeight/2;
  applyZoomAt(cx,cy,1/1.2); saveBfState();
}
/* ⊞ — fit map exactly in viewport */
function zoomFit(){
  if(!state.mapW||!state.mapH){zoomReset();return;}
  const zw = bfWrap.clientWidth  / state.mapW;
  const zh = bfWrap.clientHeight / state.mapH;
  state.zoom = Math.min(zw,zh) * 0.96;
  state.pan.x = (bfWrap.clientWidth  - state.mapW * state.zoom) / 2;
  state.pan.y = (bfWrap.clientHeight - state.mapH * state.zoom) / 2;
  applyTransform(); saveBfState();
}
/* ⊙ — reset to 1:1 centered */
function zoomReset(){
  state.zoom=1;
  if(state.mapW&&state.mapH){
    state.pan.x = Math.max(0, (bfWrap.clientWidth  - state.mapW)/2);
    state.pan.y = Math.max(0, (bfWrap.clientHeight - state.mapH)/2);
  } else {
    state.pan={x:0,y:0};
  }
  applyTransform(); saveBfState();
}

/* ═══════════════════════════════════════
   TOKEN DRAG
═══════════════════════════════════════ */
let tokenDragging = false;
let dragTokId = null;
let dragStartMouse = {x:0,y:0};
let dragStartPos   = {x:0,y:0};

function startTokenDrag(e, tokId){
  e.stopPropagation();
  const ev = e.touches ? e.touches[0] : e;
  tokenDragging = true;
  dragTokId = tokId;
  dragStartMouse = {x: ev.clientX, y: ev.clientY};
  const tok = state.tokens.find(t=>t.id===tokId);
  if(tok) dragStartPos = {x: tok.x, y: tok.y};
  selectToken(tokId);

  const onMove = ev2 => {
    if(!tokenDragging) return;
    const e2 = ev2.touches ? ev2.touches[0] : ev2;
    const dx = (e2.clientX - dragStartMouse.x) / state.zoom;
    const dy = (e2.clientY - dragStartMouse.y) / state.zoom;
    const tok2 = state.tokens.find(t=>t.id===dragTokId);
    if(!tok2) return;
    tok2.x = dragStartPos.x + dx;
    tok2.y = dragStartPos.y + dy;
    const el = document.getElementById('tok_'+dragTokId);
    if(el){ el.style.left = tok2.x+'px'; el.style.top = tok2.y+'px'; }
  };
  const onEnd = () => {
    if(!tokenDragging) return;
    tokenDragging = false;
    // snap to grid center
    snapTokenToGrid(dragTokId);
    saveBfState();
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onEnd);
    window.removeEventListener('touchmove', onMove);
    window.removeEventListener('touchend', onEnd);
    dragTokId = null;
  };
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchmove', onMove, {passive:false});
  window.addEventListener('touchend', onEnd);
}

function snapTokenToGrid(tokId){
  const tok = state.tokens.find(t=>t.id===tokId);
  if(!tok) return;
  const col = Math.round(tok.x / state.cellPx);
  const row = Math.round(tok.y / state.cellPx);
  tok.x = col * state.cellPx;
  tok.y = row * state.cellPx;
  const el = document.getElementById('tok_'+tokId);
  if(el){ el.style.left = tok.x+'px'; el.style.top = tok.y+'px'; }
}

function moveToken(tokId, dCol, dRow){
  const tok = state.tokens.find(t=>t.id===tokId);
  if(!tok) return;
  tok.x += dCol * state.cellPx;
  tok.y += dRow * state.cellPx;
  tok.x = Math.max(0, Math.min(state.mapW-1, tok.x));
  tok.y = Math.max(0, Math.min(state.mapH-1, tok.y));
  const el = document.getElementById('tok_'+tokId);
  if(el){ el.style.left = tok.x+'px'; el.style.top = tok.y+'px'; }
  saveBfState();
  // refresh popup position
  if(battlePopupOpen && selectedTokenId===tokId){
    openBattlePopup(tokId, el);
  }
}

  if(!tok || !openPopups[tokId]) return;
  const hpPct   = tok.hpMax>0   ? Math.max(0,Math.min(100,(tok.hp/tok.hpMax)*100))        : 0;
  const halaPct = tok.halaMax>0  ? Math.max(0,Math.min(100,(tok.hala/tok.halaMax)*100))     : 0;
  const stPct   = tok.staminaMax>0?Math.max(0,Math.min(100,(tok.stamina/tok.staminaMax)*100)):0;
  const hpColor = hpPct>60?'#22c55e':hpPct>30?'#f59e0b':'#ef4444';
  const hpBar   = document.getElementById('bp-hp-bar-'+tokId);
  const hpVal   = document.getElementById('bp-hp-val-'+tokId);
  const haBar   = document.getElementById('bp-hala-bar-'+tokId);

  const stBar   = document.getElementById('bp-sta-bar-'+tokId);

  if(hpBar){ hpBar.style.width=hpPct+'%'; hpBar.style.background=hpColor; }

function adjustStat(tokId, key, delta){
  const tok = state.tokens.find(t=>t.id===tokId);
  if(!tok) return;
  tok[key] = Math.max(0, (tok[key]??0) + delta);
  if(!key.endsWith('Max') && tok[key+'Max'] !== undefined){
    tok[key] = Math.min(tok[key], tok[key+'Max']);
  }
  const curEl = document.getElementById('se-cur');
  const maxEl = document.getElementById('se-max');
  if(curEl && !key.endsWith('Max')) curEl.textContent = tok[key];
  if(maxEl && key.endsWith('Max'))  maxEl.textContent = tok[key];
  if(curEl && key.endsWith('Max'))  maxEl.textContent = tok[key];
  // re-render token bar
  const el = document.getElementById('tok_'+tokId);
  if(el){ el.remove(); renderToken(tok); }
  // refresh open popup bars live
  refreshPopupBars(tokId);
  saveBfState();
}

function resetStats(tokId){
  const tok = state.tokens.find(t=>t.id===tokId);
  if(!tok) return;
  tok.hp     = tok.hpMax;
  tok.hala   = tok.halaMax;
  tok.stamina= tok.staminaMax;
  const el = document.getElementById('tok_'+tokId);

  refreshPopupBars(tokId);
  showToast('♻ تمت إعادة الإحصائيات');

  tok.staminaMax       = p.staminaMax || 100;
  tok.stamina          = p.staminaMax || 100;
  tok.defense          = p.defense       || 0;
  tok.trueDefense      = p.trueDefense   || 0;
  tok.dmgReduce        = p.dmgReduce     || 0;
  tok.immunity         = p.immunity      || 0;
  tok.physStrPct       = p.physStrPct    || 0;
  tok.luckChances      = p.luckChances   || 0;
  tok.luckChancesMax   = p.luckChancesMax|| p.luckChances || 0;
  tok.sixthSenseChances    = p.sixthSenseChances    || 0;

let cropState = {zoom:1, x:0, y:0, srcW:0, srcH:0};

function setupCropDrag(src, tokId){
  const img = document.getElementById('crop-img');
  if(!img) return;
  cropState = {zoom:1, x:0, y:0};
  const circle = document.getElementById('crop-circle');
  const cSize = 220;

  // load natural dimensions
  const tmpImg = new Image();
  tmpImg.onload = () => {
    cropState.srcW = tmpImg.naturalWidth;
    cropState.srcH = tmpImg.naturalHeight;
    // fit image into circle
    const fitZoom = Math.max(cSize/cropState.srcW, cSize/cropState.srcH);
    cropState.zoom = fitZoom;
    applyCropTransform();
  };
  tmpImg.src = src;

  let dragging = false, startX=0, startY=0, startCX=0, startCY=0;
  const onDown = e => {
    dragging=true;
    const ev = e.touches?e.touches[0]:e;
    startX=ev.clientX; startY=ev.clientY;
    startCX=cropState.x; startCY=cropState.y;
    e.preventDefault();
  };
  const onMove = e => {
    if(!dragging) return;
    const ev = e.touches?e.touches[0]:e;
    cropState.x = startCX + (ev.clientX-startX);
    cropState.y = startCY + (ev.clientY-startY);
    applyCropTransform();
    e.preventDefault();
  };
  const onUp = ()=>{ dragging=false; };
  circle.addEventListener('mousedown',onDown);
  circle.addEventListener('touchstart',onDown,{passive:false});
  window.addEventListener('mousemove',onMove);
  window.addEventListener('touchmove',onMove,{passive:false});
  window.addEventListener('mouseup',onUp);
  window.addEventListener('touchend',onUp);
}

function applyCropTransform(){
  const img = document.getElementById('crop-img');
  if(!img) return;
  img.style.width  = (cropState.srcW * cropState.zoom) + 'px';
  img.style.height = (cropState.srcH * cropState.zoom) + 'px';
  img.style.left   = (110 - (cropState.srcW*cropState.zoom/2) + cropState.x) + 'px';
  img.style.top    = (110 - (cropState.srcH*cropState.zoom/2) + cropState.y) + 'px';
}

function cropAdjust(axis, delta){
  if(axis==='zoom') cropState.zoom = Math.max(0.05, cropState.zoom+delta);
  else if(axis==='x') cropState.x += delta;
  else if(axis==='y') cropState.y += delta;
  applyCropTransform();
}

function saveCrop(tokId){
  // draw circle-cropped canvas
  const cSize = 220;
  const canvas = document.createElement('canvas');
  canvas.width = cSize; canvas.height = cSize;
  const ctx = canvas.getContext('2d');
  ctx.beginPath();
  ctx.arc(cSize/2, cSize/2, cSize/2, 0, Math.PI*2);
  ctx.clip();
  const img = document.getElementById('crop-img');
  const w = cropState.srcW * cropState.zoom;
  const h = cropState.srcH * cropState.zoom;
  const x = 110 - (w/2) + cropState.x;
  const y = 110 - (h/2) + cropState.y;
  ctx.drawImage(img, x, y, w, h);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);

  const tok = state.tokens.find(t=>t.id===tokId);
  if(tok){
    saveCharImage(tok.profileId||tok.id, dataUrl);
    // also cache on token itself for quick render
    tok._imgCache = dataUrl;
    const el = document.getElementById('tok_'+tokId);
    if(el){ el.remove(); renderToken(tok); }
  }
  closeModal();
  showToast('📷 تم حفظ الصورة');
  saveBfState();
}

        <div class="map-upload-zone-text">${state.mapSrc?'اضغط لتغيير الخريطة':'اضغط لتحميل صورة الخريطة'}</div>
      </div>
    </div>

    <div style="font-size:11px;color:var(--muted);margin-bottom:10px;background:var(--bg3);border-radius:8px;padding:8px 10px;line-height:1.7;">
      💡 الصورة ستُمدَّد لتغطي الشبكة بالكامل بغض النظر عن حجمها الأصلي
    </div>

    <div class="form-row" style="margin-bottom:10px;">
      <div class="form-group">
        <div class="form-label">عدد الأعمدة</div>
        <input type="number" class="form-input" id="grid-cols-inp" value="${c}" min="1" max="500" style="text-align:center;">
      </div>
      <div class="form-group">
        <div class="form-label">عدد الصفوف</div>
        <input type="number" class="form-input" id="grid-rows-inp" value="${r}" min="1" max="500" style="text-align:center;">
      </div>
    </div>

    <div class="grid-control">
      <label>حجم الخلية (px)</label>
      <input type="range" id="cell-size-slider" min="20" max="200" value="${cp}"
        oninput="document.getElementById('cell-size-val').textContent=this.value">
      <span class="val" id="cell-size-val">${cp}</span>
    </div>

    <div style="font-size:10px;color:var(--muted);margin-bottom:12px;text-align:center;">
      الشبكة النهائية: <span id="grid-preview">${c}×${r}</span> خلية
    </div>

    ${state.mapSrc?`
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;">
        الحجم المنطقي: ${state.mapW}×${state.mapH}px (صورة أصلية: ${state.mapNatW}×${state.mapNatH}px)
      </div>
    `:''}

    <div class="btn-row">
      <button class="btn btn-primary" style="flex:1" onclick="applyMapSettings()">تطبيق</button>
      ${state.mapSrc?`<button class="btn btn-red" onclick="removeMap()">🗑 إزالة</button>`:''}
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
    </div>
  `);

  // live preview label
  ['grid-cols-inp','grid-rows-inp'].forEach(id=>{
    document.getElementById(id)?.addEventListener('input', ()=>{
      const gc = document.getElementById('grid-cols-inp')?.value||20;
      const gr = document.getElementById('grid-rows-inp')?.value||20;
      const pv = document.getElementById('grid-preview');
      if(pv) pv.textContent = gc+'×'+gr;
    });
  });
}

let _mapUploadInput = null;
function triggerMapUpload(){
  _mapUploadInput = document.createElement('input');
  _mapUploadInput.type='file'; _mapUploadInput.accept='image/*';
  _mapUploadInput.onchange = e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      // load to get natural dimensions
      const img=new Image();
      img.onload=()=>{
        window._pendingMap = {src:ev.target.result, w:img.naturalWidth, h:img.naturalHeight};
        const zone=document.getElementById('map-upload-zone');
        if(zone) zone.innerHTML=`<div class="map-upload-zone-icon">✅</div><div class="map-upload-zone-text">${f.name} — ${img.naturalWidth}×${img.naturalHeight}</div>`;
      };
      img.src=ev.target.result;
    };
    r.readAsDataURL(f);
  };
  _mapUploadInput.click();
}

function applyMapSettings(){
  const colsEl = document.getElementById('grid-cols-inp');
  const rowsEl = document.getElementById('grid-rows-inp');
  const slider  = document.getElementById('cell-size-slider');

  const cols = Math.max(1, parseInt(colsEl?.value)||state.gridCols);
  const rows = Math.max(1, parseInt(rowsEl?.value)||state.gridRows);
  const cp   = parseInt(slider?.value)||state.cellPx;

  state.gridCols = cols;
  state.gridRows = rows;
  state.cellPx   = cp;
  // logical map dimensions = grid-cells × cellPx (image is stretched to fill)
  state.mapW = cols * cp;
  state.mapH = rows * cp;

  if(window._pendingMap){
    state.mapSrc  = window._pendingMap.src;
    state.mapNatW = window._pendingMap.w;
    state.mapNatH = window._pendingMap.h;
    window._pendingMap = null;
  }

  closeModal();
  renderAll();
  saveBfState();
}

function removeMap(){
  if(!confirm('هل تريد إزالة الخريطة؟ الشخصيات ستبقى.')) return;
  state.mapSrc=null; state.mapW=0; state.mapH=0;
  closeModal(); renderAll(); saveBfState();
}

        </div>
        <div style="font-size:10px;color:var(--muted);">

    <div class="sec-div"></div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:700;">الشخصيات على الخريطة (${state.tokens.length})</div>

function addTokenFromProfile(profileId){
  if(!state.mapSrc){ showToast('⚠ يجب تحميل خريطة أولاً'); return; }
  const profiles = getAmazadProfiles();
  const p = profiles.find(x=>(x.saveId||x.id)===profileId||(x.saveId||x.id)==profileId);
  if(!p){ showToast('⚠ لم يُعثر على الشخصية'); return; }

  const pid = p.saveId || p.id;

  const wrapRect = bfWrap.getBoundingClientRect();
  const cx = (wrapRect.width/2  - state.pan.x) / state.zoom;
  const cy = (wrapRect.height/2 - state.pan.y) / state.zoom;
  const col = Math.round(cx/state.cellPx);
  const row = Math.round(cy/state.cellPx);

  // Read HP/hala/stamina — try combat-mode current values first
  const hpMax    = p.hpMax  || p.hp  || 100;
  const hpCurr   = p.hpCurrent  ?? hpMax;
  const haMax    = p.halaMax || p.hala || 100;
  const haCurr   = p.halaCurrent ?? haMax;
  const stMax    = p.staminaMax || 100;
  const stCurr   = p.staminaCurrent ?? stMax;
  const charSize = p.size || p.height || 100;

  const tok = {
    id:         Date.now()+'_'+Math.random().toString(36).substr(2,5),
    profileId:  String(pid),
    name:       p.name||'بدون اسم',
    race:       p.race||'',
    raceColor:  RC[p.race]||'#7c3aed',
    level:      p.level||1,
    charSize,
    emoji:      raceEmoji(p.race),
    hp:         hpCurr,
    hpMax,
    hala:       haCurr,
    halaMax:    haMax,
    stamina:    stCurr,
    staminaMax: stMax,
    defense:    p.defense||0,
    immunity:   p.immunity||0,
    trueDefense:p.trueDefense||0,
    x: col * state.cellPx,
    y: row * state.cellPx,
  };

  state.tokens.push(tok);
  closeModal();
  renderToken(tok);
  updateTokenCountDisplay();
  saveBfState();
  showToast(`✓ ${tok.name} أضيفت إلى الخريطة`);
}

function raceEmoji(race){
  const map = {
    "إنسان":"🧑","سكارد":"💜","آلزاداكايند":"🐉","إتشيرما":"👁",
    "سيلافين":"✨","بهائم الظلام":"🌑","وحش الظلام":"🌒",
    "ساروفيان":"🟢","ساروفيان خرافي":"🔵","رؤوس الكلاب":"🐕","حيوان":"🐾",
  };
  return map[race]||'⚔';
}

function removeToken(tokId){
  state.tokens = state.tokens.filter(t=>t.id!==tokId);
  const el = document.getElementById('tok_'+tokId);
  if(el) el.remove();
  if(selectedTokenId===tokId){ selectToken(null); }
  closePopup(tokId);
  updateTokenCountDisplay();
  saveBfState();
  showToast('🗑 تمت إزالة الشخصية');
}

function saveCropForProfile(profileId){
  const cSize = 220;
  const canvas = document.createElement('canvas');
  canvas.width = cSize; canvas.height = cSize;
  const ctx = canvas.getContext('2d');
  ctx.beginPath();
  ctx.arc(cSize/2,cSize/2,cSize/2,0,Math.PI*2);
  ctx.clip();
  const img = document.getElementById('crop-img');
  const w = cropState.srcW * cropState.zoom;
  const h = cropState.srcH * cropState.zoom;
  const x = 110-(w/2)+cropState.x;
  const y = 110-(h/2)+cropState.y;
  ctx.drawImage(img,x,y,w,h);
  const dataUrl = canvas.toDataURL('image/jpeg',0.85);
  saveCharImage(profileId, dataUrl);
  // update tokens that use this profile
  state.tokens.forEach(tok=>{
    if(tok.profileId===profileId){
      tok._imgCache=dataUrl;
      const el=document.getElementById('tok_'+tok.id);
      if(el){el.remove(); renderToken(tok);}
    }
  });
  closeModal();
  showToast('📷 تم حفظ الصورة');
}

function deleteProfileImg(profileId){
  deleteCharImage(profileId);
  closeModal();
  // re-open
  openProfileImageManager();
  // re-render affected tokens
  state.tokens.forEach(tok=>{
    if(tok.profileId===profileId){
      const el=document.getElementById('tok_'+tok.id);
      if(el){el.remove(); renderToken(tok);}
    }
  });
}

/* ═══════════════════════════════════════════════════════
   ATTACK LAUNCHER & DAMAGE CALCULATOR
   ─────────────────────────────────────────────────────
   Attack types:  physical | magical | true
   Defense order:
     1. percentDef  (physStrPct) — half vs physical unless barrier bound to بأس
     2. defense     (flat)
     3. trueDefense (flat, after 1+2)
   Barrier binding bonus:
     degree "ثالثة" → percentDef works fully vs physical
     degree "ثانية" → 25% effectiveness vs true damage
     degree "أولى"  → 50% effectiveness vs true damage

        ${attackerOpts}

        <input class="dmg-input" id="atk-range" type="number" value="1" min="0.1" step="0.1" placeholder="1"
          oninput="updateAtkRangePreview()">
        <span style="font-size:10px;color:var(--muted);margin-right:4px;">خلية</span>
      </div>
      <button onclick="showAtkRangeOnMap()" style="width:100%;padding:5px;background:#ef444411;border:1px solid #ef444433;border-radius:7px;color:#ef4444;font-size:11px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;margin-top:4px;">
        🎯 إظهار النطاق على الخريطة
      </button>
    </div>

    <div class="dmg-section">
      <div class="dmg-section-title">الأهداف</div>
      <div id="atk-targets-wrap" style="display:flex;flex-wrap:wrap;gap:3px;max-height:90px;overflow-y:auto;">
        ${state.tokens.map(tok=>`
          <div class="target-chip" id="target-${tok.id}" onclick="toggleAtkTarget('${tok.id}')">
            <div class="chip-dot" style="background:${tok.raceColor||'#7c3aed'}"></div>
            ${tok.name}
          </div>
        `).join('')}
      </div>
    </div>

    <button onclick="launchDamageCalc()" style="width:100%;padding:9px;background:#ef4444;border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:900;cursor:pointer;font-family:'Cairo',sans-serif;margin-top:8px;">
      💥 احسب الضرر
    </button>
  `;

  document.getElementById('dmg-popups-layer').appendChild(el);
  makeDraggableEl(el, document.getElementById('atk-drag-bar'));
  window._atkType = 'physical';
  window._atkTargets = new Set();
}

let _atkTechList = [];
function selectAtkTech(idx){
  document.querySelectorAll('#atk-tech-chips .target-chip').forEach((el,i)=>{
    el.classList.toggle('selected', i===idx);
  });
  window._selectedAtkTech = _atkTechList[idx] || null;
  if(window._selectedAtkTech){
    const t = window._selectedAtkTech;
    const dmgEl = document.getElementById('atk-dmg');
    const rdEl  = document.getElementById('atk-range');
    if(dmgEl && t.baseSize) rdEl.value = t.baseSize;
  }
}

function getGlobalTechniques(){
  try{
    const raw = localStorage.getItem('amazad_techniques');
    return raw ? JSON.parse(raw) : [];
  } catch(e){ return []; }
}

function setAtkType(type){
  window._atkType = type;
  ['physical','magical','true'].forEach(t=>{
    document.getElementById('atktype-'+t)?.classList.toggle('active', t===type);
  });
}

function toggleAtkTarget(tokId){
  if(!window._atkTargets) window._atkTargets = new Set();
  const el = document.getElementById('target-'+tokId);
  if(window._atkTargets.has(tokId)){
    window._atkTargets.delete(tokId);
    el?.classList.remove('selected');
  } else {
    window._atkTargets.add(tokId);
    el?.classList.add('selected');
  }
}

function showAtkRangeOnMap(){
  const atkSel = document.getElementById('atk-attacker')?.value;
  const range  = parseFloat(document.getElementById('atk-range')?.value)||1;
  if(atkSel) showAttackRange(atkSel, range);
  else showToast('اختر مهاجمًا أولاً');
}

/* ── DAMAGE FORMULA ── */
function calcDamageForTarget(rawDmg, rawTrueDmg, atkType, tok){
  // tok fields: defense, physStrPct (percentDef), trueDefense, barrierBinding
  const defense    = tok.defense    || 0;
  const trueDef    = tok.trueDefense|| 0;
  const pctDef     = tok.physStrPct || 0; // e.g. 80 means 80%
  const barrier    = tok.barrierBinding || null; // {stat, degree, effect}
  const barrierDeg = barrier?.stat === 'البأس' ? (barrier.degree||'ثالثة') : null;

  const steps = [];
  let dmg = parseFloat(rawDmg) || 0;
  let trueDmg = parseFloat(rawTrueDmg) || 0;

  // 1. Percent defense
  if(pctDef > 0 && dmg > 0){
    let effectivePct = pctDef;
    if(atkType === 'physical'){
      if(barrierDeg === 'ثالثة') effectivePct = pctDef;          // full
      else effectivePct = pctDef / 2;                              // half
    } else if(atkType === 'magical'){
      effectivePct = pctDef;
    } else if(atkType === 'true'){
      if(barrierDeg === 'أولى')   effectivePct = pctDef * 0.5;   // 50%
      else if(barrierDeg === 'ثانية') effectivePct = pctDef * 0.25; // 25%
      else effectivePct = 0;                                        // no effect
    }
    const reduction = dmg * (effectivePct / 100);
    steps.push({ label:`دفاع مئوي ${pctDef}% (فعّال ${effectivePct.toFixed(0)}%)`, val: -reduction });
    dmg = Math.max(0, dmg - reduction);
  }

  // 2. Flat defense
  if(defense > 0 && dmg > 0 && atkType !== 'true'){
    const reduction = Math.min(dmg, defense);
    steps.push({ label:`دفاع عادي ${defense}`, val:-reduction });
    dmg = Math.max(0, dmg - reduction);
  }

  // 3. True defense
  if(trueDef > 0 && dmg > 0){
    const reduction = Math.min(dmg, trueDef);
    steps.push({ label:`دفاع حقيقي ${trueDef}`, val:-reduction });
    dmg = Math.max(0, dmg - reduction);
  }

  // If final dmg ≤ 0, use rawTrueDmg formula
  let finalDmg = dmg;
  let usedTruePath = false;
  if(finalDmg <= 0 && trueDmg > 0){
    usedTruePath = true;
    finalDmg = Math.max(0, trueDmg - trueDef);
    steps.push({ label:`اللجوء للضرر الحقيقي: ${trueDmg} - ${trueDef}`, val: finalDmg, isTrue:true });
  }

  return { finalDmg, steps, usedTruePath };
}

/* ── LAUNCH DAMAGE CALC ── */
function launchDamageCalc(){
  const rawDmg     = parseFloat(document.getElementById('atk-dmg')?.value)||0;
  const rawTrueDmg = parseFloat(document.getElementById('atk-true-dmg')?.value)||0;
  const atkType    = window._atkType || 'physical';
  const targets    = window._atkTargets || new Set();

  if(targets.size === 0){ showToast('⚠ اختر هدفاً واحداً على الأقل'); return; }

  const results = [];
  targets.forEach(tokId=>{
    const tok = state.tokens.find(t=>t.id===tokId);
    if(!tok) return;
    const r = calcDamageForTarget(rawDmg, rawTrueDmg, atkType, tok);
    results.push({ tok, ...r });
  });

  openDamageResultPopup(results, atkType, rawDmg, rawTrueDmg);
}

/* ── DAMAGE RESULT POPUP ── */
function openDamageResultPopup(results, atkType, rawDmg, rawTrueDmg){
  const el = document.createElement('div');
  el.className = 'dmg-popup';
  el.style.zIndex = nextDmgZ();
  const sw=window.innerWidth, sh=window.innerHeight;
  el.style.left = Math.max(8, Math.min(sw-320, 20 + Object.keys(openPopups).length*18)) + 'px';
  el.style.top  = Math.max(60, 80 + Object.keys(openPopups).length*18) + 'px';

  const atkTypeLabel = {physical:'جسدية ⚔',magical:'سحرية ✨',true:'حقيقية 💀'}[atkType]||'—';

  let resHTML = results.map(r=>{
    const hpBefore = r.tok.hp;
    const hpAfter  = Math.max(0, hpBefore - r.finalDmg);
    const hpPct    = r.tok.hpMax>0 ? (hpAfter/r.tok.hpMax*100) : 0;
    const rc = r.tok.raceColor||'#7c3aed';
    const stepsHtml = r.steps.map(s=>`
      <div class="dmg-result-row">
        <span>${s.label}</span>
        <span style="color:${s.val<0?'#ef4444':'#22c55e'};font-weight:700;">${s.val>0?'+':''}${s.val<0?s.val.toFixed(0):s.val.toFixed(0)}</span>
      </div>`).join('');

    return `
      <div class="dmg-result-item">
        <div class="dmg-result-name" style="color:${rc}">${r.tok.name}</div>
        <div class="dmg-result-row"><span>الضرر الأولي</span><span style="color:#f87171;font-weight:700;">−${rawDmg}</span></div>
        ${stepsHtml}
        <div class="dmg-result-final" style="color:${r.finalDmg>0?'#ef4444':'#22c55e'}">
          ${r.finalDmg > 0 ? `💥 ضرر فعلي: −${r.finalDmg.toFixed(0)}` : '🛡 الضرر محجوب بالكامل'}
          ${r.usedTruePath ? ' <span style="font-size:9px;color:#f59e0b">(ضرر حقيقي)</span>' : ''}
        </div>
        <div style="margin-top:4px;font-size:10px;color:var(--muted)">
          HP: ${hpBefore} → <span style="color:${hpAfter<=0?'#ef4444':'#22c55e'};font-weight:700">${hpAfter}</span>
        </div>
        <div class="dmg-result-bar"><div class="dmg-result-bar-fill" style="width:${hpPct}%;"></div></div>
        <button onclick="applyDamageToToken('${r.tok.id}',${r.finalDmg})"
          style="margin-top:6px;width:100%;padding:5px;background:#ef444422;border:1px solid #ef444455;border-radius:6px;color:#ef4444;font-size:11px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;">
          ✓ تطبيق الضرر على ${r.tok.name}
        </button>
      </div>
    `;
  }).join('');

  const dragId = 'dmg-res-drag-'+Date.now();
  el.innerHTML = `
    <div class="dmg-drag-bar" id="${dragId}"><div class="dmg-drag-handle"></div></div>
    <button class="bp-close" onclick="this.parentElement.remove()">×</button>
    <div style="font-size:13px;font-weight:900;color:#ef4444;margin-bottom:10px;">💥 نتائج الضرر</div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:10px;">
      نوع: <strong style="color:var(--text)">${atkTypeLabel}</strong> |
      ضرر: <strong style="color:#f87171">${rawDmg}</strong>
      ${rawTrueDmg>0?`| حقيقي: <strong style="color:#fbbf24">${rawTrueDmg}</strong>`:''}
    </div>
    <div style="max-height:400px;overflow-y:auto;">${resHTML}</div>
    <button onclick="applyAllDamage(${JSON.stringify(results.map(r=>({id:r.tok.id,dmg:r.finalDmg})))})"
      style="width:100%;margin-top:8px;padding:9px;background:#ef4444;border:none;border-radius:9px;color:#fff;font-size:12px;font-weight:900;cursor:pointer;font-family:'Cairo',sans-serif;">
      ✓ تطبيق الضرر على الجميع
    </button>
  `;
  document.getElementById('dmg-popups-layer').appendChild(el);
  setTimeout(()=> makeDraggableEl(el, document.getElementById(dragId)), 50);
}

function applyDamageToToken(tokId, dmg){
  const tok = state.tokens.find(t=>t.id===tokId);
  if(!tok) return;
  tok.hp = Math.max(0, (tok.hp||0) - dmg);
  const el = document.getElementById('tok_'+tokId);
  if(el){ el.remove(); renderToken(tok); }
  Object.keys(openPopups).forEach(pid=>{
    if(openPopups[pid]) refreshPopupBars(pid);
  });
  saveBfState();
  showToast(`💥 ${tok.name}: −${dmg} HP → ${tok.hp}`);
}

function applyAllDamage(list){
  list.forEach(({id, dmg})=> applyDamageToToken(id, dmg));
}

/* Generic draggable helper */
function makeDraggableEl(el, handle){
  if(!handle) return;
  let sx,sy,sl,st,drag=false;
  const dn=e=>{
    drag=true; el.style.zIndex=nextDmgZ();
    const ev=e.touches?e.touches[0]:e;
    sx=ev.clientX;sy=ev.clientY;
    sl=parseInt(el.style.left)||0;st=parseInt(el.style.top)||0;
    e.preventDefault();
  };
  const dm=e=>{
    if(!drag)return;
    const ev=e.touches?e.touches[0]:e;
    el.style.left=Math.max(0,Math.min(window.innerWidth-320,sl+(ev.clientX-sx)))+'px';
    el.style.top =Math.max(0,Math.min(window.innerHeight-100,st+(ev.clientY-sy)))+'px';
    e.preventDefault();
  };
  const du=()=>{drag=false;};
  handle.addEventListener('mousedown',dn);
  handle.addEventListener('touchstart',dn,{passive:false});
  window.addEventListener('mousemove',dm);
  window.addEventListener('touchmove',dm,{passive:false});
  window.addEventListener('mouseup',du);
  window.addEventListener('touchend',du);
}
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ closeAllPopups(); closeModal(); }
  if(!selectedTokenId) return;
  const step = 1;
  if(e.key==='ArrowUp')    { e.preventDefault(); moveToken(selectedTokenId, 0, -step); }
  if(e.key==='ArrowDown')  { e.preventDefault(); moveToken(selectedTokenId, 0,  step); }
  if(e.key==='ArrowLeft')  { e.preventDefault(); moveToken(selectedTokenId,  step, 0); }
  if(e.key==='ArrowRight') { e.preventDefault(); moveToken(selectedTokenId, -step, 0); }
  if(e.key==='Delete'||e.key==='Backspace'){ removeToken(selectedTokenId); }
});
