/* دوال Supabase الأساسية */
const sbFetchAll = async () => {
  const { data, error } = await _sb
    .from("characters")
    .select("*")
    .order("created_at", { ascending: false });
  if(error){ console.warn("sbFetchAll:", error.message); return null; }
  return data.map(rowToNpc);
};

const sbUpsert = async (npc) => {
  const row = npcToRow(npc);
  const { error } = await _sb.from("characters").upsert(row, { onConflict: "id" });
  if(error) console.warn("sbUpsert:", error.message);
  return !error;
};

const sbDelete = async (id) => {
  const { error } = await _sb.from("characters").delete().eq("id", String(id));
  if(error) console.warn("sbDelete:", error.message);
  return !error;
};

  if(roll<=50)  return {label:"عادي",    color:"#d1d5db"};
  if(roll<=70)  return {label:"جيد",     color:"#22c55e"};
  if(roll<=85)  return {label:"ممتاز",   color:"#3b82f6"};

};

const rollStartingItems = (difficulty="normal") => {
  const qualityBonus = {normal:0, hard:10, veryHard:20, hell:40}[difficulty]||0;
  const qualityRange  = {normal:100, hard:90, veryHard:80, hell:60}[difficulty]||100;
  const guaranteedCount = {normal:0, hard:2, veryHard:4, hell:6}[difficulty]||0;

  const rollQuality = () => {
    const raw = Math.floor(Math.random()*qualityRange)+1+qualityBonus;
    const capped = Math.min(raw,100);
    return { qualityRoll:capped, ...ITEM_QUALITY(capped) };
  };

  const r = Math.random()*100;
  let randomCount = 0;
  if(r < 30)       randomCount = 0;
  else if(r < 60)  randomCount = 1;
  else if(r < 80)  randomCount = 2;
  else if(r < 90)  randomCount = 3;
  else if(r < 95)  randomCount = 4;
  else             randomCount = 5;

  const totalCount = guaranteedCount + randomCount;
  const chosen = [];
  const pool = [...ITEMS_POOL];
  for(let i=0; i<totalCount; i++){
    if(!pool.length) break;
    const idx = Math.floor(Math.random()*pool.length);
    const q = rollQuality();
    chosen.push({
      id: Date.now()+Math.random()+i,
      name: pool.splice(idx,1)[0],
      qualityRoll: q.qualityRoll,
      qualityLabel: q.label,
      qualityColor: q.color,
      damage:"", notes:"",
      isGuaranteed: i < guaranteedCount,
    });
  }
  return chosen;
};

const calcBarrierLinks = (barrierSkill, stats) => {
  if(!barrierSkill) return null;
  const barrierVal = (parseInt(barrierSkill.bonus)||0) + (parseInt(barrierSkill.extraBonus)||0);
  const bindStat = barrierSkill.bindingStat || barrierSkill.stat;
  const degree = BINDING_DEGREE(0, barrierSkill.level) || "ثالثة"; // placeholder

  // ربط البراعة: البراعة ترتفع بنسبة معينة من قيمة الحاجز
  const dexPct = bindStat==="البراعة" ? (degree==="ثالثة"?0.25:degree==="ثانية"?0.35:0.35) : 0;
  const dexBonus = dexPct>0 ? Math.floor(barrierVal * dexPct) : 0;

  // ربط القوة: الحاجز يزيد بنسبة معينة من سمة القوة
  const strStat = stats?.find(s=>s.name==="القوة");
  const strVal = strStat?.value || 0;
  const strPct = bindStat==="القوة" ? (degree==="ثالثة"?0.20:degree==="ثانية"?0.25:0.30) : 0;
  const strBonus = strPct>0 ? Math.floor(strVal * strPct) : 0;

  return { dexBonus, strBonus, barrierVal, bindStat, degree };
};

/* جدول المستويات — يمتد حتى 100+ */
const buildLevelTable = () => {
  const t=[]; let def=0,dmg=0,hm=1.0;
  // المستويات 0 ~ 20 (الأصلية)
  for(let lv=0;lv<=20;lv++){
    if(lv===0){t.push({defense:0,dmgReduce:0,halaMult:1.0,halaBonus:0,defenseBonus:0,dmgReduceBonus:0});continue;}
    def+=lv<=10?1:lv<=15?2:lv<=19?5:10;
    if(dmg<90) dmg=Math.min(90,dmg+5);
    hm+=lv<=10?0.25:lv<=17?0.50:1.00;
    t.push({defense:def,dmgReduce:dmg,halaMult:Math.round(hm*100)/100,halaBonus:0,defenseBonus:0,dmgReduceBonus:0});
  }
  // المستويات 21+ — إضافات تراكمية فوق قيم Lv20
  const base20 = t[20];
  let bonHala=0,bonDef=0,bonDmg=0; // تراكم فوق Lv20
  for(let lv=21;lv<=200;lv++){
    if(lv<=30)      { bonHala+=100; bonDef+=10; bonDmg+=0.5; }
    else if(lv<=40) { bonHala+=200; bonDef+=15; bonDmg+=0.25; }
    else if(lv<=50) { bonHala+=300; bonDef+=20; bonDmg+=0.125; }
    else if(lv<=60) { bonHala+=500; bonDef+=30; bonDmg+=0.0625; }
    else if(lv<=70) { bonHala+=750; bonDef+=40; bonDmg+=0.03125; }
    else            { bonHala+=1500; bonDef+=100; bonDmg+=0; }
    const newDmg = Math.min(99.9999, base20.dmgReduce + bonDmg);
    t.push({
      defense: base20.defense + bonDef,
      dmgReduce: Math.round(newDmg*10000)/10000,
      halaMult: base20.halaMult,
      halaBonus: bonHala,
      defenseBonus: bonDef,
      dmgReduceBonus: Math.round(bonDmg*10000)/10000,
    });
  }
  return t;
};

    1000000,  // lv17 → lv18
    1250000,  // lv18 → lv19
    1500000,  // lv19 → lv20
  ];
  const cumulative = [0]; // cumulative[lv] = XP الإجمالي للوصول للمستوى lv
  let total = 0;
  for(let i=0;i<stepCosts.length;i++){
    total += stepCosts[i];
    cumulative.push(total); // cumulative[i+1]
  }
  // المستويات 21+
  for(let lv=21;lv<=300;lv++){
    let cost;
    if(lv<=25)      cost=500000;
    else if(lv<=30) cost=750000;
    else if(lv<=40) cost=2000000;
    else if(lv<=50) cost=5000000;
    else if(lv<=60) cost=10000000;
    else if(lv<=70) cost=15000000;
    else            cost=20000000;
    total += cost;
    cumulative.push(total);
  }
  return cumulative; // XP_TABLE[lv] = XP للوصول للمستوى lv
})();

/* حساب معامل XP حسب درجة الحياة */
const xpMultiplier = (lifeGrade) => {
  if(lifeGrade === "5") return 3;
  if(["4","4 خاصة"].includes(lifeGrade)) return 2;
  return 1;
};

/* حساب المستوى من XP الإجمالي */
const xpToLevel = (xp, lifeGrade="3") => {
  const mult = xpMultiplier(lifeGrade);
  for(let lv=1;lv<XP_TABLE.length;lv++){
    if(xp < XP_TABLE[lv] * mult) return lv - 1;
  }
  return XP_TABLE.length - 1;
};

/* XP الإجمالي عند بداية مستوى معين */
const xpAtLevel = (lv, lifeGrade="3") => {
  const mult = xpMultiplier(lifeGrade);
  return (XP_TABLE[lv] || XP_TABLE[XP_TABLE.length-1]) * mult;
};

/* XP المطلوب للمستوى التالي (إجمالي) */
const xpForNextLevel = (lv, lifeGrade="3") => {
  const mult = xpMultiplier(lifeGrade);
  if(!XP_TABLE[lv+1]) return null;
  return XP_TABLE[lv+1] * mult;
};

/* XP المُجمَّع داخل المستوى الحالي */
const xpInCurrentLevel = (xp, lv, lifeGrade="3") => {
  return Math.max(0, xp - xpAtLevel(lv, lifeGrade));
};

/* حجم XP للمستوى الواحد */
const xpRangeOfLevel = (lv, lifeGrade="3") => {
  const mult = xpMultiplier(lifeGrade);
  const from = XP_TABLE[lv] || 0;
  const to   = XP_TABLE[lv+1] || XP_TABLE[lv] || 1;
  return Math.max(1, (to - from) * mult);
};

/* ══ كلاس عشوائي (من الجدول العام) ══ */
const rollOneClass = (animal,canBeDark=false,excludeAnimal=null,allowedEls=null,allowedSchools=null) => {
  const ce=rollT(CLASS_TABLE);
  let cls=ce.name,sub="";
  if(cls==="عنصري"){
    const elPool = canBeDark ? [...ELEMENTS,"ظلام"] : [...ELEMENTS];
    const filtered = allowedEls&&allowedEls.length>0 ? elPool.filter(e=>allowedEls.includes(e)) : elPool;
    sub=pick(filtered.length>0?filtered:elPool);
  } else if(cls==="سحري"){
    const filtered = allowedSchools&&allowedSchools.length>0 ? MAGIC_SCHOOLS.filter(s=>allowedSchools.includes(s)) : MAGIC_SCHOOLS;
    sub=pick(filtered.length>0?filtered:MAGIC_SCHOOLS);
  } else if(cls==="خرافي") {
    const animalPool = excludeAnimal ? ANIMALS.filter(a=>a!==excludeAnimal) : ANIMALS;
    sub=animal&&animal!==excludeAnimal?animal:pick(animalPool);
  }
  return {cls,sub,path:""};
};

/* ══ كلاس عشوائي مقيّد بدرجة الحياة ══ */
const rollOneClassByGrade = (animal,lifeGrade,canBeDark=false,excludeAnimal=null,allowedEls=null,allowedSchools=null,excludeElemental=false) => {
  const allowed=(CLASSES_BY_LIFE_GRADE[lifeGrade]||CLASSES_BY_LIFE_GRADE["3"]).filter(c=>!(excludeElemental&&c==="عنصري"));
  const pool = allowed.length>0?allowed:(CLASSES_BY_LIFE_GRADE[lifeGrade]||CLASSES_BY_LIFE_GRADE["3"]);
  const name=pick(pool);
  let sub="";
  if(name==="عنصري"){
    const elPool = canBeDark ? [...ELEMENTS,"ظلام"] : [...ELEMENTS];
    const filtered = allowedEls&&allowedEls.length>0 ? elPool.filter(e=>allowedEls.includes(e)) : elPool;
    sub=pick(filtered.length>0?filtered:elPool);
  } else if(name==="سحري"){
    const filtered = allowedSchools&&allowedSchools.length>0 ? MAGIC_SCHOOLS.filter(s=>allowedSchools.includes(s)) : MAGIC_SCHOOLS;
    sub=pick(filtered.length>0?filtered:MAGIC_SCHOOLS);
  } else if(name==="خرافي") {
    const animalPool = excludeAnimal ? ANIMALS.filter(a=>a!==excludeAnimal) : ANIMALS;
    sub=animal&&animal!==excludeAnimal?animal:pick(animalPool);
  }
  return {cls:name,sub,path:""};
};

/* ══ بناء الكلاسات حسب العرق والتنين ══ */
const buildClasses = (race,animal,dragonDegree,lifeGrade="3",allowedEls=null,allowedSchools=null) => {
  if(race==="بهائم الظلام"||race==="وحش الظلام"){
    // الكلاس الأول: عنصري ظلام دائماً
    // الكلاس الثاني: عنصري بعنصر آخر (من المسموحة) أو كلاس مختلف
    // نسمح بالعنصري لكن نمنع الظلام تحديداً
    const cls2 = rollOneClassByGrade(animal,lifeGrade,false,animal,allowedEls,allowedSchools,false);
    // إذا جاء عنصري ظلام مجدداً، نبدل بعنصر آخر
    if(cls2.cls==="عنصري" && cls2.sub==="ظلام"){
      const elPool = allowedEls&&allowedEls.length>0 ? allowedEls.filter(e=>e!=="ظلام") : ELEMENTS;
      cls2.sub = pick(elPool.length>0 ? elPool : ELEMENTS);
    }
    return [{cls:"عنصري",sub:"ظلام",path:""}, {...cls2,path:""}];
  }
  if(race==="سكارد"){
    const sk1=rollOneClassByGrade(null,lifeGrade,false,null,allowedEls,allowedSchools);
    const hasEl=sk1.cls==="عنصري";
    const sk2=rollOneClassByGrade(null,lifeGrade,false,null,allowedEls,allowedSchools,hasEl);
    return [sk1, sk2, {cls:"روحاني",sub:""}];
  }
  if(race==="ساروفيان خرافي"){
    const cls1=rollOneClassByGrade(animal,"4",false,null,allowedEls,allowedSchools);
    const hasEl1=cls1.cls==="عنصري";
    const cls2=rollOneClassByGrade(animal,"4",false,null,allowedEls,allowedSchools,hasEl1);
    if(cls1.cls==="خرافي"&&cls1.sub===animal){const pool=ANIMALS.filter(a=>a!==animal);cls1.sub=pick(pool);}
    if(cls2.cls==="خرافي"&&cls2.sub===animal){const pool=ANIMALS.filter(a=>a!==animal);cls2.sub=pick(pool);}
    return [cls1,cls2];
  }
  if(race==="سيلافين"){
    return [{cls:"سيلافيني",sub:""}];
  }
  if(race==="آلزاداكايند"){
    const elPool2 = allowedEls&&allowedEls.length>0 ? ELEMENTS.filter(e=>allowedEls.includes(e)) : ELEMENTS;
    const elementCls={cls:"عنصري",sub:pick(elPool2.length>0?elPool2:ELEMENTS)};
    if(dragonDegree==="أولى"){
      // كلاسان إضافيان، كلاهما بدون عنصري
      return [elementCls, rollOneClassByGrade(animal,lifeGrade,false,animal,allowedEls,allowedSchools,true), rollOneClassByGrade(animal,lifeGrade,false,animal,allowedEls,allowedSchools,true)];
    }
    return [elementCls, rollOneClassByGrade(animal,lifeGrade,false,animal,allowedEls,allowedSchools,true)];
  }
  return [rollOneClassByGrade(animal,lifeGrade,false,animal,allowedEls,allowedSchools)];
};

/* ══ نسب المستويات النادرة بناءً على المستوى والخلفية ══ */
const getRareChances = (level,bgValue) => {
  const lvFactor  = level/20;   // 0~1
  const bgFactor  = bgValue/98; // 0~1
  const combined  = (lvFactor*0.7+bgFactor*0.3);
  return {
    azali:   0.01+combined*0.04,   // 1٪ ~ 5٪
    badai:   0.10+combined*0.20,   // 10٪ ~ 30٪
    elahi:   0.25+combined*0.30,   // 25٪ ~ 55٪
    nabawi:  0.40+combined*0.35,   // 40٪ ~ 75٪
  };
};

/* ══ اختيار مستوى المهارة مع نسب النادر ══ */
const pickSkillLevel = (affordable,level,bgValue) => {
  // الأزلي يتطلب مستوى 18+
  const eff=level>=18?affordable:affordable.filter(l=>l!=="أزلي");
  const ch=getRareChances(level,bgValue);
  const r=Math.random();
  const tryRare = [
    {name:"أزلي",  chance:ch.azali},
    {name:"بدائي", chance:ch.badai},
    {name:"إلهي",  chance:ch.elahi},
    {name:"نبوي",  chance:ch.nabawi},
  ];
  for(const {name,chance} of tryRare){
    if(r<chance && eff.includes(name)) return name;
  }
  const normals=eff.filter(l=>!["أزلي","بدائي","إلهي","نبوي"].includes(l));
  return normals.length?pick(normals):pick(eff.length?eff:affordable);
};

/* ══ توزيع المهارات ══ */
const STAT_WEIGHTS_NORMAL = {"القوة":1,"البأس":1,"المعرفة":1,"البراعة":1,"الذكاء":1,"الكاريزما":1};
const STAT_WEIGHTS_ANIMAL = {"القوة":3,"البأس":3,"المعرفة":0.1,"البراعة":2,"الذكاء":0.2,"الكاريزما":0.1};
const STAT_WEIGHTS_SMART  = {"القوة":0.6,"البأس":0.6,"المعرفة":1.8,"البراعة":1,"الذكاء":1.8,"الكاريزما":1.4};

const pickStatByWeight = (weights) => {
  const keys=Object.keys(weights);
  const total=keys.reduce((s,k)=>s+weights[k],0);
  let r=Math.random()*total;
  for(const k of keys){r-=weights[k];if(r<=0)return k;}
  return keys[0];
};

const distributeSkills = (totalPoints,race,level,bgValue,difficulty="normal",eyeType=null,dragonParts=[]) => {
  const isAnimal = ["حيوان","بهائم الظلام","رؤوس الكلاب"].includes(race);
  const isSmart  = ["إنسان","إتشيرما","سيلافين","سكارد"].includes(race);
  const isDarkBeast = race==="بهائم الظلام"||race==="وحش الظلام";
  const isItchirma = race==="إتشيرما";
  const isDragon = race==="آلزاداكايند";
  const weights  = isAnimal?STAT_WEIGHTS_ANIMAL:isSmart?STAT_WEIGHTS_SMART:STAT_WEIGHTS_NORMAL;
  const skills   = [];
  let remaining  = totalPoints;
  const used     = new Set();
  const levelKeys= Object.keys(SKILL_LEVEL_COST).filter(k=>k!=="غير متعلم");

  // التنانين يركزون على مهارات الأعضاء أولاً
  if(isDragon && dragonParts.length>0){
    dragonParts.forEach(part=>{
      const limbInfo=DRAGON_LIMB_DATA[part];
      if(!limbInfo||remaining<1) return;
      const affordable=levelKeys.filter(l=>SKILL_LEVEL_COST[l]<=remaining);
      if(!affordable.length) return;
      const lv=pickSkillLevel(affordable,level,bgValue);
      const lvObj=SKILL_LEVELS.find(l=>l.name===lv);
      skills.push({id:Date.now()+Math.random(),name:limbInfo.skillName,stat:limbInfo.stat,
        level:lv,bonus:lvObj?.bonus||"+2",extraBonus:0,
        isBarrier:true,bindingStat:limbInfo.stat,isLimbSkill:true,limbPart:part});
      remaining-=SKILL_LEVEL_COST[lv];
      used.add(limbInfo.skillName);
    });
    // التنانين يحصلون على الحاجز أيضاً بعد مهارات الأعضاء
    if(remaining>=1&&Math.random()<0.90){
      const affordable=levelKeys.filter(l=>SKILL_LEVEL_COST[l]<=remaining);
      if(affordable.length){
        const lv=pickSkillLevel(affordable,level,bgValue);
        const lvObj=SKILL_LEVELS.find(l=>l.name===lv);
        const bStat=BINDING_STATS.filter(s=>s!=="الحظ")[0];
        skills.push({id:Date.now()+Math.random(),name:"الحاجز",stat:bStat,level:lv,
          bonus:lvObj?.bonus||"+2",extraBonus:0,isBarrier:true,bindingStat:bStat});
        remaining-=SKILL_LEVEL_COST[lv];
        used.add("الحاجز");
      }
    }
  }
  // الإتشيرما يبدأ بمهارة العين بدلاً من الحاجز
  else if(isItchirma && eyeType && EYE_DATA[eyeType]) {
    const eyeInfo = EYE_DATA[eyeType];
    const affordable=levelKeys.filter(l=>SKILL_LEVEL_COST[l]<=remaining);
    if(affordable.length && remaining>=1){
      const lv=pickSkillLevel(affordable,level,bgValue);
      const lvObj=SKILL_LEVELS.find(l=>l.name===lv);
      skills.push({id:Date.now()+Math.random(),name:eyeInfo.skillName,stat:"البأس",
        level:lv,bonus:lvObj?.bonus||"+2",extraBonus:0,isBarrier:true,bindingStat:"البأس",isEyeSkill:true});
      remaining-=SKILL_LEVEL_COST[lv];
      used.add(eyeInfo.skillName);
    }
  }
  // الحاجز أولاً للأعراق الذكية (غير الإتشيرما)
  else {
    const barrierChance=isDarkBeast?0.88:isSmart?0.90:isAnimal?0.30:0.65;
    if(Math.random()<barrierChance&&remaining>=1){
      const affordable=levelKeys.filter(l=>SKILL_LEVEL_COST[l]<=remaining);
      const lv=pickSkillLevel(affordable,level,bgValue);
      const lvObj=SKILL_LEVELS.find(l=>l.name===lv);
      const bStat=pick(BINDING_STATS.filter(s=>s!=="الحظ"));
      skills.push({id:Date.now()+Math.random(),name:"الحاجز",stat:bStat,level:lv,bonus:lvObj?.bonus||"+2",extraBonus:0,isBarrier:true,bindingStat:bStat,specializations:[]});
      remaining-=SKILL_LEVEL_COST[lv];
      used.add("الحاجز");
    }
  }

  for(let iter=0;iter<300&&remaining>0;iter++){
    const stat    =pickStatByWeight(weights);
    // استبعاد المهارات الحرفية من الحيوانات والبهائم
    const pool    =(SKILLS_BY_STAT[stat]||[]).filter(n=>!used.has(n)&&!(isAnimal&&CRAFT_SKILLS.has(n)));
    if(!pool.length) continue;
    const skillName=pick(pool);
    const affordable=levelKeys.filter(l=>SKILL_LEVEL_COST[l]<=remaining);
    if(!affordable.length) break;
    const lv   =pickSkillLevel(affordable,level,bgValue);
    const lvObj=SKILL_LEVELS.find(l=>l.name===lv);
    const specializations=[];
    // نسبة 15٪ للحصول على تخصص مع كل مهارة
    const availableSpecs=SPECIALIZATIONS_BY_SKILL[skillName]||[];
    if(availableSpecs.length>0&&Math.random()<0.15){
      const spec=pick(availableSpecs);
      specializations.push({id:Date.now()+Math.random(),name:spec,level:"متعلم",bonus:"+2",extraBonus:0});
    }
    skills.push({id:Date.now()+Math.random(),name:skillName,stat,level:lv,bonus:lvObj?.bonus||"+2",extraBonus:0,isBarrier:false,bindingStat:null,specializations});
    remaining-=SKILL_LEVEL_COST[lv];
    used.add(skillName);
  }

  /* ══ ضمان الحد الأدنى للمهارات حسب المستوى والصعوبة ══ */
  const minSkillMultiplier = {normal:1, hard:1.5, veryHard:2, hell:2.5}[difficulty]||1;
  const minSkillCount = Math.ceil(level * minSkillMultiplier);
  // نطاق المستويات المسموح به لمهارات التعويض
  const fillRange = {
    normal:  ["متعلم","خبير","متقدم","متقن"],
    hard:    ["متعلم","خبير","متقدم","متقن","أستاذ"],
    veryHard:["متعلم","خبير","متقدم","متقن","أستاذ","قديس"],
    hell:    ["خبير","متقدم","متقن","أستاذ","قديس","نبوي"],
  }[difficulty]||["متعلم","خبير","متقدم","متقن"];

  // احسب عدد المهارات الحقيقية (بدون حاجز السكارد)
  const realSkillCount = skills.filter(s=>!s.isSakardBonus).length;
  if(realSkillCount < minSkillCount){
    const toAdd = minSkillCount - realSkillCount;
    let addIter = 0;
    while(addIter < toAdd * 5 && skills.filter(s=>!s.isSakardBonus).length < minSkillCount){
      const stat = pickStatByWeight(weights);
      const pool = (SKILLS_BY_STAT[stat]||[]).filter(n=>!used.has(n)&&!(isAnimal&&CRAFT_SKILLS.has(n)));
      if(!pool.length){ addIter++; continue; }
      const skillName = pick(pool);
      const lv = pick(fillRange);
      const lvObj = SKILL_LEVELS.find(l=>l.name===lv);
      const fillerSpecs=[];
      const availFs=SPECIALIZATIONS_BY_SKILL[skillName]||[];
      if(availFs.length>0&&Math.random()<0.15) fillerSpecs.push({id:Date.now()+Math.random(),name:pick(availFs),level:"متعلم",bonus:"+2",extraBonus:0});
      skills.push({id:Date.now()+Math.random(),name:skillName,stat,level:lv,bonus:lvObj?.bonus||"+2",extraBonus:0,isBarrier:false,bindingStat:null,isFiller:true,specializations:fillerSpecs});
      used.add(skillName);
      addIter++;
    }
  }

  return skills;
};

/* ══ بونسات السمات من المهارات ══ */
const calcSkillBonuses = (skills) => {
  const b={}; STAT_NAMES.forEach(s=>b[s]=0);
  for(const sk of skills){
    const bonus=SKILL_STAT_BONUS[sk.level];
    if(bonus&&b[sk.stat]!==undefined) b[sk.stat]+=bonus;
  }
  return b;
};

const calcLearnPoints = (bgVal,kno,dex,isHuman) => {
  const base=Math.ceil(bgVal/10)+kno+Math.floor(dex/2);
  return isHuman?Math.floor(base*1.5):base;
};

/* ══ الاستحقاق ══ */
const rollWorthiness = (gender,race) => {

  if(gender==="أنثى"){
    raw=d(11)+d(11); // 2d11
  } else {
    raw=d(16)-6; // 1d16-6
  }
  raw=Math.floor(raw/2);
  if(race==="بهائم الظلام"||race==="حيوان") raw=raw-5;
  else if(race==="رؤوس الكلاب") raw=raw-3;
  return raw; // يُسمح بالسالب
};

/* ══ جودة النواة ══ */
const coreLabel = r => r<=20?"نواة هشة":r<=40?"نواة عادية":r<=60?"نواة قوية":r<=75?"نواة ممتازة":r<=90?"نواة أسطورية":"نواة إلهية";

/* ═══════════════════════════════════════════ STRENGTH PERKS ENGINE ═══════════════════════════════════════════ */

/*
 * حساب عدد مميزات القوة النشطة (كل perk من القوة ≥ min يُحسب كـ "مستوى")
 * هذا يُستخدم لحساب "كل مستوى قادم"
 */
const getActivePerkCount = (statValue, statName) => {
  const perks = STAT_PERKS[statName] || [];
  return perks.filter(p => !p.isNeg && statValue >= (p.min||0)).length;
};

/*
 * تطبيق مميزات القوة على الإحصائيات
 * يُستدعى بعد حساب الإحصائيات الأساسية ويُعيد كائن التعديلات
 */
const applyStrengthPerks = (strVal, skills, stamina, physStrPctBase, size, worthiness) => {
  const count = getActivePerkCount(strVal, "القوة");
  // count = عدد المميزات النشطة، يُستخدم لحساب "كل مستوى قادم"
  // المميزات النشطة بالترتيب: 8،10،12،20،30،50
  // كل مستوى قادم = كل perk إضافية بعد الأولى

  let worthinessBonus = 0;      // من perk 8
  let physStrMult = 1.0;        // مضاعف معادلة القوة (تراكمي)
  let sizeBonus = 0;            // بونس حجم إضافي
  let speedBonus = 0;           // بونس سرعة من perk 12
  let immunityBonus = 0;        // مناعة إضافية من perk 30
  let physStrPctAdd = 0;        // ٪ إضافية على معادلة القوة قبل المضاعفة

  // تتبع ترتيب الـ perks لحساب "كل مستوى قادم"
  let p8Active  = strVal >= 8;
  let p10Active = strVal >= 10;
  let p12Active = strVal >= 12;
  let p20Active = strVal >= 20;
  let p30Active = strVal >= 30;
  let p50Active = strVal >= 50;

  // عدد المميزات بعد كل واحدة (للـ "مستوى قادم")
  // p8 = مستوى 1، p10 = مستوى 2، p12 = مستوى 3، p20 = مستوى 4، p30 = مستوى 5، p50 = مستوى 6
  const p8Idx  = p8Active  ? 1 : 0;
  const p10Idx = p10Active ? 2 : 0;
  const p12Idx = p12Active ? 3 : 0;
  const p20Idx = p20Active ? 4 : 0;
  const p30Idx = p30Active ? 5 : 0;

  // ═══ perk 8: نعمة منذ الولادة ═══
  // استحقاق +1، ثم +0.5 لكل perk قوة قادم
  if(p8Active){
    const subsequentCount = count - 1; // perks بعد هذه
    worthinessBonus += 1 + (subsequentCount * 0.5);
  }

  // ═══ perk 10: رياضي محترف ═══
  // 10٪+ معادلة قوة وحجم، +5٪ لكل مستوى قادم
  if(p10Active){
    const subsequentCount = count - p10Idx; // perks بعد هذه (p12،p20،p30،p50)
    const physBonus = 10 + (subsequentCount * 5);
    physStrPctAdd += physBonus;
    sizeBonus += physBonus; // حجم إضافي بنفس النسبة تقريباً (سنضيف سم)
  }

  // ═══ perk 12: خاطف ═══
  // 3+ سرعة، +1 لكل مستوى قادم (أي كل perk قوة بعدها)
  if(p12Active){
    const subsequentCount = count - p12Idx;
    speedBonus += 3 + subsequentCount;
  }

  // ═══ perk 20: قوم عاد ═══
  // لكل نقطة ستامينا → ضرر 3٪ إضافي (يُعرض في الواجهة)
  // لا يؤثر على الإحصائيات المحسوبة مباشرة — يُعرض كنص

  // ═══ perk 30: عضلات العمالقة ═══
  // معادلة القوة ×1.5 إجمالاً
  // مناعة إضافية = مجموع مهارات الحواس (الشم + السمع + البصر)
  if(p30Active){
    physStrMult *= 1.5;
    // المناعة تُحسب خارجاً من المهارات
    const smellSk  = skills.find(s=>s.name==="الشم");
    const hearSk   = skills.find(s=>s.name==="السمع");
    const sightSk  = skills.find(s=>s.name==="البصر");
    const smellB   = smellSk  ? (parseInt(smellSk.bonus)||0)+(parseInt(smellSk.extraBonus)||0)  : 0;
    const hearB    = hearSk   ? (parseInt(hearSk.bonus)||0)+(parseInt(hearSk.extraBonus)||0)   : 0;
    const sightB   = sightSk  ? (parseInt(sightSk.bonus)||0)+(parseInt(sightSk.extraBonus)||0) : 0;
    immunityBonus += smellB + hearB + sightB;
  }

  // ═══ perk 50: قوة سماوية ═══
  // معادلة القوة ×2 بدل ×1.5
  if(p50Active){
    // إذا كان perk 30 نشطاً، نلغي الـ 1.5 ونضع 2.0
    if(p30Active) physStrMult = (physStrMult / 1.5) * 2.0;
    else           physStrMult *= 2.0;
  }

  return {
    worthinessBonus: Math.round(worthinessBonus * 10) / 10,
    physStrPctAdd,
    physStrMult,
    speedBonus,
    immunityBonus,
    sizeBonus: Math.round(sizeBonus * 0.5), // تحويل ٪ إلى سنتيمترات تقريبية
    // للعرض في الوضع القتالي
    p20DamagePerStamina: p20Active ? 3 : 0,
    p50NearbyDamageRangeMeters: p50Active ? Math.floor(strVal / 10) : 0,
    activeStrPerkCount: count,
    // مهارات تنتقل تحت القوة عند perk 50
    p50TransferSkills: p50Active ? ["خفة اليد","التسلل","المرونة"] : [],
  };
};

/* تطبيق نتائج مميزات القوة على كائن الشخصية الكامل */
const applyStrengthPerksToNpc = (npcData) => {
  const strVal = npcData.stats?.find(s=>s.name==="القوة")?.value || 0;
  if(strVal < 8) return { ...npcData, strPerkEffects: null };

  const perksResult = applyStrengthPerks(
    strVal,
    npcData.skills || [],
    npcData.stamina || 1,
    npcData.physStrPct || 0,
    npcData.size || 170,
    npcData.worthiness || 1
  );

  // تطبيق التعديلات الحسابية
  let physStrPct = npcData.physStrPct || 0;
  // أضف physStrPctAdd أولاً، ثم اضرب بالمضاعف
  physStrPct = Math.round((physStrPct + perksResult.physStrPctAdd) * perksResult.physStrMult);

  const worthiness = Math.round((npcData.worthiness || 1) + perksResult.worthinessBonus);
  const immunity   = (npcData.immunity || 0) + perksResult.immunityBonus;
  const size       = (npcData.size || 170) + perksResult.sizeBonus;

  // مهارة السرعة: إضافة أو تحديث
  let skills = [...(npcData.skills || [])];
  if(perksResult.speedBonus > 0){
    const speedIdx = skills.findIndex(s=>s.name==="السرعة");
    if(speedIdx >= 0){
      skills[speedIdx] = {
        ...skills[speedIdx],
        extraBonus: (parseInt(skills[speedIdx].extraBonus)||0) + perksResult.speedBonus,
      };
    } else {
      skills.push({
        id: Date.now()+Math.random(),
        name:"السرعة",
        stat:"القوة",
        level:"غير متعلم",
        bonus:"+0",
        extraBonus: perksResult.speedBonus,
        isBarrier: false,
        bindingStat: null,
        isPerkBonus: true,
      });
    }
  }

  // مهارات perk 50 تنتقل تحت القوة
  if(perksResult.p50TransferSkills.length > 0){
    skills = skills.map(sk => {
      if(perksResult.p50TransferSkills.includes(sk.name)){
        return { ...sk, stat:"القوة", _transferredByPerk50:true };
      }
      return sk;
    });
  }

  return {
    ...npcData,
    physStrPct,
    worthiness,
    immunity,
    size,
    skills,
    strPerkEffects: perksResult,
  };
};


/* ═══════════════════════════════════════════ BAS PERKS ENGINE ═══════════════════════════════════════════ */

const applyBasPerks = (basVal, skills, defense, hp, baseHP, hpPer, size) => {
  const count = getActivePerkCount(basVal, "البأس");

  // فهرس كل perk
  const p10Active = basVal >= 10;
  const p12Active = basVal >= 12;
  const p15Active = basVal >= 15;
  const p30Active = basVal >= 30;
  const p50Active = basVal >= 50;

  // عدد المميزات بعد كل واحدة (للـ "مستوى قادم")
  // p8=1، p10=2، p12=3، p15=4، p20=5، p25=6، p30=7، p50=8
  const p10Idx = p10Active ? 2 : 0;
  const p12Idx = p12Active ? 3 : 0;
  const p15Idx = p15Active ? 4 : 0;
  const p30Idx = p30Active ? 7 : 0;

  let hpAdd          = 0;     // إضافة ثابتة للصحة (مدرعة)
  let hpMult         = 1.0;   // مضاعف الصحة الكلي
  let sixthSenseBonus= 0;     // بونس حاسة سادسة (p12)
  let sizeBonus      = 0;     // زيادة حجم ٪ (p15، p50)
  let defBonusFromSize= 0;    // زيادة دفاع من الحجم (p15)
  let trueDefPercent = 0;     // دفاع حقيقي كنسبة من الدفاع (p30)
  let defCapPct      = 0;     // الحد الأقصى لزيادة الدفاع (p15)

  // ═══ perk 10: مدرعة ═══
  // معادلة الصحة ×1.5 + 2
  // مثال: 20 → (20×1.5)+2 = 32
  if(p10Active){
    hpMult *= 1.5;
    hpAdd  += 2;
  }

  // ═══ perk 12: حواس متوحشة ═══
  // 2+ حاسة سادسة، +1 لكل مستوى قادم
  if(p12Active){
    const subsequentCount = count - p12Idx;
    sixthSenseBonus = 2 + subsequentCount;
  }

  // ═══ perk 15: جبل بشري ═══
  // الحجم +50٪، الدفاع يرتفع بناءً على معادلة القوة
  // الحد الأقصى لزيادة الدفاع: 50٪ + 25٪ لكل perk قادم
  if(p15Active){
    sizeBonus = 0.50; // 50٪ إضافية على الحجم
    const subsequentCount = count - p15Idx;
    defCapPct = 0.50 + (subsequentCount * 0.25);
    // زيادة الدفاع = physStrPct (معادلة القوة) محدودة بالـ cap
    // تُحسب لاحقاً بعد معرفة physStrPct النهائي
  }

  // ═══ perk 30: لا يقهر ═══
  // دفاع حقيقي = 10٪ من الدفاع الأساسي
  if(p30Active){
    trueDefPercent = 0.10;
  }

  // ═══ perk 50: بأس السماوات والأرض ═══
  // صحة وحجم +50٪
  if(p50Active){
    hpMult *= 1.50;
    sizeBonus += 0.50;
  }

  return {
    hpMult,
    hpAdd,
    sixthSenseBonus,
    sizeBonus,        // نسبة إضافية على الحجم (0.5 = 50٪)
    defCapPct,        // حد أقصى لزيادة الدفاع
    trueDefPercent,   // دفاع حقيقي كنسبة من الدفاع
    activeBasPerkCount: count,
    p10Active, p12Active, p15Active, p30Active, p50Active,
  };
};

/* تطبيق مميزات البأس على الشخصية كاملة */
const applyBasPerksToNpc = (npcData) => {
  const basVal = npcData.stats?.find(s=>s.name==="البأس")?.value || 0;
  if(basVal < 10) return { ...npcData, basPerkEffects: null };

  // نحتاج baseHP وhpPer الأصليين — نحفظهم في الشخصية عند generate
  const baseHP   = npcData._baseHP   ?? 20;
  const hpPer    = npcData._hpPer    ?? 8;
  const fBas     = basVal; // نفس قيمة البأس

  const perksResult = applyBasPerks(
    basVal,
    npcData.skills || [],
    npcData.defense || 0,
    npcData.hp || 0,
    baseHP,
    hpPer,
    npcData.size || 170
  );

  // إعادة حساب الصحة مع mدرعة
  // الصحة الأساسية = baseHP + fBas × hpPer (الأصلي قبل أي perk)
  // بعد perk 10: (baseHP + fBas×hpPer×1.5 + 2) أو (baseHP × 1.5) + (fBas×hpPer×1.5) + 2
  // نطبق المضاعف على hpPer والإضافة الثابتة
  const newHpPer = Math.round(hpPer * perksResult.hpMult);
  const newHp    = baseHP + fBas * newHpPer + perksResult.hpAdd;

  // الحجم مع جبل بشري وبأس السماوات — نستخدم الحجم الأصلي قبل البيرك دائماً
  const origSize    = npcData._originalSize    ?? npcData.size    ?? 170;
  const origDefense = npcData._originalDefense ?? npcData.defense ?? 0;
  const origTrueDef = npcData._originalTrueDef ?? npcData.trueDefense ?? 0;

  const newSize = Math.round(origSize * (1 + perksResult.sizeBonus));

  // معادلة القوة بعد الحجم الجديد
  const newPhysStrPct = Math.floor(Math.max(0, newSize - 170) / 10) * 5;

  // زيادة الدفاع من الحجم (p15) — نستخدم الدفاع الأصلي قبل البيرك
  let newDefense = origDefense;
  if(perksResult.p15Active && perksResult.defCapPct > 0){
    const rawDefIncrease = Math.round(newPhysStrPct / 100 * origDefense);
    const maxIncrease    = Math.round(origDefense * perksResult.defCapPct);
    newDefense = origDefense + Math.min(rawDefIncrease, maxIncrease);
  }

  // الدفاع الحقيقي من p30
  let newTrueDef = origTrueDef;
  if(perksResult.trueDefPercent > 0){
    newTrueDef = Math.max(origTrueDef, Math.round(newDefense * perksResult.trueDefPercent));
  }

  // مهارة الحاسة السادسة + نقل الحواس الثلاثة تحت البأس (p12)
  let skills = [...(npcData.skills || [])];
  if(perksResult.p12Active){
    // 1. حاسة سادسة: أضف أو حدّث بالبونس
    if(perksResult.sixthSenseBonus > 0){
      const ssIdx = skills.findIndex(s=>s.name==="الحاسة السادسة");
      if(ssIdx >= 0){
        skills[ssIdx] = {
          ...skills[ssIdx],
          stat:"البأس",
          extraBonus: (parseInt(skills[ssIdx].extraBonus)||0) + perksResult.sixthSenseBonus,
        };
      } else {
        skills.push({
          id: Date.now()+Math.random(),
          name:"الحاسة السادسة",
          stat:"البأس",
          level:"غير متعلم",
          bonus:"+0",
          extraBonus: perksResult.sixthSenseBonus,
          isBarrier: false,
          bindingStat: null,
          isPerkBonus: true,
        });
      }
    }
    // 2. نقل الشم والسمع والبصر من القوة إلى البأس
    const sensesToTransfer = ["الشم","السمع","البصر"];
    skills = skills.map(sk => {
      if(sensesToTransfer.includes(sk.name) && sk.stat === "القوة"){
        return { ...sk, stat:"البأس", _movedByBasPerk12: true };
      }
      return sk;
    });
  }

  // ── بناء معادلة الصحة المحدّثة بعد البيرك ──
  let newHpFormula = npcData.hpFormula || `${baseHP} + بأس×${hpPer}`;
  if(perksResult.p10Active){
    newHpFormula = `${baseHP} + بأس×${newHpPer} + 2 (مدرعة)`;
  }
  if(perksResult.p50Active){
    newHpFormula = `${baseHP} + بأس×${newHpPer} + 2 (مدرعة+بأس السماوات)`;
  }

  // ── بناء معادلة الدفاع المحدّثة بعد البيرك ──
  let newDefFormula = npcData.defFormula || "";
  if(perksResult.p15Active){
    const capStr = Math.round(perksResult.defCapPct * 100);
    newDefFormula = `${origDefense} + معادلة القوة (حد ${capStr}٪) = ${newDefense}`;
  }

  return {
    ...npcData,
    hp: newHp,
    hpMax: newHp,
    _hpPerAfterPerk: newHpPer,
    size: newSize,
    physStrPct: newPhysStrPct,
    defense: newDefense,
    trueDefense: newTrueDef,
    skills,
    hpFormula: newHpFormula,
    defFormula: newDefFormula,
    basPerkEffects: perksResult,
  };
};


/* ═══════════════════════════════════════════ KNOWLEDGE / DEX / INT PERKS ═══════════════════════════════════════════ */

/* ── البراعة 8: غريزة لا واعية ──
   3+ مناعة، +1 لكل perk براعة قادم */
const applyDexPerksToNpc = (npcData) => {
  const dexVal = npcData.stats?.find(s=>s.name==="البراعة")?.value || 0;
  if(dexVal < 8) return { ...npcData, dexPerkEffects: null };

  const count = getActivePerkCount(dexVal, "البراعة");
  // p8 هي أول perk براعة — كل perk لاحق يضيف +1
  const p8Idx = 1; // الأولى
  const subsequentAfterP8 = Math.max(0, count - p8Idx);
  const immunityBonus = 3 + subsequentAfterP8;

  return {
    ...npcData,
    immunity: (npcData.immunity || 0) + immunityBonus,
    dexPerkEffects: { immunityBonus, activeCount: count, p8Active: true },
  };
};

/* ── الذكاء: إدراك لا شعوري (8) + تركيز مفرط (12) ──*/
const applyIntPerksToNpc = (npcData) => {
  const intVal = npcData.stats?.find(s=>s.name==="الذكاء")?.value || 0;
  if(intVal < 8) return { ...npcData, intPerkEffects: null };

  const count  = getActivePerkCount(intVal, "الذكاء");
  const p8Active  = intVal >= 8;
  const p12Active = intVal >= 12;
  const p8Idx = 1;
  const subsequentAfterP8 = Math.max(0, count - p8Idx);

  // 8: يقظة +2، +1 لكل perk لاحق
  const alertnessBonus = p8Active ? (2 + subsequentAfterP8) : 0;

  let skills = [...(npcData.skills || [])];
  if(p8Active && alertnessBonus > 0){
    const idx = skills.findIndex(s=>s.name==="اليقظة");
    if(idx >= 0){
      skills[idx] = { ...skills[idx], extraBonus: (parseInt(skills[idx].extraBonus)||0) + alertnessBonus };
    } else {
      skills.push({
        id: Date.now()+Math.random(), name:"اليقظة", stat:"الذكاء",
        level:"غير متعلم", bonus:"+0", extraBonus: alertnessBonus,
        isBarrier:false, bindingStat:null, isPerkBonus:true,
      });
    }
  }

  return {
    ...npcData,
    skills,
    intPerkEffects: {
      alertnessBonus,
      p8Active,
      p12Active,
      activeCount: count,
    },
  };
};

/* ── المعرفة: ذاكرة مركبة (10) — الربط يدوي من الـ UI ──
   هذا الـ engine يحسب البونس المشترك بين زوج المهارات المربوطة */
const calcKnowledgeLinkBonus = (skillA, skillB) => {
  if(!skillA || !skillB) return { bonusAtoB: 0, bonusBtoA: 0 };
  const getBonusNum = (sk) => (parseInt(sk.bonus)||0) + (parseInt(sk.extraBonus)||0);
  const aTotal = getBonusNum(skillA);
  const bTotal = getBonusNum(skillB);
  return {
    bonusAtoB: Math.round(bTotal * 0.5), // A تحصل على 50٪ من B
    bonusBtoA: Math.round(aTotal * 0.5), // B تحصل على 50٪ من A
  };
};


/* ═══════════════════════════════════════════ CHARISMA & LUCK PERKS ═══════════════════════════════════════════ */

/* ── الكاريزما ──
   8: معسول اللسان — استحقاق +50٪ (+10٪ لكل perk لاحق)
   20: حضور مهيب — الإرهاب والترويض يتبادلان 50٪ من قيمة كل منهما، الترويض ينتقل للكاريزما */
const applyCharismaPerksToNpc = (npcData) => {
  const chaVal = npcData.stats?.find(s=>s.name==="الكاريزما")?.value || 0;
  if(chaVal < 8) return { ...npcData, chaPerkEffects: null };

  const count   = getActivePerkCount(chaVal, "الكاريزما");
  const p8Active  = chaVal >= 8;
  const p20Active = chaVal >= 20;

  // ترتيب الـ perks: p8=1، p10=2، p12=3، p15=4، p20=5، p30=6، p50=7
  const p8Idx  = 1;
  const p20Idx = 5;

  // ═══ p8: معسول اللسان ═══
  // استحقاق +50٪ من قيمته الحالية، ثم +10٪ لكل perk لاحق
  let worthinessBonus = 0;
  if(p8Active){
    const subAfterP8 = Math.max(0, count - p8Idx);
    const pct = 0.50 + (subAfterP8 * 0.10); // 50٪، 60٪، 70٪، ...
    const currentWorthiness = npcData.worthiness || 0;
    // إذا كان سالباً نحوله لـ 0 أولاً
    const base = Math.max(0, currentWorthiness);
    worthinessBonus = Math.round(base * pct);
    // الحد الأدنى: حتى لو الاستحقاق 0، نضيف pct × 1 (قيمة رمزية صغيرة)
    if(worthinessBonus === 0 && base === 0) worthinessBonus = 1;
  }

  // ═══ p20: حضور مهيب ═══
  // الإرهاب والترويض يتبادلان 50٪ من قيمة بعضهما
  // الترويض ينتقل من البأس إلى الكاريزما
  let skills = [...(npcData.skills || [])];
  let terrorBonus    = 0;
  let tamingBonus    = 0;
  if(p20Active){
    const terrorSk = skills.find(s=>s.name==="الإرهاب");
    const tamingSk = skills.find(s=>s.name==="الترويض");
    const getTotal = sk => (parseInt(sk?.bonus)||0) + (parseInt(sk?.extraBonus)||0);
    const terrorTotal = getTotal(terrorSk);
    const tamingTotal = getTotal(tamingSk);

    terrorBonus = tamingTotal > 0 ? Math.round(tamingTotal * 0.5) : 0;
    tamingBonus = terrorTotal > 0 ? Math.round(terrorTotal * 0.5) : 0;

    // تطبيق البونسات
    if(terrorBonus > 0){
      const idx = skills.findIndex(s=>s.name==="الإرهاب");
      if(idx >= 0) skills[idx] = { ...skills[idx], extraBonus: (parseInt(skills[idx].extraBonus)||0) + terrorBonus };
    }
    if(tamingBonus > 0){
      const idx = skills.findIndex(s=>s.name==="الترويض");
      if(idx >= 0) skills[idx] = { ...skills[idx], extraBonus: (parseInt(skills[idx].extraBonus)||0) + tamingBonus };
    }
    // نقل الترويض من البأس إلى الكاريزما
    skills = skills.map(s =>
      s.name==="الترويض" && s.stat==="البأس"
        ? { ...s, stat:"الكاريزما", _movedByChaPerk20: true }
        : s
    );
  }

  const newWorthiness = (npcData.worthiness || 0) < 0
    ? worthinessBonus           // إذا كان سالباً نجعله يساوي الزيادة مباشرة (يمر بصفر)
    : (npcData.worthiness || 0) + worthinessBonus;

  return {
    ...npcData,
    worthiness: newWorthiness,
    skills,
    chaPerkEffects: {
      p8Active, p20Active,
      worthinessBonus,
      terrorBonus,
      tamingBonus,
      activeCount: count,
    },
  };
};

/* ── الحظ ──
   8: محظوظ منذ الولادة — 1+ فرصة حظ (+1 لكل perk لاحق) */
const applyLuckPerksToNpc = (npcData) => {
  const luckVal = npcData.stats?.find(s=>s.name==="الحظ")?.value || 0;
  if(luckVal < 8) return { ...npcData, luckPerkEffects: null };

  const count  = getActivePerkCount(luckVal, "الحظ");
  const p8Active = luckVal >= 8;

  // p8 هي أول perk حظ — كل perk لاحق يضيف +1 فرصة
  const p8Idx = 1;
  const subAfterP8 = Math.max(0, count - p8Idx);
  const luckChancesBonus = p8Active ? (1 + subAfterP8) : 0;

  const newLuck    = (npcData.luckChances    || 0) + luckChancesBonus;
  const newLuckMax = (npcData.luckChancesMax || 0) + luckChancesBonus;

  return {
    ...npcData,
    luckChances:    newLuck,
    luckChancesMax: newLuckMax,
    luckPerkEffects: {
      p8Active,
      luckChancesBonus,
      activeCount: count,
    },
  };
};

function generate({ allowedRaces=null, difficulty="normal", forceBg=null, levelMin=1, levelMax=20, allowedAnimalSizes=null, allowedElements=null, allowedMagicSchools=null }={}) {
  /* ══ العرق ══ */
  let pool=RACE_TABLE;
  if(allowedRaces&&allowedRaces.length>0) pool=RACE_TABLE.filter(r=>allowedRaces.includes(r.name));
  if(!pool.length) pool=RACE_TABLE;
  const re=pick(pool);
  let race=re.name;
  let animal=null,eye=null,dragonParts=[],dragonDegree=null;
  let souls=null,soulType=null,soulConcept="",coreQ=null,extraCores=[];

  if(re.needsAnimal){
    const ar=d(100);
    // فلتر الحيوان حسب الحجم المسموح به
    const sizedPool = allowedAnimalSizes&&allowedAnimalSizes.length>0
      ? ANIMALS.filter(a=>(allowedAnimalSizes.includes(ANIMAL_SIZE_MAP[a]||"عادي")))
      : ANIMALS;
    const animalPool = sizedPool.length>0 ? sizedPool : ANIMALS;
    animal=ar<=Math.min(89,animalPool.length)?animalPool[ar-1]||pick(animalPool):pick(animalPool);
    if(race==="ساروفيان"&&ar>90) race="ساروفيان خرافي";
  }
  // وحش الظلام: 50% ارتباط بحيوان، 50% نقي (بدون حيوان)
  if(race==="وحش الظلام"){
    if(Math.random()<0.5){
      const sizedPool2 = allowedAnimalSizes&&allowedAnimalSizes.length>0
        ? ANIMALS.filter(a=>(allowedAnimalSizes.includes(ANIMAL_SIZE_MAP[a]||"عادي")))
        : ANIMALS;
      animal=(sizedPool2.length>0?sizedPool2:ANIMALS)[Math.floor(Math.random()*((sizedPool2.length>0?sizedPool2:ANIMALS).length))];
    } else {
      animal=null;
    }
  }
  if(race==="إتشيرما"){
    const opts=["البديه","العليم","البصير"];
    const er=d(4);eye=er===4?pick(opts):opts[er-1];
  }
  if(race==="آلزاداكايند"){
    const parts=["ذيل","أجنحة","قرون"];
    const dr=d(3);
    if(dr===1){dragonDegree="ثالثة";dragonParts=[pick(parts)];}
    else if(dr===2){dragonDegree="ثانية";const a=Math.floor(Math.random()*3);dragonParts=[parts[a],parts[(a+1)%3]];}
    else{dragonDegree="أولى";dragonParts=[...parts];}
  }
  if(race==="سيلافين"){
    souls=rollSouls();
    soulType=d(10)<=5?"ملاك":"شيطان";
    soulConcept="";  // يحدده الراوي أو اللاعب
  }
  if(race==="بهائم الظلام"||race==="وحش الظلام") coreQ=rollCore(race);

  /* ══ الجنس والمستوى ══ */
  const gender=d(2)===1?"ذكر":"أنثى";
  const level=levelMin+Math.floor(Math.random()*(levelMax-levelMin+1));
  const lvData=LEVEL_TABLE[Math.min(level,20)];

  /* ══ درجة الحياة ══ */
  let lifeGrade=re.lifeGrade;
  // السيلافين: درجتهم تعتمد على الأرواح
  if(race==="سيلافين"&&souls!=null){
    lifeGrade=soulLifeGrade(souls);
  }
  const lgRoll=d(100);
  const lgUpgrade=lgRoll===1?2:lgRoll<=10?1:0;
  if(lgUpgrade>0) lifeGrade=upgradeLifeGrade(lifeGrade,lgUpgrade);

  // هالة السيلافين تعتمد على درجة الحياة
  let silafinBaseHala=LIFE_GRADE_BASE_HALA[lifeGrade]||100;

  /* ══ الكلاسات ══ */
  let classes=buildClasses(race,animal,dragonDegree,lifeGrade,allowedElements,allowedMagicSchools);
  // السيلافين درجة 4+: يضاف كلاس عشوائي
  if(race==="سيلافين"&&(lifeGrade==="4"||lifeGrade==="4 خاصة"||lifeGrade==="5")){
    classes=[{cls:"سيلافيني",sub:""}, rollOneClassByGrade(animal,lifeGrade,false,null,allowedElements,allowedMagicSchools)];
  }

  /* ══ MBTI + توجه أخلاقي ══ */
  const mbti=pick(MBTI_TYPES);
  const moral=pick(MORAL_ALIGNMENTS);

  /* ══ الخلفية ══ */
  const bg=forceBg?BG_TABLE.find(b=>b.name===forceBg)||rollT(BG_TABLE):rollT(BG_TABLE);
  const bgVal=bg.value||50;

  /* ══ السمات ══ */
  const nobleR=["آلزاداكايند","ساروفيان خرافي","سكارد"];
  const maxPS =nobleR.includes(race)?15:12;
  const rMax  =RACE_MAX[race]||30;
  const rMin  =RACE_MIN_TOTAL[race]||0;
  const isAnimalRace=["حيوان","بهائم الظلام","رؤوس الكلاب"].includes(race);

  let stats,sStats=null;
  if(race==="ساروفيان خرافي"){
    stats=rollFairyStats();
  } else if(race==="سكارد"){
    stats=rollSkardStats();
  } else if(isAnimalRace&&animal){
    const res=rollAnimalStats(animal);stats=res.stats;sStats=res.sStats;
  } else {
    stats=STAT_NAMES.map(()=>d(3)+d(3));
    let sum=stats.reduce((a,b)=>a+b,0);
    const target=Math.max(rMin,rMax);
    for(let i=0;i<2000&&sum!==target;i++){
      if(sum<target){const e=stats.map((v,j)=>v<maxPS?j:-1).filter(x=>x!==-1);if(!e.length)break;stats[e[Math.floor(Math.random()*e.length)]]++;}
      else{const e=stats.map((v,j)=>v>1?j:-1).filter(x=>x!==-1);if(!e.length)break;stats[e[Math.floor(Math.random()*e.length)]]--;}
      sum=stats.reduce((a,b)=>a+b,0);
    }
    // ضمان الحد الأدنى للأعراق
    if(rMin>0){
      let cur=stats.reduce((a,b)=>a+b,0);
      while(cur<rMin){
        const idx=Math.floor(Math.random()*STAT_NAMES.length);
        if(stats[idx]<maxPS){stats[idx]++;cur++;}
      }
    }
  }

  /* ══ بونسات العرق ══ */
  if(race==="إنسان")    {stats[4]=Math.min(stats[4]+1,maxPS);stats[3]=Math.min(stats[3]+1,maxPS);}
  if(race==="وحش الظلام"){
    // وحش الظلام النقي (بدون حيوان): براعة وذكاء +2
    // وحش الظلام مع حيوان: براعة وذكاء +1
    const bonus = animal ? 1 : 2;
    stats[4]=Math.min(stats[4]+bonus,maxPS);
    stats[3]=Math.min(stats[3]+bonus,maxPS);
  }
  if(race==="ساروفيان") {stats[4]=Math.min(stats[4]+1,maxPS);stats[6]=Math.min(stats[6]+1,maxPS);}
  if(race==="سكارد")    {[1,0,3].forEach(i=>{stats[i]=Math.min(stats[i]+5,15);});}
  if(race==="آلزاداكايند"){stats[0]=Math.min(stats[0]+3,15);stats[1]=Math.min(stats[1]+3,15);}
  if(dragonParts.includes("ذيل"))  stats[3]=Math.min(stats[3]+2,15); // ذيل → براعة +2

  /* ══ صعوبة ══ */
  const diffBonus={normal:{s:0,sk:0},hard:{s:10,sk:10},veryHard:{s:20,sk:20},hell:{s:30,sk:40}}[difficulty]||{s:0,sk:0};
  if(diffBonus.s>0){
    const combatIdx=isAnimalRace?[0,1,3]:STAT_NAMES.map((_,i)=>i);
    let rem=diffBonus.s;
    for(let i=0;i<500&&rem>0;i++){const idx=combatIdx[Math.floor(Math.random()*combatIdx.length)];stats[idx]++;rem--;}
  }

  /* ══ نقاط التعلم والمهارات ══ */
  const learnPoints=calcLearnPoints(bgVal,stats[2],stats[3],race==="إنسان")+diffBonus.sk;
  let skills=distributeSkills(learnPoints,race,level,bgVal,difficulty,eye,dragonParts);

  /* ══ مهارة النواة لبهائم/وحوش الظلام ══ */
  if((race==="بهائم الظلام"||race==="وحش الظلام")&&!skills.some(s=>s.name==="النواة")){
    const nwLevels=["متعلم","خبير","متقدم","متقن","أستاذ","قديس","نبوي","إلهي","بدائي"];
    const nwLv=pick(nwLevels);
    const nwObj=SKILL_LEVELS.find(l=>l.name===nwLv);
    skills.push({id:Date.now()+Math.random(),name:"النواة",stat:"البأس",
      level:nwLv,bonus:nwObj?.bonus||"+2",extraBonus:0,
      isBarrier:true,bindingStat:"البأس",isRaceSkill:true});
  }

  /* ══ مهارات أعضاء التنانين ══ */
  if(race==="آلزاداكايند"){
    const limbLevels=["متعلم","خبير","متقدم","متقن","أستاذ","قديس","نبوي","إلهي","بدائي"];
    dragonParts.forEach(part=>{
      const limbInfo=DRAGON_LIMB_DATA[part];
      if(!limbInfo) return;
      if(!skills.some(s=>s.name===limbInfo.skillName)){
        const lv=pick(limbLevels);
        const lvObj=SKILL_LEVELS.find(l=>l.name===lv);
        skills.push({id:Date.now()+Math.random(),name:limbInfo.skillName,stat:limbInfo.stat,
          level:lv,bonus:lvObj?.bonus||"+2",extraBonus:0,
          isBarrier:true,bindingStat:limbInfo.stat,isLimbSkill:true,limbPart:part});
      }
    });
  }

  /* ══ مهارة حاجز السكارد الإضافية ══ */
  if(race==="سكارد"){
    const skBonusVal=10+level;
    // نبحث عن مهارة الحاجز الموجودة لإضافة القيمة الإضافية لها
    const existingBarrier = skills.find(s=>s.isBarrier&&!s.isSakardBonus&&!s.isRaceSkill&&!s.isLimbSkill);
    if(existingBarrier){
      // ندمج قيمة حاجز السكارد في extraBonus لمهارة الحاجز الموجودة
      existingBarrier.extraBonus = (existingBarrier.extraBonus||0) + skBonusVal;
    } else {
      // إذا لم يكن هناك حاجز، نضيف مهارة حاجز جديدة بالقيمة في extraBonus
      skills.push({
        id:Date.now()+Math.random(),
        name:`حاجز`,
        stat:"البأس",
        level:"قديس",
        bonus:`+10`,
        extraBonus:skBonusVal,
        isBarrier:true,
        bindingStat:"البأس",
        isSakardBonus:false,
      });
    }
  }

  /* ══ مهارات عين الإتشيرما الأساسية ══ */
  if(race==="إتشيرما"&&eye&&EYE_DATA[eye]){
    const eyeInfo=EYE_DATA[eye];
    const eyeSkill=skills.find(s=>s.name===eyeInfo.skillName);
    const eyeBonus=eyeSkill?getEyeBonus(eyeSkill.level):2;
    // تحديد المهارات الأساسية الفعّالة حسب مستوى العين
    const TIER_ORDER_G=["متعلم","خبير","متقدم","متقن","أستاذ","قديس","نبوي","إلهي","بدائي","أزلي"];
    const eyeTierIdxG=eyeSkill?TIER_ORDER_G.indexOf(eyeSkill.level):-1;
    const activeBaseG=[...eyeInfo.baseSkills];
    eyeInfo.tiers.forEach(t=>{
      if(t.addsSkill&&TIER_ORDER_G.indexOf(t.level)<=eyeTierIdxG&&!activeBaseG.includes(t.addsSkill))
        activeBaseG.push(t.addsSkill);
    });
    // حساب مضاعفة الحاسة السادسة لعين العليم بمستوى بدائي
    activeBaseG.forEach(skName=>{
      const existing=skills.find(s=>s.name===skName&&!s.isBarrier);
      const isDoubled=eyeInfo.tiers.some(t=>t.doublesSkill&&t.addsSkill===skName&&TIER_ORDER_G.indexOf(t.level)<=eyeTierIdxG);
      const actualBonus=isDoubled?eyeBonus*2:eyeBonus;
      if(existing){
        existing.extraBonus=(existing.extraBonus||0)+actualBonus;
      } else {
        const stat=Object.entries(SKILLS_BY_STAT).find(([_,arr])=>arr.includes(skName))?.[0]||"البأس";
        skills.push({id:Date.now()+Math.random(),name:skName,stat,
          level:"غير متعلم",bonus:"+0",extraBonus:actualBonus,
          isBarrier:false,bindingStat:null,isEyeBonus:true});
      }
    });
    // بونس عين البصير بدائي: إضافة الحاجز
    const basrTier=eyeInfo.tiers.find(t=>t.addsBarrier&&TIER_ORDER_G.indexOf(t.level)<=eyeTierIdxG);
    if(basrTier&&!skills.some(s=>s.isBarrier&&!s.isRaceSkill)){
      const bStat=pick(BINDING_STATS.filter(s=>s!=="الحظ"));
      skills.push({id:Date.now()+Math.random(),name:"الحاجز",stat:bStat,
        level:"غير متعلم",bonus:"+0",extraBonus:eyeBonus,
        isBarrier:true,bindingStat:bStat,isEyeBonus:true});
    }
  }
  const skillBonuses=calcSkillBonuses(skills);
  /* ══ بونس مناعة عين الإتشيرما ══ */
  let eyeImmunityBonus=0;
  if(race==="إتشيرما"&&eye&&EYE_DATA[eye]){
    const eyeInfo=EYE_DATA[eye];
    const eyeSk=skills.find(s=>s.name===eyeInfo.skillName);
    if(eyeSk&&eyeInfo.baseSkills.includes("المناعة")) eyeImmunityBonus=getEyeBonus(eyeSk.level);
  }
  const finalStats=STAT_NAMES.map((name,i)=>({name,value:stats[i]+(skillBonuses[name]||0),skillBonus:skillBonuses[name]||0,extraBonuses:[]}));
  const fStr=finalStats[0].value,fBas=finalStats[1].value,fDex=finalStats[3].value;

  /* ══ الصحة ══ */
  let baseHP=0,hpPer=0,baseTrueDef=0;
  if(isAnimalRace&&animal){
    const anS=sStats||(ANIMAL_SIZE_STATS[ANIMAL_SIZE_MAP[animal]||"عادي"]||ANIMAL_SIZE_STATS["عادي"]);
    baseHP=anS.baseHP;hpPer=anS.hpPer;baseTrueDef=anS.trueDef;
  } else if(race==="آلزاداكايند"){
    const di=dragonDegree==="أولى"?2:dragonDegree==="ثانية"?1:0;
    baseHP=[150,250,400][di];
    const dragonHpScale=dragonDegree==="أولى"?2.5:dragonDegree==="ثانية"?2.0:1.5;
    hpPer=[25,35,50][di]+Math.round(level*dragonHpScale);
    baseTrueDef=[5,10,15][di];
  } else if(race==="سيلافين"&&souls){
    baseHP=Math.floor(souls/40);hpPer=Math.floor(souls/400);baseTrueDef=0;
  } else {
    baseHP=RACE_BASE_HP[race]??20;
    hpPer=(RACE_HP_PER[race]??8)+(race==="سكارد"?Math.round(level*3):0);
    baseTrueDef=RACE_TRUE_DEF[race]??0;
  }
  const hp=baseHP+fBas*hpPer;

  /* ══ الهالة (تعتمد على درجة الحياة) ══ */
  let baseHala;
  if(race==="سيلافين"){
    baseHala=silafinBaseHala;
  } else {
    baseHala=LIFE_GRADE_BASE_HALA[lifeGrade]||RACE_BASE_HALA[race]||100;
  }
  const hala=Math.round(baseHala*lvData.halaMult);

  /* ══ الدفاع ══ */
  const raceDefBonus=race==="آلزاداكايند"?fBas+fStr:race==="سكارد"?10:0;
  const defFromStats=race==="آلزاداكايند"?fBas*3:fBas*2;
  const defense=defFromStats+lvData.defense+raceDefBonus;
  const trueDefense=baseTrueDef+(race==="آلزاداكايند"?Math.floor(defense*0.1):0);
  const dmgReduce=lvData.dmgReduce;

  /* ══ المناعة والحجم ══ */
  const wingsLimbSkill=skills.find(s=>s.name==="الأجنحة");
  const dragonWingsImmunity=dragonParts.includes("أجنحة")?(wingsLimbSkill?getLimbBonus(wingsLimbSkill.level):2):0;
  const immunity=fStr+Math.floor(fStr/2)+Math.floor(fBas/2)+(RACE_BASE_IMM[race]||0)+eyeImmunityBonus+dragonWingsImmunity;
  const worthiness=rollWorthiness(gender,race);
  const dragonHornsWorthiness = dragonParts.includes("قرون")?2:0;
  const gMod=gender==="أنثى"?-15:0;
  const totalWorthiness = worthiness + dragonHornsWorthiness;
  // معادلة الحجم: نرد50 + (4×الاستحقاق) + العرق + (2×القوة) + (باسMulti×البأس)
  // التنانين: 6× للدرجة الثالثة، 8× للثانية، 10× للأولى
  const basMult=race==="آلزاداكايند"
    ?(dragonDegree==="أولى"?10:dragonDegree==="ثانية"?8:6)
    :4;
  const size=(RACE_HEIGHT[race]||130)+(4*totalWorthiness)+(2*fStr)+(basMult*fBas)+d(50)+gMod;

  /* ══ معادلة القوة الجسدية (0٪ عند 170 فأقل، +5٪ لكل 10 سم فوق 170) ══ */
  const sizeOver170=Math.max(0,size-170);
  const physStrPct=Math.floor(sizeOver170/10)*5;

  /* ══ ربط الحاجز ══ */
  const barrierSkill=skills.find(s=>s.isBarrier&&!s.isSakardBonus&&!s.isRaceSkill&&!s.isLimbSkill);
  const barrierBinding=barrierSkill?{
    stat:barrierSkill.bindingStat||barrierSkill.stat,
    degree:BINDING_DEGREE(level,barrierSkill.level),
    effect:BINDING_EFFECT[barrierSkill.bindingStat||barrierSkill.stat]||"—",
  }:null;

  /* ══ القارة واللغات ══ */
  const continent = pick(CONTINENTS);
  const languages = rollLanguages(continent);
  // السكارد يملكون العربية القديمة دائماً
  if(race==="سكارد" && !languages.includes("العربية القديمة")){
    languages.push("العربية القديمة");
  }
  // لغات إضافية بناءً على سمة المعرفة
  const knoVal = finalStats[2]?.value || 0;
  const extraLangThresholds = [8,10,12,15,20];
  const extraLangCount = extraLangThresholds.filter(t => knoVal >= t).length;
  const usedLangs = new Set(languages);
  for(let el=0; el<extraLangCount; el++){
    const available = ALL_LANGUAGES.filter(l => !usedLangs.has(l));
    if(!available.length) break;
    const lang = pick(available);
    languages.push(lang);
    usedLangs.add(lang);
  }

  /* ══ إحصائيات القتال مع current/max ══ */
  const hpMax = hp;
  const halaMax = hala;
  // الستامينا = 1 + القوة + مهارة الرشاقة (بونس المهارة إن وجد)
  const agilitySkill = skills.find(s=>s.name==="الرشاقة");
  const agilityBonus = agilitySkill ? (parseInt(agilitySkill.bonus)||0) : 0;
  const staminaVal = 1 + fStr + agilityBonus;
  const luckStat = finalStats[6]?.value||1;
  const luckChances = Math.ceil(luckStat/2);
  const sixthSenseSkill = skills.find(s=>s.name==="الحاسة السادسة");
  // فرص الحاسة السادسة = قيمة مهارة الحاسة السادسة ÷ 2 (تقريب للأعلى)
  const sixthSenseSkillVal = sixthSenseSkill ? (parseInt(sixthSenseSkill.bonus)||0) + (parseInt(sixthSenseSkill.extraBonus)||0) : null;
  const sixthSenseChances = sixthSenseSkillVal!==null ? Math.ceil(sixthSenseSkillVal/2) : null;

  /* ══ تطبيق مميزات القوة ══ */
  // حفظ baseHP وhpPer الأصليين لمميزات البأس
  const _baseHP = baseHP;
  const _hpPer  = hpPer;

  const baseNpcData = {
    name:"",title:"",race,animalType:animal,
    animalSize:animal?(ANIMAL_SIZE_MAP[animal]||"عادي"):null,
    eyeType:eye,dragonParts,dragonDegree,
    gender,lifeGrade,lifeGradeUpgrade:lgUpgrade,
    mbti,moral,
    continent,languages,
    isContractor:true,level,classes,
    background:bg.name,bgSkillPoints:learnPoints,
    stats:finalStats,
    hp,hpMax,hala,halaMax,defense,trueDefense,immunity,dmgReduce,size,physStrPct,
    _baseHala:hala, // نحفظ الهالة الأساسية لإعادة الحساب عند تغيير المستوى بالـ XP
    stamina:staminaVal,staminaMax:staminaVal,worthiness:totalWorthiness,mentalHealth:d(5)+3,mentalHealthMax:10,
    fameLevel:(()=>{const fr=Math.random()*100;return fr<40?"القرية":fr<80?"المدينة":fr<95?"القارة":"العالم";})(),fameValue:d(10),rep:d(21)-11,
    luckChances,luckChancesMax:luckChances,sixthSenseChances,sixthSenseChancesMax:sixthSenseChances!==null?sixthSenseChances:undefined,
    skills,customFields:[],
    raceTraits:buildRaceTraits(race,dragonParts,dragonDegree,eye,animal,souls,soulType,soulConcept,coreQ,lifeGrade,extraCores),
    hpFormula:race==="آلزاداكايند"
      ?`${baseHP} + بأس×${hpPer} (${[25,35,50][dragonDegree==="أولى"?2:dragonDegree==="ثانية"?1:0]}+Lv×${dragonDegree==="أولى"?2.5:dragonDegree==="ثانية"?2.0:1.5})`
      :race==="سكارد"?`${baseHP} + بأس×${hpPer} (أساسي+Lv×3)`
      :`${baseHP} + بأس×${hpPer}`,
    skillStatBonuses:skillBonuses,barrierBinding,
    souls,soulType,soulConcept,coreQ,extraCores:[],
    weapons:rollStartingItems(difficulty),
    strPerkEffects: null,
    basPerkEffects: null,
    _baseHP, _hpPer,
    _originalSize: size,
    _originalDefense: defense,
    _originalTrueDef: trueDefense,
  };
  const afterStr = applyStrengthPerksToNpc(baseNpcData);
  const afterBas = applyBasPerksToNpc(afterStr);
  const afterDex = applyDexPerksToNpc(afterBas);
  const afterInt = applyIntPerksToNpc(afterDex);
  const afterCha = applyCharismaPerksToNpc(afterInt);
  return applyLuckPerksToNpc(afterCha);
}

  "قديس":"✸","نبوي":"❋","إلهي":"✾","بدائي":"⬟","أزلي":"◈",
};

/* لون المهارة حسب مستواها وسمتها — فاقع/مشبع عند المنخفض، يتجه نحو الأبيض كلما ارتفع */
const skillColorByStat = (levelName, statName) => {
  const LEVEL_ORDER = ["متعلم","خبير","متقدم","متقن","أستاذ","قديس","نبوي","إلهي","بدائي","أزلي"];
  const isKnowledge = statName === "المعرفة";
  // المعرفة تبدأ من السيلفر وتتجه للأبيض — بقية السمات تبدأ من لونها الفاقع
  const base = STAT_COLOR[statName] || "#9ca3af";
  const idx  = LEVEL_ORDER.indexOf(levelName);
  const i    = idx < 0 ? 0 : idx;
  const total = LEVEL_ORDER.length - 1; // 9
  // نسبة الاختلاط بالأبيض: 0% عند المستوى الأول، ~82% عند أزلي
  const mix  = (i / total) * 0.82;
  const hex  = base.replace("#","");
  const r0   = parseInt(hex.substring(0,2),16);
  const g0   = parseInt(hex.substring(2,4),16);
  const b0   = parseInt(hex.substring(4,6),16);
  const r    = Math.round(r0 + (255-r0)*mix);
  const g    = Math.round(g0 + (255-g0)*mix);
  const b    = Math.round(b0 + (255-b0)*mix);
  return `rgb(${r},${g},${b})`;
};

let _cv = false;

const Ei = ({value,onChange,color="#e5e7eb",fontSize="14px",fontWeight="400",type="text"}) => {
  const [ed,setEd]=useState(false);
  const [draft,setDraft]=useState(String(value??''));
  const ref=useRef();
  useEffect(()=>{if(ed)ref.current?.focus();},[ed]);
  // نُحدّث draft فقط إذا لم يكن المستخدم يعدّل الآن
  useEffect(()=>{ if(!ed) setDraft(String(value??'')); },[value, ed]);
  const commit=()=>{
    setEd(false);
    if(type==="number"){
      // نسمح بالفراغ والسالب — الفراغ يُبقي القيمة كما هي
      if(draft===''||draft==='-') return;
      const n=Number(draft);
      if(!isNaN(n)) onChange(n);
    } else {
      // للنصوص: نقبل حتى الفراغ
      onChange(draft);
    }
  };
  if(ed) return(
    <input ref={ref} value={draft}
      onChange={e=>setDraft(e.target.value)}
      onBlur={commit}
      onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setEd(false);setDraft(String(value??''));}}}
      style={{background:"#161b27",border:"1px solid #7c3aed88",borderRadius:"4px",color,fontSize,fontWeight,
        padding:"1px 6px",fontFamily:"inherit",outline:"none",direction:"rtl",minWidth:"30px",
        width:Math.max(40,(String(draft).length*8+28))+"px"}}/>
  );
  if(_cv) return <span style={{color,fontSize,fontWeight}}>{value}</span>;
  return(
    <span onClick={()=>{setDraft(String(value??''));setEd(true);}} title="انقر للتعديل"
      style={{cursor:"text",color,fontSize,fontWeight,borderBottom:"1px dashed #374151",paddingBottom:"1px"}}>
      {value}
    </span>
  );
};

              <div key={sl.name} onClick={()=>{onChange(sl.name);setOpen(false);}}
                style={{padding:"4px 8px",fontSize:"10px",color:sc2,cursor:"pointer",
                  borderRadius:"4px",fontWeight:"700",display:"flex",justifyContent:"space-between",
                  background:sl.name===current?"#ffffff11":"transparent"}}>
                <span>{ss} {sl.name}</span>
                <span style={{color:"#4b5563"}}>{sl.name==="غير متعلم"?"خارجي":sl.bonus}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

// مكوّن مستقل لتعديل اسم التحول — يحتفظ بالـ draft محلياً
const TransformLabelInput = ({value, onChange}) => {
  const [draft, setDraft] = useState(value);
  const ref = useRef();
  useEffect(()=>{ ref.current?.focus(); },[]);
  // لا نُعيد setDraft من value — المستعمل يتحكم كامل
  const commit = () => { onChange(draft); };
  return(
    <input
      ref={ref}
      value={draft}
      onChange={e=>setDraft(e.target.value)}
      onBlur={commit}
      onKeyDown={e=>{ if(e.key==="Enter") { commit(); ref.current?.blur(); } }}
      placeholder="اسم التحول"
      style={{width:"80px",background:"#0a0c18",border:"1px solid #7c3aed88",
        borderRadius:"4px",color:"#a78bfa",fontSize:"9px",padding:"2px 5px",
        fontFamily:"inherit",outline:"none"}}/>
  );
};

function NPCGenerator() {
  const [npc,         setNpc]         = useState(null);
  const [rolling,     setRolling]     = useState(false);
  const [difficulty,  setDifficulty]  = useState("normal");
  const [allowedRaces,setAllowedRaces]= useState(new Set(ALL_RACES));
  const [showFilter,  setShowFilter]  = useState(false);
  const [showOptions, setShowOptions] = useState(false);
  const [addSkillMenu,setAddSkillMenu]= useState(null);
  const [statOpen,    setStatOpen]    = useState({});

  /* ══ إعادة حساب الإحصائيات ══ */
  const recalculate = (opts=recalcOpts) => {
    if(!npc) return;
    setNpc(p=>{
      const level=p.level||1;
      const race=p.race;
      const lvData=LEVEL_TABLE[Math.min(level,LEVEL_TABLE.length-1)];
      const isAnimalRace=["حيوان","بهائم الظلام","رؤوس الكلاب"].includes(race);
      // تحديث بونسات المهارات
      const newSkillBonuses=calcSkillBonuses(p.skills);
      const newStats=p.stats.map(st=>{
        const base=st.value-(st.skillBonus||0);
        return {...st,value:base+(newSkillBonuses[st.name]||0),skillBonus:newSkillBonuses[st.name]||0};
      });
      const fStr=newStats.find(s=>s.name==="القوة")?.value||1;
      const fBas=newStats.find(s=>s.name==="البأس")?.value||1;
      const luckVal=newStats.find(s=>s.name==="الحظ")?.value||1;
      // الصحة — يستخدم المعادلة المخصصة إن وُجدت
      let baseHP=20,hpPer=8,baseTrueDef=0;
      if(isAnimalRace&&p.animalType){
        const anS=ANIMAL_SIZE_STATS[p.animalSize||(ANIMAL_SIZE_MAP[p.animalType])||"عادي"]||ANIMAL_SIZE_STATS["عادي"];
        baseHP=anS.baseHP;hpPer=anS.hpPer;baseTrueDef=anS.trueDef;
      } else if(race==="آلزاداكايند"){
        const di=p.dragonDegree==="أولى"?2:p.dragonDegree==="ثانية"?1:0;
        baseHP=[150,250,400][di];
        const dragonHpScale=p.dragonDegree==="أولى"?2.5:p.dragonDegree==="ثانية"?2.0:1.5;
        hpPer=[25,35,50][di]+Math.round(level*dragonHpScale);
        baseTrueDef=[5,10,15][di];
      } else if(race==="سيلافين"&&p.souls){
        baseHP=Math.floor(p.souls/40);hpPer=Math.floor(p.souls/400);baseTrueDef=0;
      } else {
        baseHP=RACE_BASE_HP[race]??20;
        hpPer=(RACE_HP_PER[race]??8)+(race==="سكارد"?Math.round(level*3):0);
        baseTrueDef=RACE_TRUE_DEF[race]??0;
      }
      if(p.customHpPer!=null) hpPer=p.customHpPer;
      const hp=baseHP+fBas*hpPer;
      // الهالة
      let baseHala;
      if(race==="سيلافين"&&p.souls){baseHala=LIFE_GRADE_BASE_HALA[p.lifeGrade]||100;}
      else{baseHala=LIFE_GRADE_BASE_HALA[p.lifeGrade]||RACE_BASE_HALA[race]||100;}
      const hala=Math.round(baseHala*(lvData?.halaMult||1));
      // الدفاع — يستخدم المعادلة المخصصة إن وُجدت
      const raceDefBonus=race==="آلزاداكايند"?fBas+fStr:race==="سكارد"?10:0;
      const defBasMult = p.customDefBasMult ?? (race==="آلزاداكايند"?3:2);
      const defFromStats = fBas * defBasMult;
      const lvlDefBonus = p.customLvlDef ?? (lvData?.defense||0);
      const defense=defFromStats+lvlDefBonus+raceDefBonus;
      const trueDefense=baseTrueDef+(race==="آلزاداكايند"?Math.floor(defense*0.1):0);
      const dmgReduce=lvData?.dmgReduce||0;
      // المناعة والحجم
      const eyeImmBonus=(()=>{
        if(race!=="إتشيرما"||!p.eyeType||!EYE_DATA[p.eyeType]) return 0;
        const eInfo=EYE_DATA[p.eyeType];
        const eSk=p.skills.find(s=>s.name===eInfo.skillName);
        return (eSk&&eInfo.baseSkills.includes("المناعة"))?getEyeBonus(eSk.level):0;
      })();
      const wingsSkillRc=p.skills.find(s=>s.name==="الأجنحة");
      const wingsImmRc=(p.dragonParts||[]).includes("أجنحة")?(wingsSkillRc?getLimbBonus(wingsSkillRc.level):2):0;
      const immunity=fStr+Math.floor(fStr/2)+Math.floor(fBas/2)+(RACE_BASE_IMM[race]||0)+wingsImmRc+eyeImmBonus;
      // ── إعادة حساب الحجم من الصفر (بدون البيرك) ──
      const worthinessForSize = p.worthiness || 0;
      const hornsBonus = (p.dragonParts||[]).includes("قرون") ? 2 : 0;
      const totalWorthinessRc = worthinessForSize + hornsBonus;
      const gModRc = p.gender === "أنثى" ? -15 : 0;
      const basMultRc = race === "آلزاداكايند"
        ? (p.dragonDegree==="أولى"?10:p.dragonDegree==="ثانية"?8:6)
        : 4;
      // الحجم الأصلي (قبل البيرك) — نحسبه من الصفر دائماً
      const sizeBase = (RACE_HEIGHT[race]||130) + (4*totalWorthinessRc) + (2*fStr) + (basMultRc*fBas) + gModRc;
      // نستخدم sizeBase كـ _originalSize لضمان الترتيب الصحيح
      const size = sizeBase;
      const physStrPct = Math.floor(Math.max(0, size-170)/10)*5;
      const agilitySkillRc=p.skills.find(s=>s.name==="الرشاقة");
      const agilityBonusRc=agilitySkillRc?(parseInt(agilitySkillRc.bonus)||0):0;
      const stamina=1+fStr+agilityBonusRc;
      const luckChances=Math.ceil(luckVal/2);
      const sixthSenseSkill=p.skills.find(s=>s.name==="الحاسة السادسة");
      const sixthSenseSkillVal=sixthSenseSkill?(parseInt(sixthSenseSkill.bonus)||0)+(parseInt(sixthSenseSkill.extraBonus)||0):null;
      const sixthSenseChances=sixthSenseSkillVal!==null?Math.ceil(sixthSenseSkillVal/2):null;
      // ربط الحاجز
      const barrierSk=p.skills.find(s=>s.isBarrier&&!s.isSakardBonus&&!s.isRaceSkill&&!s.isLimbSkill);
      const barrierBinding=barrierSk?{
        stat:barrierSk.bindingStat||barrierSk.stat,
        degree:BINDING_DEGREE(level,barrierSk.level),
        effect:(BINDING_EFFECT_BY_DEGREE[barrierSk.bindingStat||barrierSk.stat]||{})[BINDING_DEGREE(level,barrierSk.level)]||"—",
      }:null;
      // ── تنظيف بونسات البيرك القديمة من المهارات قبل إعادة الحساب ──
      const prevStrBonus    = p.strPerkEffects?.speedBonus||0;
      const prevSsBonus     = p.basPerkEffects?.sixthSenseBonus||0;
      const prevAlertBonus  = p.intPerkEffects?.alertnessBonus||0;
      // احسب بونسات العين الحالية لنخصمها قبل إعادة الحساب
      const eyeType = p.eyeType;
      const eyeInfo = (eyeType && EYE_DATA[eyeType]) ? EYE_DATA[eyeType] : null;
      const eyeSkill = eyeInfo ? p.skills.find(s=>s.name===eyeInfo.skillName) : null;
      const eyeBonus = eyeSkill ? getEyeBonus(eyeSkill.level) : 2;

      const cleanedSkills = p.skills.map(sk => {
        let eb = parseInt(sk.extraBonus)||0;
        // خصم بونس السرعة من بيرك القوة
        if(sk.name==="السرعة"    && prevStrBonus>0 && !sk.isPerkBonus) eb = Math.max(0, eb - prevStrBonus);
        // خصم بونس الحاسة السادسة من بيرك البأس
        if(sk.name==="الحاسة السادسة" && prevSsBonus>0   && !sk.isPerkBonus) eb = Math.max(0, eb - prevSsBonus);
        // خصم بونس اليقظة من بيرك الذكاء
        if(sk.name==="اليقظة"         && prevAlertBonus>0 && !sk.isPerkBonus) eb = Math.max(0, eb - prevAlertBonus);
        // خصم بونسات العين (isEyeBonus) من المهارات العادية
        if(sk.isEyeBonus===undefined && eyeInfo && eyeInfo.baseSkills.includes(sk.name)){
          const isDoubled = eyeInfo.tiers.some(t=>t.doublesSkill&&t.addsSkill===sk.name);
          const actual = isDoubled ? eyeBonus*2 : eyeBonus;
          eb = Math.max(0, eb - actual);
        }
        return {...sk, extraBonus: eb};
      }).filter(sk => {
        // أزل مهارات العين التي أُضيفت كـ isEyeBonus (ستُعاد إضافتها في generate flow)
        // لا نحذفها من recalc — بل نتركها لكن نعيد حساب extraBonus فيها
        // أزل مهارات البيرك فقط
        if(sk.isPerkBonus && sk.name==="السرعة"         && prevStrBonus>0)  return false;
        if(sk.isPerkBonus && sk.name==="الحاسة السادسة" && prevSsBonus>0)   return false;
        if(sk.isPerkBonus && sk.name==="اليقظة"         && prevAlertBonus>0) return false;
        return true;
      });

      const rcBase = {
        ...p,stats:newStats,skillStatBonuses:newSkillBonuses,
        skills: cleanedSkills,
        hp,hpMax:hp,hala,halaMax:hala,
        defense,trueDefense,dmgReduce,immunity,physStrPct,size,
        stamina,staminaMax:stamina,
        luckChances,luckChancesMax:luckChances,
        sixthSenseChances,
        sixthSenseChancesMax:sixthSenseChances!==null?sixthSenseChances:undefined,
        barrierBinding,hpFormula:`${baseHP} + بأس×${hpPer}`,
        strPerkEffects: null,
        basPerkEffects: null,
        _baseHP: baseHP,
        _hpPer:  hpPer,
        _originalSize: size,       // حجم أصلي قبل البيرك
        _originalDefense: defense,
        _originalTrueDef: trueDefense,
      };
      const afterStrRc = applyStrengthPerksToNpc(rcBase);
      const afterBasRc = applyBasPerksToNpc(afterStrRc);
      const afterDexRc = applyDexPerksToNpc(afterBasRc);
      const afterIntRc = applyIntPerksToNpc(afterDexRc);
      const afterChaRc = applyCharismaPerksToNpc(afterIntRc);
      const fullyCalc  = applyLuckPerksToNpc(afterChaRc);
      // ── تطبيق خيارات إعادة الحساب ──
      // ── تطبيق opts.perkSkills: احتفظ بمهارات البيرك القديمة إذا مستثناة ──
      let finalSkills = fullyCalc.skills;
      if(!opts.perkSkills){
        // أعد مهارات البيرك والعين القديمة بدل الجديدة
        const oldPerkSks = p.skills.filter(s=>s.isPerkBonus||s.isEyeBonus||s._isPerkAlert);
        const newNonPerk = fullyCalc.skills.filter(s=>!s.isPerkBonus&&!s.isEyeBonus&&!s._isPerkAlert);
        finalSkills = [...newNonPerk, ...oldPerkSks];
      }
      return {
        ...fullyCalc,
        skills: finalSkills,
        hp:       opts.hp   ? fullyCalc.hp       : p.hp,
        hpMax:    opts.hp   ? fullyCalc.hpMax     : p.hpMax,
        defense:  opts.def  ? fullyCalc.defense   : p.defense,
        trueDefense: opts.def ? fullyCalc.trueDefense : p.trueDefense,
        worthiness: opts.worth ? fullyCalc.worthiness : p.worthiness,
        hpFormula: opts.hp  ? fullyCalc.hpFormula : p.hpFormula,
        defFormula: opts.def ? fullyCalc.defFormula : p.defFormula,
        size:       opts.size ? fullyCalc.size      : p.size,
        physStrPct: opts.size ? fullyCalc.physStrPct: p.physStrPct,
      };
    });
  };
  /* ══ إعادة حساب الإحصائيات القتالية فقط ══ */
  const recalcCombatOnly = (opts=recalcOpts) => {
    if(!npc) return;
    setNpc(p=>{
      const level=p.level||1;
      const race=p.race;
      const lvData=LEVEL_TABLE[Math.min(level,LEVEL_TABLE.length-1)];
      const isAnimalRace=["حيوان","بهائم الظلام","رؤوس الكلاب"].includes(race);
      const fStr=p.stats.find(s=>s.name==="القوة")?.value||1;
      const fBas=p.stats.find(s=>s.name==="البأس")?.value||1;
      const luckVal=p.stats.find(s=>s.name==="الحظ")?.value||1;
      let baseHP=20,hpPer=8,baseTrueDef=0;
      if(isAnimalRace&&p.animalType){
        const anS=ANIMAL_SIZE_STATS[p.animalSize||(ANIMAL_SIZE_MAP[p.animalType])||"عادي"]||ANIMAL_SIZE_STATS["عادي"];
        baseHP=anS.baseHP;hpPer=anS.hpPer;baseTrueDef=anS.trueDef;
      } else if(race==="آلزاداكايند"){
        const di=p.dragonDegree==="أولى"?2:p.dragonDegree==="ثانية"?1:0;
        baseHP=[150,250,400][di];
        const dragonHpScale=p.dragonDegree==="أولى"?2.5:p.dragonDegree==="ثانية"?2.0:1.5;
        hpPer=[25,35,50][di]+Math.round(level*dragonHpScale);
        baseTrueDef=[5,10,15][di];
      } else if(race==="سيلافين"&&p.souls){
        baseHP=Math.floor(p.souls/40);hpPer=Math.floor(p.souls/400);baseTrueDef=0;
      } else {
        baseHP=RACE_BASE_HP[race]??20;
        hpPer=(RACE_HP_PER[race]??8)+(race==="سكارد"?Math.round(level*3):0);
        baseTrueDef=RACE_TRUE_DEF[race]??0;
      }
      if(p.customHpPer!=null) hpPer=p.customHpPer;
      const hp=baseHP+fBas*hpPer;
      let baseHala;
      if(race==="سيلافين"&&p.souls){baseHala=LIFE_GRADE_BASE_HALA[p.lifeGrade]||100;}
      else{baseHala=LIFE_GRADE_BASE_HALA[p.lifeGrade]||RACE_BASE_HALA[race]||100;}
      const hala=Math.round(baseHala*(lvData?.halaMult||1));
      const raceDefBonus=race==="آلزاداكايند"?fBas+fStr:race==="سكارد"?10:0;
      const defBasMult2 = p.customDefBasMult ?? (race==="آلزاداكايند"?3:2);
      const lvlDefBonus2 = p.customLvlDef ?? (lvData?.defense||0);
      const defense=fBas*defBasMult2+lvlDefBonus2+raceDefBonus;
      const trueDefense=baseTrueDef+(race==="آلزاداكايند"?Math.floor(defense*0.1):0);
      const dmgReduce=lvData?.dmgReduce||0;
      const eyeImmBonus2=(()=>{
        if(race!=="إتشيرما"||!p.eyeType||!EYE_DATA[p.eyeType]) return 0;
        const eInfo=EYE_DATA[p.eyeType];
        const eSk=p.skills.find(s=>s.name===eInfo.skillName);
        return (eSk&&eInfo.baseSkills.includes("المناعة"))?getEyeBonus(eSk.level):0;
      })();
      const wingsSkillCb=p.skills.find(s=>s.name==="الأجنحة");
      const wingsImmCb=(p.dragonParts||[]).includes("أجنحة")?(wingsSkillCb?getLimbBonus(wingsSkillCb.level):2):0;
      const immunity=fStr+Math.floor(fStr/2)+Math.floor(fBas/2)+(RACE_BASE_IMM[race]||0)+wingsImmCb+eyeImmBonus2;
      const size=p.size||((RACE_HEIGHT[race]||130)+(2*fStr)+(4*fBas));
      const physStrPct=Math.floor(Math.max(0,size-170)/10)*5;
      const agilitySkill=p.skills.find(s=>s.name==="الرشاقة");
      const agilityBonus=agilitySkill?(parseInt(agilitySkill.bonus)||0):0;
      const stamina=1+fStr+agilityBonus;
      const luckChances=Math.ceil(luckVal/2);
      const sixthSenseSkill=p.skills.find(s=>s.name==="الحاسة السادسة");
      const sixthSenseSkillVal=sixthSenseSkill?(parseInt(sixthSenseSkill.bonus)||0)+(parseInt(sixthSenseSkill.extraBonus)||0):null;
      const sixthSenseChances=sixthSenseSkillVal!==null?Math.ceil(sixthSenseSkillVal/2):null;
      // ── تنظيف بونسات البيرك القديمة من المهارات قبل إعادة الحساب ──
      const prevStrBonusCb = p.strPerkEffects?.speedBonus||0;
      const prevSsBonusCb  = p.basPerkEffects?.sixthSenseBonus||0;
      const prevAlertBonusCb = p.intPerkEffects?.alertnessBonus||0;
      const eyeTypeCb = p.eyeType;
      const eyeInfoCb = (eyeTypeCb && EYE_DATA[eyeTypeCb]) ? EYE_DATA[eyeTypeCb] : null;
      const eyeSkillCb = eyeInfoCb ? p.skills.find(s=>s.name===eyeInfoCb.skillName) : null;
      const eyeBonusCb = eyeSkillCb ? getEyeBonus(eyeSkillCb.level) : 2;

      const cleanedSkillsCb = p.skills.map(sk => {
        let eb = parseInt(sk.extraBonus)||0;
        if(sk.name==="السرعة"         && prevStrBonusCb>0  && !sk.isPerkBonus) eb = Math.max(0, eb - prevStrBonusCb);
        if(sk.name==="الحاسة السادسة" && prevSsBonusCb>0   && !sk.isPerkBonus) eb = Math.max(0, eb - prevSsBonusCb);
        if(sk.name==="اليقظة"         && prevAlertBonusCb>0 && !sk.isPerkBonus) eb = Math.max(0, eb - prevAlertBonusCb);
        if(sk.isEyeBonus===undefined && eyeInfoCb && eyeInfoCb.baseSkills.includes(sk.name)){
          const isDoubled = eyeInfoCb.tiers.some(t=>t.doublesSkill&&t.addsSkill===sk.name);
          const actual = isDoubled ? eyeBonusCb*2 : eyeBonusCb;
          eb = Math.max(0, eb - actual);
        }
        return {...sk, extraBonus: eb};
      }).filter(sk => {
        if(sk.isPerkBonus && sk.name==="السرعة"         && prevStrBonusCb>0)   return false;
        if(sk.isPerkBonus && sk.name==="الحاسة السادسة" && prevSsBonusCb>0)    return false;
        if(sk.isPerkBonus && sk.name==="اليقظة"         && prevAlertBonusCb>0) return false;
        return true;
      });

      const cbBase={...p,hp,hpMax:hp,hala,halaMax:hala,defense,trueDefense,dmgReduce,immunity,physStrPct,size,
        skills: cleanedSkillsCb,
        stamina,staminaMax:stamina,luckChances,luckChancesMax:luckChances,
        sixthSenseChances,sixthSenseChancesMax:sixthSenseChances!==null?sixthSenseChances:undefined,
