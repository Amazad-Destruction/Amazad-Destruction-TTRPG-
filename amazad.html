                    <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid #1a2030",marginTop:"6px",paddingTop:"7px"}}>
                      <span style={{fontSize:"10px",color:"#4b5563"}}>المجموع</span>
                      <span style={{fontSize:"11px",fontWeight:"700",color:gradColor(cn.stats.reduce((a,s)=>a+s.value,0),RACE_MAX[cn.race]||30)}}>
                        {cn.stats.reduce((a,s)=>a+s.value,0)} / {RACE_MAX[cn.race]||30}
                      </span>
                    </div>
                  </div>
                </Sec>


                {/* ربط الحاجز — يظهر دائماً */}
                {(()=>{
                  const barrierSk=cn.skills?.find(s=>s.isBarrier&&!s.isSakardBonus&&!s.isRaceSkill&&!s.isLimbSkill);
                  const bBinding=cn.barrierBinding||(barrierSk?{
                    stat:barrierSk.bindingStat||barrierSk.stat||"القوة",
                    degree:BINDING_DEGREE(cn.level,barrierSk.level)||"ثالثة",
                    effect:BINDING_EFFECT[barrierSk.bindingStat||barrierSk.stat]||"—"
                  }:{stat:"القوة",degree:"ثالثة",effect:"—"});
                  const bStatColor=STAT_COLOR[bBinding.stat]||"#8b5cf6";
                  return(
                    <Sec title="ربط الحاجز" accent={bStatColor}>
                      <div style={{background:"#0a0c14",border:`1px solid ${bStatColor}33`,borderRadius:"10px",padding:"12px 14px"}}>
                        <div style={{display:"flex",gap:"12px",flexWrap:"wrap",marginBottom:"10px"}}>
                          <div>
                            <div style={{fontSize:"9px",color:"#4b5563",marginBottom:"3px"}}>السمة المربوطة</div>
                            <select value={bBinding.stat}
                              onChange={e=>{
                                const bsk=cn.skills.find(s=>s.isBarrier&&!s.isSakardBonus&&!s.isRaceSkill&&!s.isLimbSkill);
                                if(bsk) changeBarrierBinding(bsk.id,e.target.value);
                                else upd("barrierBinding",{...bBinding,stat:e.target.value,
                                  effect:(BINDING_EFFECT_BY_DEGREE[e.target.value]||{})[bBinding.degree]||"—"});
                              }}
                              style={{background:"#161b27",border:`1px solid ${bStatColor}44`,borderRadius:"6px",
                                color:bStatColor,fontSize:"12px",fontWeight:"700",padding:"4px 6px",
                                fontFamily:"inherit",direction:"rtl"}}>
                              {BINDING_STATS.map(s=><option key={s} value={s}>{s}</option>)}
                            </select>
                          </div>
                          <div>
                            <div style={{fontSize:"9px",color:"#4b5563",marginBottom:"3px"}}>درجة الربط</div>
                            <div style={{display:"flex",gap:"4px"}}>
                              {["ثالثة","ثانية","أولى","صفر"].map(deg=>(
                                <button key={deg} onClick={()=>{
                                  const newEffect=(BINDING_EFFECT_BY_DEGREE[bBinding.stat]||{})[deg]||"—";
                                  upd("barrierBinding",{...bBinding,degree:deg,effect:newEffect});
                                }}
                                  style={{padding:"3px 7px",fontSize:"10px",fontWeight:"700",cursor:"pointer",
                                    fontFamily:"inherit",borderRadius:"5px",
                                    background:bBinding.degree===deg?`${bStatColor}33`:"transparent",
                                    border:`1px solid ${bBinding.degree===deg?bStatColor:"#1a2030"}`,
                                    color:bBinding.degree===deg?bStatColor:"#6b7280"}}>
                                  {deg}
                                </button>
                              ))}
                            </div>
                          </div>
                        </div>
                        <div style={{fontSize:"10px",color:"#9ca3af",lineHeight:"1.7",background:"#080b10",borderRadius:"6px",padding:"8px 10px",borderRight:`3px solid ${bStatColor}66`}}>
                          <span style={{color:bStatColor,fontWeight:"700"}}>التأثير — ربط {bBinding.stat} ({bBinding.degree||"ثالثة"}):{" "}</span>
                          {(BINDING_EFFECT_BY_DEGREE[bBinding.stat]||{})[bBinding.degree]||bBinding.effect||"—"}
                        </div>
                        {/* حساب ربط الحاجز بالقوة والبراعة */}
                        {barrierSk&&(bBinding.stat==="البراعة"||bBinding.stat==="القوة")&&(()=>{
                          const barrierTotal=(parseInt(barrierSk.bonus)||0)+(parseInt(barrierSk.extraBonus)||0);
                          const deg=bBinding.degree||"ثالثة";
                          if(bBinding.stat==="البراعة"){
                            const pct={ثالثة:25,ثانية:35,أولى:35,صفر:35}[deg]||25;
                            const bonus=Math.floor(barrierTotal*(pct/100));
                            return(
                              <div style={{marginTop:"7px",background:"#eab30808",border:"1px solid #eab30822",borderRadius:"6px",padding:"7px 10px"}}>
                                <div style={{fontSize:"9px",color:"#eab308",fontWeight:"700",marginBottom:"3px"}}>⚡ حساب ربط البراعة</div>
                                <div style={{fontSize:"9px",color:"#9ca3af"}}>
                                  الحاجز ({barrierTotal}) × {pct}٪ =
                                  <span style={{color:"#eab308",fontWeight:"700",marginRight:"4px"}}> +{bonus} براعة</span>
                                </div>
                              </div>
                            );
                          }
                          if(bBinding.stat==="القوة"){
                            const strVal=cn.stats?.find(s=>s.name==="القوة")?.value||0;
                            const pct={ثالثة:20,ثانية:25,أولى:30,صفر:30}[deg]||20;
                            const bonus=Math.floor(strVal*(pct/100));
                            return(
                              <div style={{marginTop:"7px",background:"#ef444408",border:"1px solid #ef444422",borderRadius:"6px",padding:"7px 10px"}}>
                                <div style={{fontSize:"9px",color:"#ef4444",fontWeight:"700",marginBottom:"3px"}}>⚡ حساب ربط القوة</div>
                                <div style={{fontSize:"9px",color:"#9ca3af"}}>
                                  القوة ({strVal}) × {pct}٪ =
                                  <span style={{color:"#ef4444",fontWeight:"700",marginRight:"4px"}}> +{bonus} على الحاجز</span>
                                  {" "}⟹ إجمالي الحاجز: <span style={{color:"#ef4444",fontWeight:"700"}}>{barrierTotal+bonus}</span>
                                </div>
                              </div>
                            );
                          }
                        })()}
                        {!barrierSk&&(
                          <div style={{fontSize:"9px",color:"#4b5563",marginTop:"7px",textAlign:"center"}}>لا توجد مهارة حاجز — أضف مهارة حاجز من قسم المهارات لتفعيل الربط</div>
                        )}
                      </div>
                    </Sec>
                  );
                })()}


                {/* قسم مهارات عين الإتشيرما */}
                {cn.race==="إتشيرما"&&(()=>{
                  const eyeType = cn.eyeType||"البديه";
                  const eyeInfo = EYE_DATA[eyeType];
                  if(!eyeInfo) return null;
                  const eyeSkill = cn.skills.find(s=>s.name===eyeInfo.skillName);
                  const eyeLevel = eyeSkill?.level||null;
                  const eyeBonus = eyeSkill?getEyeBonus(eyeSkill.level):2;
                  const TIER_ORDER = ["متعلم","خبير","متقدم","متقن","أستاذ","قديس","نبوي","إلهي","بدائي","أزلي"];
                  const eyeTierIdx = eyeLevel ? TIER_ORDER.indexOf(eyeLevel) : -1;
                  // مهارات العين الفعّالة حسب المستوى
                  const activeBaseSkills = [...eyeInfo.baseSkills];
                  if(eyeLevel) {
                    eyeInfo.tiers.forEach(t=>{
                      if(t.addsSkill && TIER_ORDER.indexOf(t.level) <= eyeTierIdx && !activeBaseSkills.includes(t.addsSkill))
                        activeBaseSkills.push(t.addsSkill);
                    });
                  }
                  const alreadyHasEyeSkill = cn.skills.some(s=>s.name===eyeInfo.skillName);

                  const applyEyeBonuses = () => {
                    setNpc(p=>{
                      const eSk=p.skills.find(s=>s.name===eyeInfo.skillName);
                      const eBonus=eSk?getEyeBonus(eSk.level):2;
                      const eTierIdx=eSk?TIER_ORDER.indexOf(eSk.level):-1;
                      const activeBase=[...eyeInfo.baseSkills];
                      eyeInfo.tiers.forEach(t=>{
                        if(t.addsSkill&&TIER_ORDER.indexOf(t.level)<=eTierIdx&&!activeBase.includes(t.addsSkill))
                          activeBase.push(t.addsSkill);
                      });
                      let newSkills=[...p.skills];
                      // إضافة مهارة العين إن لم تكن موجودة
                      if(!newSkills.some(s=>s.name===eyeInfo.skillName)){
                        newSkills.push({id:Date.now()+Math.random(),
                          name:eyeInfo.skillName,stat:"البأس",level:"متعلم",bonus:"+2",extraBonus:0,
                          isBarrier:true,bindingStat:"البأس",isEyeSkill:true});
                      }
                      // تحديث بونسات المهارات الأساسية
                      activeBase.forEach(skName=>{
                        const isDoubled=eyeInfo.tiers.some(t=>t.doublesSkill&&t.addsSkill===skName&&TIER_ORDER.indexOf(t.level)<=eTierIdx);
                        const actualBonus=isDoubled?eBonus*2:eBonus;
                        const existing=newSkills.find(s=>s.name===skName&&!s.isBarrier);
                        if(existing){
                          existing.extraBonus=actualBonus;
                        } else {
                          const stat=Object.entries(SKILLS_BY_STAT).find(([_,arr])=>arr.includes(skName))?.[0]||"البأس";
                          newSkills.push({id:Date.now()+Math.random(),name:skName,stat,
                            level:"غير متعلم",bonus:"+0",extraBonus:actualBonus,
                            isBarrier:false,bindingStat:null,isEyeBonus:true});
                        }
                      });
                      // بونس البصير بدائي: إضافة/تحديث حاجز العين
                      const basrTier=eyeInfo.tiers.find(t=>t.addsBarrier&&TIER_ORDER.indexOf(t.level)<=eTierIdx);
                      if(basrTier){
                        const existingEyeBarrier=newSkills.find(s=>s.isBarrier&&s.isEyeBonus);
                        if(existingEyeBarrier){
                          existingEyeBarrier.extraBonus=eBonus;
                        } else {
                          const bStat=BINDING_STATS.filter(s=>s!=="الحظ")[0];
                          newSkills.push({id:Date.now()+Math.random(),name:"الحاجز",stat:bStat,
                            level:"غير متعلم",bonus:"+0",extraBonus:eBonus,
                            isBarrier:true,bindingStat:bStat,isEyeBonus:true});
                        }
                      }
                      return {...p,skills:newSkills};
                    });
                  };

                  return(
                    <Sec title={`مهارات عين ${eyeType}`} accent={eyeInfo.color}>
                      <div style={{background:"#080b10",border:`1px solid ${eyeInfo.color}22`,borderRadius:"10px",padding:"12px 14px"}}>
                        {/* المهارات الأساسية للعين مع البونس الديناميكي */}
                        <div style={{marginBottom:"10px"}}>
                          <div style={{fontSize:"9px",color:"#6b7280",marginBottom:"5px",letterSpacing:"0.08em"}}>المهارات الأساسية {eyeLevel&&<span style={{color:eyeInfo.color}}>— بونس: +{eyeBonus}</span>}</div>
                          <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                            {activeBaseSkills.map(sk=>{
                              const isDoubled=eyeInfo.tiers.some(t=>t.doublesSkill&&t.addsSkill===sk&&eyeTierIdx>=TIER_ORDER.indexOf(t.level));
                              const displayBonus=isDoubled?eyeBonus*2:eyeBonus;
                              return(
                                <span key={sk} style={{fontSize:"10px",fontWeight:"700",color:eyeInfo.color,
                                  background:`${eyeInfo.color}18`,borderRadius:"5px",padding:"2px 8px",
                                  border:`1px solid ${eyeInfo.color}44`}}>
                                  {sk} +{displayBonus}{isDoubled&&<span style={{fontSize:"8px",color:"#f59e0b"}}>×2</span>}
                                </span>
                              );
                            })}
                          </div>
                        </div>
                        {/* الوصف */}
                        <div style={{fontSize:"10px",color:"#9ca3af",lineHeight:"1.7",marginBottom:"8px",
                          borderRight:`3px solid ${eyeInfo.color}55`,padding:"6px 10px",background:`${eyeInfo.color}08`,borderRadius:"5px"}}>
                          {eyeInfo.bonusText}<br/>
                          <span style={{color:"#6b7280",fontSize:"9px"}}>{eyeInfo.desc}</span><br/>
                          <span style={{color:eyeInfo.color,fontWeight:"700",fontSize:"9px"}}>{eyeInfo.ability}</span>
                        </div>
                        {/* زر تطبيق بونسات العين على المهارات */}
                        <button onClick={applyEyeBonuses}
                          style={{fontSize:"10px",color:eyeInfo.color,background:`${eyeInfo.color}11`,
                            border:`1px solid ${eyeInfo.color}44`,borderRadius:"6px",padding:"4px 12px",
                            cursor:"pointer",fontFamily:"inherit",marginBottom:"8px",width:"100%",fontWeight:"700"}}>
                          ✦ {alreadyHasEyeSkill?"تحديث بونسات العين على المهارات":"إضافة مهارة العين + تطبيق البونسات"}
                        </button>
                        {/* مستويات المهارة وتأثيراتها */}
                        <button onClick={()=>setEyeOpen(p=>!p)}
                          style={{width:"100%",background:"transparent",border:`1px solid ${eyeInfo.color}22`,borderRadius:"6px",
                            color:"#6b7280",fontSize:"9px",padding:"4px",cursor:"pointer",fontFamily:"inherit",
                            display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <span>مستويات المهارة وتأثيراتها</span>
                          <span>{eyeOpen?"▲":"▼"}</span>
                        </button>
                        {eyeOpen&&(
                          <div style={{marginTop:"8px",display:"flex",flexDirection:"column",gap:"5px"}}>
                            {eyeInfo.tiers.map(t=>{
                              const tierIdx = TIER_ORDER.indexOf(t.level);
                              const isActive = eyeTierIdx >= tierIdx;
                              return(
                                <div key={t.level} style={{padding:"6px 10px",borderRadius:"6px",
                                  background:isActive?`${eyeInfo.color}15`:"transparent",
                                  border:`1px solid ${isActive?eyeInfo.color+"44":"#1a2030"}`,
                                  borderRight:isActive?`3px solid ${eyeInfo.color}`:"3px solid #1a2030"}}>
                                  <span style={{fontSize:"9px",fontWeight:"800",color:isActive?eyeInfo.color:"#4b5563"}}>
                                    {isActive?"✦ ":""}{t.level}
                                  </span>
                                  <span style={{fontSize:"9px",color:isActive?"#9ca3af":"#374151",marginRight:"6px"}}> — {t.bonus}</span>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    </Sec>
                  );
                })()}

                {/* قسم مهارات أعضاء التنانين */}
                {cn.race==="آلزاداكايند"&&(cn.dragonParts||[]).length>0&&(()=>{
                  const parts=cn.dragonParts||[];
                  return(
                    <Sec title="مهارات أعضاء التنين" accent="#f97316">
                      <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                        {parts.map(part=>{
                          const limbInfo=DRAGON_LIMB_DATA[part];
                          if(!limbInfo) return null;
                          const limbSkill=cn.skills.find(s=>s.name===limbInfo.skillName);
                          const limbLevel=limbSkill?.level||null;
                          const limbBonus=limbSkill?getLimbBonus(limbSkill.level):2;
                          const alreadyHas=!!limbSkill;
                          return(
                            <div key={part} style={{background:"#080b10",border:`1px solid ${limbInfo.color}22`,
                              borderRadius:"10px",padding:"12px 14px",borderRight:`3px solid ${limbInfo.color}55`}}>
                              {/* رأس القسم */}
                              <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
                                <div style={{width:"3px",height:"12px",background:limbInfo.color,borderRadius:"2px"}}/>
                                <span style={{fontSize:"11px",fontWeight:"800",color:limbInfo.color}}>{part}</span>
                                <span style={{fontSize:"9px",color:"#4b5563",background:`${limbInfo.color}18`,
                                  borderRadius:"4px",padding:"1px 6px",border:`1px solid ${limbInfo.color}22`}}>
                                  {limbInfo.statBonusLabel}
                                </span>
                                <span style={{fontSize:"9px",color:limbInfo.color,background:`${limbInfo.color}18`,
                                  borderRadius:"4px",padding:"1px 6px",border:`1px solid ${limbInfo.color}33`,fontWeight:"700"}}>
                                  {limbInfo.bonusType}: +{limbBonus}
                                </span>
                              </div>
                              {/* الوصف */}
                              <div style={{fontSize:"9px",color:"#9ca3af",lineHeight:"1.6",marginBottom:"8px",
                                padding:"5px 8px",background:`${limbInfo.color}08`,borderRadius:"5px"}}>
                                {limbInfo.desc}<br/>
                                <span style={{color:limbInfo.color,fontWeight:"700"}}>{limbInfo.ability}</span>
                              </div>
                              {/* معلومات المهارة الحالية */}
                              {limbLevel&&(
                                <div style={{fontSize:"9px",color:limbInfo.color,marginBottom:"6px",fontWeight:"700"}}>
                                  مستوى {limbInfo.skillName}: {SKILL_LEVEL_SYMBOL[limbLevel]||"◌"} {limbLevel}
                                  {" — "}{limbInfo.bonusType} +{limbBonus}
                                </div>
                              )}
                              {/* زر إضافة المهارة */}
                              {!alreadyHas&&(
                                <button onClick={()=>setNpc(p=>{
                                  const lvl="متعلم";
                                  const lvObj=SKILL_LEVELS.find(l=>l.name===lvl);
                                  return{...p,skills:[...p.skills,{id:Date.now()+Math.random(),
                                    name:limbInfo.skillName,stat:limbInfo.stat,level:lvl,
                                    bonus:lvObj?.bonus||"+2",extraBonus:0,
                                    isBarrier:true,bindingStat:limbInfo.stat,isLimbSkill:true,limbPart:part}]};
                                })}
                                  style={{fontSize:"10px",color:limbInfo.color,background:`${limbInfo.color}11`,
                                    border:`1px solid ${limbInfo.color}44`,borderRadius:"6px",padding:"4px 12px",
                                    cursor:"pointer",fontFamily:"inherit",width:"100%",fontWeight:"700"}}>
                                  + إضافة مهارة {limbInfo.skillName}
                                </button>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </Sec>
                  );
                })()}

                {/* خصائص العرق */}
                <Sec title="خصائص العرق" accent={rc}
                  onAdd={()=>upd("raceTraits",[...(cn.raceTraits||[]),"خاصية جديدة"])}
                  addLabel="خاصية">
                  <div style={{background:"#080b10",border:"1px solid #1a2030",borderRadius:"10px",padding:"12px 14px"}}>
                    {(cn.raceTraits||[]).length===0&&(
                      <div style={{fontSize:"11px",color:"#374151",textAlign:"center",padding:"6px 0"}}>لا توجد خصائص — اضغط + للإضافة</div>
                    )}
                    {(cn.raceTraits||[]).map((t,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"flex-start",gap:"6px",
                        borderBottom:i<(cn.raceTraits||[]).length-1?"1px solid #0e1220":"none",
                        padding:"5px 0",lineHeight:"1.5"}}>
                        <span style={{color:rc,marginLeft:"4px",marginTop:"1px",flexShrink:0}}>◈</span>
                        <div style={{flex:1}}>
                          <Ei value={t} onChange={v=>{const tr=[...(cn.raceTraits||[])];tr[i]=v;upd("raceTraits",tr);}}
                            color="#9ca3af" fontSize="11px"/>
                        </div>
                        <button style={{display:cleanView?"none":undefined}} onClick={()=>upd("raceTraits",(cn.raceTraits||[]).filter((_,j)=>j!==i))}
                          style={{background:"transparent",border:"none",color:"#374151",cursor:"pointer",
                            fontSize:"13px",padding:"0",lineHeight:1,flexShrink:0}}>×</button>
                      </div>
                    ))}
                    {(cn.race==="بهائم الظلام"||cn.race==="وحش الظلام")&&(
                      <div style={{marginTop:"8px",borderTop:"1px solid #1a2030",paddingTop:"8px"}}>
                        <button onClick={()=>{
                          const isDark=cn.race==="وحش الظلام";
                          const r=isDark?Math.floor(Math.random()*50)+51:Math.floor(Math.random()*100)+1;
                          const label=r<=20?"نواة هشة":r<=40?"نواة عادية":r<=60?"نواة قوية":r<=75?"نواة ممتازة":r<=90?"نواة أسطورية":"نواة إلهية";
                          const idx=(cn.extraCores||[]).length+2;
                          upd("extraCores",[...(cn.extraCores||[]),{roll:r,label}]);
                          upd("raceTraits",[...(cn.raceTraits||[]),`نواة ${idx}: ${label} (رمية: ${r})`]);
                        }}
                          style={{fontSize:"9px",color:"#a78bfa",background:"#a78bfa11",
                            border:"1px solid #a78bfa33",borderRadius:"4px",padding:"2px 10px",
                            cursor:"pointer",fontFamily:"inherit"}}>
                          + نواة إضافية
                        </button>
                      </div>
                    )}
                  </div>
                </Sec>

                {/* زر إعادة الحساب مع خيارات */}
                <div style={{position:"relative",display:"inline-block",marginBottom:"16px"}}>
                  <button onClick={()=>setRecalcOpen(p=>!p)}
                    style={{padding:"5px 12px",background:"#0a1020",border:"1px solid #3b82f655",
                      borderRadius:"8px",color:"#60a5fa",fontSize:"10px",fontWeight:"700",
                      cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"5px"}}>
                    🔄 إعادة الحساب {recalcOpen?"▲":"▼"}
                  </button>
                  {recalcOpen&&(
                    <div style={{position:"absolute",top:"calc(100% + 4px)",right:0,zIndex:50,
                      background:"#0c0f18",border:"1px solid #3b82f633",borderRadius:"8px",
                      minWidth:"210px",boxShadow:"0 6px 24px #000c",animation:"fi 0.15s ease",padding:"10px 14px"}}>
                      {/* خيارات ما يُعاد حسابه */}
                      <div style={{fontSize:"8px",color:"#4b5563",marginBottom:"8px",borderBottom:"1px solid #1a2030",paddingBottom:"7px"}}>
                        ما يُشمل في إعادة الحساب:
                      </div>
                      {[
                        {key:"hp",        label:"الصحة"},
                        {key:"def",       label:"الدفاع"},
                        {key:"worth",     label:"الاستحقاق"},
                        {key:"size",      label:"الحجم + معادلة القوة"},
                        {key:"perkSkills",label:"مهارات البيركز (يقظة...)"},
                      ].map(({key,label})=>(
                        <label key={key} style={{display:"flex",alignItems:"center",gap:"7px",
                          fontSize:"10px",color:recalcOpts[key]?"#e5e7eb":"#4b5563",
                          cursor:"pointer",marginBottom:"5px",direction:"rtl"}}>
                          <input type="checkbox" checked={recalcOpts[key]}
                            onChange={e=>setRecalcOpts(p=>({...p,[key]:e.target.checked}))}
                            style={{cursor:"pointer",accentColor:"#3b82f6"}}/>
                          {label}
                        </label>
                      ))}
                      <div style={{borderTop:"1px solid #1a2030",marginTop:"8px",paddingTop:"8px",display:"flex",flexDirection:"column",gap:"5px"}}>
                        <button onClick={()=>{recalculate(recalcOpts);setRecalcOpen(false);}}
                          style={{width:"100%",padding:"7px 14px",background:"#0c1428",border:"1px solid #3b82f644",borderRadius:"6px",
                            color:"#60a5fa",fontSize:"11px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit",textAlign:"right",direction:"rtl"}}>
                          🔄 إعادة حساب كاملة
                        </button>
                        <button onClick={()=>{recalcCombatOnly(recalcOpts);setRecalcOpen(false);}}
                          style={{width:"100%",padding:"7px 14px",background:"#0c1a10",border:"1px solid #f9731644",borderRadius:"6px",
                            color:"#f97316",fontSize:"11px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit",textAlign:"right",direction:"rtl"}}>
                          ⚔ إعادة حساب قتالية فقط
                        </button>
                      </div>
                    </div>
                  )}
                </div>

                {/* المهارات */}
                <Sec title="المهارات" accent="#06b6d4" onAdd={null} addLabel={null}>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"10px"}}>
                    {["القوة","البأس","المعرفة","البراعة","الذكاء","الكاريزما"].map(st=>{
                      const stC=STAT_COLOR[st]||"#9ca3af";
                      const isOpen=addSkillMenu===st;
                      const usedNames=new Set(cn.skills.map(s=>s.name));
                      return(
                        <div key={st} style={{position:"relative",display:"inline-block",zIndex:isOpen?200:1}}>
                          <button style={{display:cleanView?"none":undefined}} onClick={e=>{e.stopPropagation();setAddSkillMenu(isOpen?null:st);}}
                            style={{fontSize:"9px",color:stC,background:`${stC}${isOpen?"22":"11"}`,
                              border:`1px solid ${stC}${isOpen?"99":"44"}`,
                              borderRadius:"5px",padding:"2px 7px",cursor:"pointer",fontFamily:"inherit",
                              transition:"all 0.15s"}}>
                            + {st} {isOpen?"▲":"▼"}
                          </button>
                          {isOpen&&(
                            <div onClick={e=>e.stopPropagation()}
                              style={{position:"absolute",top:"calc(100% + 4px)",right:0,
                                background:"#0c0f18",border:`1px solid ${stC}55`,borderRadius:"8px",
                                zIndex:201,padding:"4px",minWidth:"140px",
                                boxShadow:"0 6px 24px #000c",animation:"fi 0.15s ease"}}>
                              {(SKILLS_BY_STAT[st]||[]).map(skillName=>{
                                const already=usedNames.has(skillName);
                                return(
                                  <div key={skillName}
                                    onClick={()=>{if(!already) addSk(st,skillName);}}
                                    style={{padding:"5px 10px",fontSize:"10px",fontWeight:"600",
                                      color:already?"#374151":stC,
                                      cursor:already?"not-allowed":"pointer",
                                      borderRadius:"5px",
                                      background:"transparent",
                                      display:"flex",justifyContent:"space-between",alignItems:"center",
                                      transition:"background 0.1s"}}>
                                    <span style={{textDecoration:already?"line-through":"none"}}>{skillName}</span>
                                    {already&&<span style={{fontSize:"8px",color:"#374151"}}>✓</span>}
                                  </div>
                                );
                              })}
                              <div style={{borderTop:`1px solid ${stC}22`,marginTop:"3px",paddingTop:"3px"}}>
                                <div onClick={()=>addSk(st)}
                                  style={{padding:"4px 10px",fontSize:"9px",color:"#6b7280",
                                    cursor:"pointer",borderRadius:"5px",fontStyle:"italic"}}>
                                  + مهارة مخصصة
                                </div>
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                    <button onClick={()=>addSk("الحاجز")}
                      style={{fontSize:"9px",color:"#8b5cf6",background:"#8b5cf611",border:"1px solid #8b5cf644",
                        borderRadius:"5px",padding:"2px 7px",cursor:"pointer",fontFamily:"inherit"}}>
                      + حاجز
                    </button>
                    {/* مهارة النواة لبهائم/وحوش الظلام */}
                    {(RACE_SPECIAL_SKILLS[cn.race]||[]).map(rs=>{
                      const already=cn.skills.some(s=>s.name===rs.name);
                      return(
                        <button key={rs.name+"-add"} onClick={()=>{
                          setNpc(p=>({...p,skills:[...p.skills,{id:Date.now()+Math.random(),
                            name:rs.name,stat:rs.stat,level:"متعلم",bonus:"+2",extraBonus:0,
                            isBarrier:true,bindingStat:rs.stat,isRaceSkill:true}]}));
                        }}
                          style={{fontSize:"9px",color:already?"#6b7280":"#f97316",
                            background:already?"#6b728011":"#f9731611",border:`1px solid ${already?"#2d3748":"#f9731644"}`,
                            borderRadius:"5px",padding:"2px 7px",cursor:"pointer",fontFamily:"inherit"}}>
                          {already?"+ مرة أخرى":"+"} {rs.name}
                        </button>
                      );
                    })}
                  </div>
                  {cn.skills.length===0&&<div style={{fontSize:"12px",color:"#374151",textAlign:"center",padding:"10px 0"}}>لا توجد مهارات — اضغط + لإضافة</div>}
                  {(()=>{
                    const groups={};
                    cn.skills.forEach(sk=>{
                      const grp=sk.isSakardBonus?"سكارد":sk.isBarrier?"المهارات الأساسية":(sk.stat||"أخرى");
                      if(!groups[grp]) groups[grp]=[];
                      groups[grp].push(sk);
                    });
                    const order=["المهارات الأساسية","سكارد","القوة","البأس","المعرفة","البراعة","الذكاء","الكاريزما","الحظ","أخرى"];
                    const sortedGroups=Object.keys(groups).sort((a,b)=>{const ai=order.indexOf(a),bi=order.indexOf(b);return(ai===-1?99:ai)-(bi===-1?99:bi);});
                    return sortedGroups.map(grpName=>{
                      const grpSkills=groups[grpName];
                      const grpColor=grpName==="المهارات الأساسية"?"#8b5cf6":grpName==="سكارد"?"#a78bfa":(STAT_COLOR[grpName]||"#6b7280");
                      const statVal=cn.stats?.find(s=>s.name===grpName)?.value;
                      // هل تحتوي المجموعة على مهارات متغيرة في وضع التحول؟
                      const hasChangedSkills = activeTransform>0 && grpSkills.some(sk=>{
                        const base = npc.skills?.find(s=>s.id===sk.id);
                        if(!base) return true; // مهارة جديدة
                        return base.level!==sk.level || String(base.extraBonus||0)!==String(sk.extraBonus||0);
                      });
                      return(
                        <div key={grpName} style={{
                          marginBottom:"14px",
                          borderRadius: hasChangedSkills?"10px":"0",
                          background: hasChangedSkills?`radial-gradient(ellipse at top, ${grpColor}12 0%, transparent 70%)`:"transparent",
                          boxShadow: hasChangedSkills?`0 0 20px ${grpColor}22`:"none",
                          padding: hasChangedSkills?"2px":"0",
                          transition:"all 0.3s",
                        }}>
                          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"7px",
                            padding:"5px 6px",borderBottom:`2px solid ${hasChangedSkills?grpColor+"99":grpColor+"55"}`,
                            background:`linear-gradient(90deg,${grpColor}${hasChangedSkills?"25":"15"},transparent)`,borderRadius:"4px 4px 0 0"}}>
                            <div style={{width:"4px",height:"14px",background:grpColor,borderRadius:"2px",
                              boxShadow: hasChangedSkills?`0 0 8px ${grpColor}`:undefined}}/>
                            <span style={{fontSize:"10px",fontWeight:"800",color:grpColor,letterSpacing:"0.1em",
                              textShadow: hasChangedSkills?`0 0 10px ${grpColor}88`:undefined}}>{grpName}</span>
                            {statVal!==undefined&&(
                              <span style={{fontSize:"9px",color:"#4b5563",background:"#0d1117",borderRadius:"4px",padding:"1px 6px",border:`1px solid ${grpColor}33`}}>

                              </span>
                            )}
                            <span style={{fontSize:"9px",color:"#374151",marginRight:"auto"}}>{grpSkills.length} مهارات</span>
                            {hasChangedSkills&&(
                              <span style={{fontSize:"8px",color:grpColor,background:`${grpColor}22`,
                                borderRadius:"4px",padding:"1px 6px",fontWeight:"700",
                                boxShadow:`0 0 6px ${grpColor}66`}}>⟳ متغير</span>
                            )}
                          </div>
                          {grpSkills.map(sk=>{
                            const barrierStatColor = sk.isBarrier&&!sk.isSakardBonus
                              ? sk.isLimbSkill?(DRAGON_LIMB_DATA[sk.limbPart]?.color||"#f97316")
                              : (STAT_COLOR[sk.bindingStat||sk.stat]||"#8b5cf6")
                              : null;
                            const skSC=sk.isSakardBonus?"#a78bfa":barrierStatColor||(STAT_COLOR[sk.stat]||"#9ca3af");
                            const skLC=skillColorByStat(sk.level,sk.stat||"القوة");
                            const skSym=SKILL_LEVEL_SYMBOL[sk.level]||"◌";
                            const extraB=Number(sk.extraBonus)||0;
                            const baseBonusNum=parseInt(sk.bonus)||0;
                            const totalBonusDisplay=extraB!==0?`${sk.bonus}+${extraB}`:sk.bonus;
                            // تمييز المهارات المختلفة في وضع التحول
                            const baseSkill = activeTransform>0 ? npc.skills?.find(s=>s.id===sk.id) : null;
                            const isNewSkill = activeTransform>0 && !baseSkill;
                            const isChangedSkill = activeTransform>0 && baseSkill && (
                              baseSkill.level !== sk.level ||
                              String(baseSkill.extraBonus||0) !== String(sk.extraBonus||0)
                            );
                            const skillGlowColor = isNewSkill?"#a78bfa":isChangedSkill?skLC:null;
                            return(
                              <div key={sk.id} style={{
                                background: skillGlowColor
                                  ? `radial-gradient(ellipse at top right, ${skillGlowColor}18 0%, #0a0c14 70%)`
                                  : "#0a0c14",
                                border:skillGlowColor?`1px solid ${skillGlowColor}66`:`1px solid ${skSC}22`,
                                borderRadius:"8px",padding:"8px 11px",marginBottom:"6px",
                                borderRight:`3px solid ${skillGlowColor||skSC}88`,
                                boxShadow:skillGlowColor?`0 0 16px ${skillGlowColor}33, inset 0 0 12px ${skillGlowColor}18`:"none",
                                position:"relative",
                                transition:"all 0.3s",
                              }}>
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                  <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
                                    {sk.isBarrier&&!sk.isSakardBonus&&grpName!=="المهارات الأساسية"&&<span style={{fontSize:"8px",color:skSC,background:`${skSC}22`,borderRadius:"3px",padding:"1px 4px"}}>حاجز</span>}
                                    {sk.isSakardBonus&&<span style={{fontSize:"8px",color:"#a78bfa",background:"#a78bfa22",borderRadius:"3px",padding:"1px 4px"}}>سكارد</span>}
                                    {isNewSkill&&<span style={{fontSize:"8px",color:"#c4b5fd",background:"#7c3aed44",borderRadius:"3px",padding:"1px 5px",fontWeight:"700",boxShadow:"0 0 6px #7c3aed88"}}>✦ جديد</span>}
                                    {isChangedSkill&&<span style={{fontSize:"8px",color:skLC,background:`${skLC}22`,borderRadius:"3px",padding:"1px 5px",fontWeight:"700",boxShadow:`0 0 6px ${skLC}88`}}>⟳ متغير</span>}
                                    <Ei value={sk.name} onChange={v=>updSk(sk.id,"name",v)} color="#e5e7eb" fontSize="12px" fontWeight="600"/>
                                  </div>
                                  <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
                                    <span style={{fontSize:"15px",color:skLC}} title={sk.level}>{skSym}</span>
                                    <span style={{fontSize:"11px",color:skLC,fontWeight:"700"}}>{sk.bonus}</span>
                                    {/* خانة البونس الإضافي — لا تظهر عند غير متعلم (تُعرض في الـ picker) */}
                                    {!sk.isSakardBonus&&sk.level!=="غير متعلم"&&(
                                      <div style={{display:"flex",alignItems:"center",gap:"2px"}}>
                                        <span style={{fontSize:"10px",color:"#4b5563"}}>+</span>
                                        <input
                                          type="number"
                                          value={sk.extraBonus||0}
                                          onChange={e=>updSk(sk.id,"extraBonus",Number(e.target.value)||0)}
                                          title="بونس إضافي من مصادر خارجية"
                                          style={{width:"36px",background:"#161b27",border:"1px solid #f59e0b44",
                                            borderRadius:"4px",color:"#f59e0b",fontSize:"10px",
                                            padding:"1px 3px",fontFamily:"inherit",direction:"ltr",
                                            textAlign:"center",outline:"none"}}/>
                                      </div>
                                    )}
                                    {extraB!==0&&<span style={{fontSize:"10px",color:"#f59e0b",fontWeight:"700"}}>={baseBonusNum+extraB}</span>}
                                    {!sk.isSakardBonus&&<button onClick={()=>rmSk(sk.id)} style={{display:cleanView?"none":undefined,background:"transparent",border:"none",color:"#374151",cursor:"pointer",fontSize:"14px",padding:"0 0 0 2px",lineHeight:1}}>×</button>}
                                  </div>
                                </div>
                                <div style={{display:"flex",gap:"10px",marginTop:"4px",flexWrap:"wrap",alignItems:"center"}}>
                                  {sk.isBarrier&&!sk.isSakardBonus&&(
                                    <span style={{fontSize:"9px",color:"#4b5563"}}>
                                      ربط:{" "}
                                      <select value={sk.bindingStat||sk.stat} onChange={e=>changeBarrierBinding(sk.id,e.target.value)}
                                        style={{background:"#161b27",border:"1px solid #2d3748",borderRadius:"3px",color:STAT_COLOR[sk.bindingStat||sk.stat]||"#9ca3af",
                                          fontSize:"9px",padding:"1px 3px",fontFamily:"inherit",direction:"rtl"}}>
                                        {BINDING_STATS.map(s=><option key={s} value={s}>{s}</option>)}
                                      </select>
                                    </span>
                                  )}
                                  <span style={{fontSize:"9px"}}>
                                    {sk.isSakardBonus?(
                                      <span style={{color:skLC,fontWeight:"700"}}>{skSym} {sk.level}</span>
                                    ):(
                                      <SkillLevelPicker current={sk.level} onChange={v=>changeSklevel(sk.id,v)} statName={sk.stat}
                                        extraBonus={sk.extraBonus||0}
                                        onExtraBonusChange={sk.level==="غير متعلم"?v=>updSk(sk.id,"extraBonus",v):null}/>
                                    )}
                                  </span>
                                  <span style={{fontSize:"9px",color:"#f59e0b"}}>{SKILL_LEVEL_COST[sk.level]||1}ن</span>
                                  {SKILL_STAT_BONUS[sk.level]&&<span style={{fontSize:"9px",color:"#a78bfa"}}>✦+{SKILL_STAT_BONUS[sk.level]}</span>}
                                </div>
                                {/* التخصصات */}
                                {(()=>{
                                  const specs=sk.specializations||[];
                                  const availSpecs=SPECIALIZATIONS_BY_SKILL[sk.name]||[];
                                  const isSpecOpen=specOpen[sk.id]||false;
                                  return(
                                    <div style={{marginTop:"5px"}}>
                                      <div style={{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}}>
                                        {specs.map(sp=>{
                                          const spLC=skillColorByStat(sp.level,sk.stat||"القوة");
                                          const spSym=SKILL_LEVEL_SYMBOL[sp.level]||"◌";
                                          const spTotal=(parseInt(sp.bonus)||0)+(parseInt(sp.extraBonus)||0);
                                          return(
                                            <div key={sp.id} style={{display:"inline-flex",alignItems:"center",gap:"3px",
                                              background:`${skSC}10`,border:`1px solid ${skSC}33`,
                                              borderRadius:"5px",padding:"2px 6px",fontSize:"9px"}}>
                                              <span style={{color:"#6b7280"}}>⚙</span>
                                              <Ei value={sp.name} onChange={v=>updSpec(sk.id,sp.id,"name",v)} color={spLC} fontSize="9px" fontWeight="700"/>
                                              <span style={{color:spLC,fontWeight:"700"}}>{spSym}</span>
                                              <SkillLevelPicker current={sp.level} onChange={v=>changeSpecLevel(sk.id,sp.id,v)} statName={sk.stat}
                                                extraBonus={sp.extraBonus||0}
                                                onExtraBonusChange={sp.level==="غير متعلم"?v=>updSpec(sk.id,sp.id,"extraBonus",v):null}/>
                                              {sp.level!=="غير متعلم"&&(
                                                <input type="number" value={sp.extraBonus||0}
                                                  onChange={e=>updSpec(sk.id,sp.id,"extraBonus",Number(e.target.value)||0)}
                                                  style={{width:"28px",background:"#161b27",border:"1px solid #f59e0b33",borderRadius:"3px",
                                                    color:"#f59e0b",fontSize:"8px",padding:"1px 2px",direction:"ltr",textAlign:"center",outline:"none"}}/>
                                              )}
                                              {spTotal!==0&&<span style={{color:"#f59e0b",fontSize:"8px"}}>=+{spTotal}</span>}
                                              <button onClick={()=>rmSpec(sk.id,sp.id)} style={{display:cleanView?"none":undefined,background:"transparent",border:"none",color:"#374151",cursor:"pointer",fontSize:"11px",padding:"0",lineHeight:1}}>×</button>
                                            </div>
                                          );
                                        })}
                                        {/* زر إضافة تخصص */}
                                        {availSpecs.length>0&&(
                                          <div style={{position:"relative",display:"inline-block"}}>
                                            <button onClick={e=>{e.stopPropagation();setSpecOpen(prev=>({...prev,[sk.id]:!isSpecOpen}));}}
                                              style={{fontSize:"8px",color:"#6b7280",background:"transparent",
                                                border:"1px dashed #2d3748",borderRadius:"4px",padding:"1px 5px",cursor:"pointer",fontFamily:"inherit"}}>
                                              {isSpecOpen?"▲":"+ تخصص"}
                                            </button>
                                            {isSpecOpen&&(
                                              <div onClick={e=>e.stopPropagation()}
                                                style={{position:"absolute",bottom:"calc(100% + 3px)",right:0,
                                                  background:"#0c0f18",border:`1px solid ${skSC}44`,borderRadius:"7px",
                                                  zIndex:250,padding:"4px",minWidth:"130px",boxShadow:"0 4px 20px #000c",animation:"fi 0.15s ease"}}>
                                                {availSpecs.filter(sp=>!specs.some(s=>s.name===sp)).map(spName=>(
                                                  <div key={spName} onClick={()=>{addSpec(sk.id,spName);setSpecOpen(prev=>({...prev,[sk.id]:false}));}}
                                                    style={{padding:"4px 8px",fontSize:"9px",color:skSC,cursor:"pointer",
                                                      borderRadius:"4px",fontWeight:"600"}}>
                                                    ⚙ {spName}
                                                  </div>
                                                ))}
                                                <div onClick={()=>{addSpec(sk.id,"");setSpecOpen(prev=>({...prev,[sk.id]:false}));}}
                                                  style={{borderTop:`1px solid ${skSC}22`,padding:"4px 8px",fontSize:"8px",
                                                    color:"#6b7280",cursor:"pointer",fontStyle:"italic"}}>
                                                  + مخصص
                                                </div>
                                              </div>
                                            )}
                                          </div>
                                        )}
                                        {availSpecs.length===0&&(
                                          <button onClick={()=>addSpec(sk.id,"")}
                                            style={{fontSize:"8px",color:"#6b7280",background:"transparent",
                                              border:"1px dashed #2d3748",borderRadius:"4px",padding:"1px 5px",cursor:"pointer",fontFamily:"inherit"}}>
                                            + تخصص
                                          </button>
                                        )}
                                      </div>
                                    </div>
                                  );
                                })()}
                              </div>
                            );
                          })}
                        </div>
                      );
                    });
                  })()}
                </Sec>

                {/* الشهرة والسمعة */}
                <Sec title="الشهرة والسمعة" accent="#f59e0b">
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                    <Cell label="الشهرة">
                      <span style={{color:"#f59e0b"}}>
                        <Ei value={cn.fameValue} onChange={v=>upd("fameValue",Number(v)||0)} color="#f59e0b" fontSize="14px" fontWeight="600" type="number"/>/10
                      </span>
                      <div style={{fontSize:"10px",color:"#6b7280",marginTop:"1px"}}><Ei value={cn.fameLevel} onChange={v=>upd("fameLevel",v)} color="#6b7280" fontSize="10px"/></div>
                    </Cell>
                    <Cell label="السمعة">
                      <Ei value={cn.rep} onChange={v=>upd("rep",Number(v)||0)} color={cn.rep>0?"#22c55e":cn.rep<0?"#ef4444":"#9ca3af"} fontSize="14px" fontWeight="600" type="number"/>
                      <div style={{fontSize:"10px",color:"#6b7280",marginTop:"1px"}}>{cn.rep>5?"محبوب":cn.rep<-5?"مكروه":"محايد"}</div>
                    </Cell>
                  </div>
                </Sec>

                {/* القدرات والخصائص الخاصة — 4 جداول */}
                <Sec title="القدرات والخصائص الخاصة" accent="#ec4899">
                  {ABILITY_TABLE_META.map(({key,title,accent})=>(
                    <AbilityTable key={key}
                      title={title}
                      accent={accent}
                      items={(cn.abilityTables||{})[key]||[]}
                      onAdd={()=>addAbility(key)}
                      onUpdate={(id,f,v)=>updAbility(key,id,f,v)}
                      onRemove={(id)=>rmAbility(key,id)}
                      isOpen={abilityOpen[key]||false}
                      onToggle={()=>setAbilityOpen(p=>({...p,[key]:!p[key]}))}
                    />
                  ))}
                  {/* حقول مخصصة إضافية */}
                  {(cn.customFields||[]).length>0&&(
                    <div style={{marginTop:"10px"}}>
                      {(cn.customFields||[]).map(cf=>(
                        <div key={cf.id} style={{background:"#0a0c14",border:"1px solid #1a2030",borderRadius:"10px",padding:"12px 13px",marginBottom:"9px",borderRight:"3px solid #ec489944"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                            <Ei value={cf.title} onChange={v=>updCf(cf.id,"title",v)} color="#ec4899" fontSize="12px" fontWeight="700"/>
                            <button onClick={()=>rmCf(cf.id)} style={{display:cleanView?"none":undefined,background:"transparent",border:"none",color:"#374151",cursor:"pointer",fontSize:"15px",padding:"0 0 0 4px",lineHeight:1}}>×</button>
                          </div>
                          <Et value={cf.content} onChange={v=>updCf(cf.id,"content",v)} placeholder="اكتب الشرح أو التأثير هنا..."/>
                        </div>
                      ))}
                    </div>
                  )}
                  <button onClick={addCf}
                    style={{width:"100%",marginTop:"6px",padding:"6px",background:"transparent",
                      border:"1px dashed #ec489944",borderRadius:"8px",color:"#6b7280",fontSize:"10px",
                      cursor:"pointer",fontFamily:"inherit"}}>
                    + إضافة خانة مخصصة
                  </button>
                </Sec>

                {/* الأسلحة والمعدات — مشترك بين الوضعين */}
                <Sec title="الأسلحة والمعدات" accent="#eab308"
                  onAdd={()=>setNpc(p=>({...p,weapons:[...(p.weapons||[]),{id:Date.now()+Math.random(),name:"سلاح جديد",qualityRoll:50,qualityLabel:"عادي",qualityColor:"#d1d5db",damage:"",notes:""}]}))}
                  addLabel="إضافة">
                  {/* منتقي سريع من القائمة */}
                  <div style={{marginBottom:"8px"}}>
                    <select value="" onChange={e=>{
                      if(!e.target.value) return;
                      const qr=d(100); const q=ITEM_QUALITY(qr);
                      setNpc(p=>({...p,weapons:[...(p.weapons||[]),{id:Date.now()+Math.random(),name:e.target.value,qualityRoll:qr,qualityLabel:q.label,qualityColor:q.color,damage:"",notes:""}]}));
                    }}
                      style={{width:"100%",background:"#0a0c14",border:"1px solid #eab30833",borderRadius:"6px",
                        color:"#eab308",fontSize:"10px",padding:"5px 8px",fontFamily:"inherit",direction:"rtl",cursor:"pointer"}}>
                      <option value="">+ اختر من قائمة الأيتمات...</option>
                      {ITEMS_POOL.map(it=><option key={it} value={it}>{it}</option>)}
                    </select>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                    {(cn.weapons||[]).length===0&&(
                      <div style={{fontSize:"11px",color:"#374151",textAlign:"center",padding:"8px 0"}}>لا توجد أيتمات — أضف من القائمة أو اضغط +</div>
                    )}
                    {(cn.weapons||[]).map((w)=>(
                      <div key={w.id} style={{background:"#0a0c14",border:`1px solid ${w.qualityColor||"#eab308"}33`,borderRadius:"10px",
                        padding:"10px 12px",borderRight:`3px solid ${w.qualityColor||"#eab308"}66`}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}}>
                          <div style={{display:"flex",alignItems:"center",gap:"6px",flex:1}}>
                            <Ei value={w.name} onChange={v=>setNpc(p=>({...p,weapons:(p.weapons||[]).map(x=>x.id===w.id?{...x,name:v}:x)}))}
                              color={w.qualityColor||"#eab308"} fontSize="12px" fontWeight="700"/>
                            <select value={w.qualityLabel||"عادي"}
                              onChange={e=>{
                                const qMap={"هالك":{r:5,c:"#6b7280"},"رديء":{r:18,c:"#9ca3af"},"عادي":{r:38,c:"#d1d5db"},"جيد":{r:60,c:"#22c55e"},"ممتاز":{r:78,c:"#3b82f6"},"نادر":{r:90,c:"#a855f7"},"أسطوري":{r:97,c:"#f59e0b"},"إلهي":{r:100,c:"#fff"}};
                                const q=qMap[e.target.value]||{r:38,c:"#d1d5db"};
                                setNpc(p=>({...p,weapons:(p.weapons||[]).map(x=>x.id===w.id?{...x,qualityLabel:e.target.value,qualityColor:q.c,qualityRoll:q.r}:x)}));
                              }}
                              style={{fontSize:"9px",fontWeight:"700",color:w.qualityColor||"#eab308",
                                background:`${w.qualityColor||"#eab308"}18`,borderRadius:"4px",padding:"1px 5px",
                                border:`1px solid ${w.qualityColor||"#eab308"}44`,cursor:"pointer",
                                fontFamily:"inherit",outline:"none"}}>
                              {["هالك","رديء","عادي","جيد","ممتاز","نادر","أسطوري","إلهي"].map(q=>(
                                <option key={q} value={q} style={{background:"#0a0c14",color:"#e5e7eb"}}>{q}</option>
                              ))}
                            </select>
                          </div>
                          <button onClick={()=>setNpc(p=>({...p,weapons:(p.weapons||[]).filter(x=>x.id!==w.id)}))}
                            style={{display:cleanView?"none":undefined,background:"transparent",border:"none",color:"#374151",cursor:"pointer",fontSize:"15px",padding:"0 0 0 6px",lineHeight:1}}>×</button>
                        </div>
                        <div style={{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap",marginBottom:"4px"}}>
                          <span style={{fontSize:"9px",color:"#6b7280"}}>الضرر/التأثير:</span>
                          <Ei value={w.damage||"—"} onChange={v=>setNpc(p=>({...p,weapons:(p.weapons||[]).map(x=>x.id===w.id?{...x,damage:v}:x)}))}
                            color="#f97316" fontSize="11px" fontWeight="700"/>
                        </div>
                        <Et value={w.notes||""} onChange={v=>setNpc(p=>({...p,weapons:(p.weapons||[]).map(x=>x.id===w.id?{...x,notes:v}:x)}))}
                          placeholder="وصف السلاح أو خصائصه..."/>
                      </div>
                    ))}
                  </div>
                </Sec>

              </div>
            )}
            {/* ════ END BASIC MODE ════ */}

          </div>
        </div>
      )}

      {/* Save / Load Bar */}
      {npc&&!rolling&&(
        <div style={{display:"flex",gap:"8px",marginTop:"16px",marginBottom:"10px",flexWrap:"wrap",justifyContent:"center"}}>
          <button onClick={saveNpc}
            style={{padding:"7px 16px",background:"#052e16",border:"1px solid #16a34a",borderRadius:"8px",
              color:"#4ade80",fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"}}>
            💾 حفظ
          </button>
          <button onClick={copyLink}
            style={{padding:"7px 16px",background:"#0c1428",border:"1px solid #3b82f6",borderRadius:"8px",
              color:"#60a5fa",fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"}}>
            🔗 {showCodeExport?"إخفاء الكود":"نسخ كود"}
          </button>
          <button onClick={()=>setShowLoad(p=>!p)}
            style={{padding:"7px 16px",background:"#0c0f18",border:"1px solid #1a2030",borderRadius:"8px",
              color:"#9ca3af",fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"}}>
            📥 تحميل
          </button>
          <button onClick={()=>setShowSaved(p=>!p)}
            style={{padding:"7px 16px",background:"#0c0f18",border:"1px solid #1a2030",borderRadius:"8px",
              color:"#9ca3af",fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"}}>
            📂 ({savedProfiles.length})
          </button>
        </div>
      )}
      {saveMsg&&<div style={{fontSize:"12px",color:"#4ade80",marginBottom:"8px",fontWeight:"700"}}>{saveMsg}</div>}

      {/* Export Code Panel handled above the NPC card */}

      {/* Load Panel */}
      {showLoad&&(
        <div style={{width:"100%",maxWidth:"560px",background:"#0c0f18",border:"1px solid #3b82f633",
          borderRadius:"12px",padding:"14px",marginBottom:"12px",animation:"fi 0.2s ease"}}>
          <div style={{fontSize:"10px",color:"#6b7280",marginBottom:"8px",letterSpacing:"0.1em",textTransform:"uppercase"}}>
            الصق كود الشخصية أو مجموعة الشخصيات هنا
          </div>
          <textarea value={loadInput} onChange={e=>setLoadInput(e.target.value)}
            placeholder="NPC:eyJ...  أو  NPCS:eyJ..."
            style={{width:"100%",background:"#080b10",border:"1px solid #1a2030",borderRadius:"8px",
              color:"#9ca3af",fontSize:"11px",padding:"8px",resize:"vertical",minHeight:"60px",
              fontFamily:"monospace",direction:"ltr",outline:"none",boxSizing:"border-box"}}/>
          <div style={{display:"flex",gap:"8px",marginTop:"8px"}}>
            <button onClick={loadFromCode}
              style={{padding:"6px 20px",background:"#0c1428",border:"1px solid #3b82f6",borderRadius:"8px",
                color:"#60a5fa",fontSize:"12px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"}}>
              تحميل
            </button>
            <button onClick={()=>{setShowLoad(false);setLoadInput("");}}
              style={{padding:"6px 14px",background:"transparent",border:"1px solid #1a2030",borderRadius:"8px",
                color:"#6b7280",fontSize:"12px",cursor:"pointer",fontFamily:"inherit"}}>
              إلغاء
            </button>
          </div>
        </div>
      )}

      {/* Saved Profiles Panel */}
      {showSaved&&(
        <div style={{width:"100%",maxWidth:"560px",background:"#0c0f18",border:"1px solid #1a2030",
          borderRadius:"16px",padding:"16px",marginBottom:"16px",animation:"fi 0.2s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
            <span style={{fontSize:"11px",color:"#6b7280",letterSpacing:"0.1em",textTransform:"uppercase"}}>
              الشخصيات المحفوظة ({savedProfiles.length})
            </span>
            <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
              {savedProfiles.length>0&&(
                <button onClick={copyAllProfiles}
                  style={{padding:"4px 12px",background:"#0c1428",border:"1px solid #3b82f644",borderRadius:"6px",
                    color:"#60a5fa",fontSize:"10px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"}}>
                  🔗 نسخ الكل ({savedProfiles.length})
                </button>
              )}
              <button onClick={()=>setShowSaved(false)}
                style={{background:"transparent",border:"none",color:"#4b5563",cursor:"pointer",fontSize:"16px"}}>×</button>
            </div>
          </div>
          {savedProfiles.length===0&&(
            <div style={{fontSize:"12px",color:"#374151",textAlign:"center",padding:"12px 0"}}>لا توجد شخصيات محفوظة بعد</div>
          )}
          {savedProfiles.map(p=>{
            const prc=RC[p.race]||"#7c3aed";
            const copyOne=(e)=>{
              e.stopPropagation();
              const code="NPC:"+npcToCode(p);
              const fallback=()=>{
                const ta=document.createElement("textarea");
                ta.value=code; ta.style.position="fixed"; ta.style.opacity="0";
                document.body.appendChild(ta); ta.select();
                try{ document.execCommand("copy"); setSaveMsg("تم النسخ ✓"); } catch(err){ setSaveMsg("فشل النسخ"); }
                document.body.removeChild(ta);
                setTimeout(()=>setSaveMsg(""),1500);
              };
              if(navigator.clipboard&&navigator.clipboard.writeText){
                navigator.clipboard.writeText(code).then(()=>{setSaveMsg("تم النسخ ✓");setTimeout(()=>setSaveMsg(""),1500);}).catch(fallback);
              } else { fallback(); }
            };
            return(
              <div key={p.saveId} onClick={()=>loadNpc(p)}
                style={{background:"#080b10",border:`1px solid ${prc}33`,borderRadius:"10px",
                  padding:"10px 14px",marginBottom:"8px",cursor:"pointer",
                  transition:"border-color 0.2s",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:"13px",fontWeight:"700",color:prc}}>{p.name||"بدون اسم"}</div>
                  <div style={{fontSize:"10px",color:"#6b7280",marginTop:"2px"}}>
                    {p.race} • Lv.{p.level} • {p.background}
                    {p.continent&&<span style={{color:"#60a5fa",marginRight:"4px"}}> • {p.continent}</span>}
                  </div>
                  <div style={{fontSize:"9px",color:"#374151",marginTop:"1px"}}>{p.savedAt}</div>
                </div>
                <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                  <button onClick={copyOne}
                    title="نسخ كود هذه الشخصية"
                    style={{background:"#0c1428",border:"1px solid #3b82f633",borderRadius:"6px",
                      color:"#60a5fa",fontSize:"10px",cursor:"pointer",padding:"3px 7px",fontFamily:"inherit"}}>
                    🔗
                  </button>
                  <button onClick={(e)=>{e.stopPropagation();updateProfile(p.saveId);}}
                    title="تحديث بالشخصية الحالية"
                    style={{background:"#1c1400",border:"1px solid #ca8a0433",borderRadius:"6px",
                      color:"#fbbf24",fontSize:"10px",cursor:"pointer",padding:"3px 7px",fontFamily:"inherit"}}>
                    🔄
                  </button>
                  <button onClick={(e)=>deleteProfile(p.saveId,e)}
                    style={{background:"transparent",border:"1px solid #ef444433",borderRadius:"6px",
                      color:"#ef4444",fontSize:"12px",cursor:"pointer",padding:"2px 7px"}}>
                    ×
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {!npc&&!rolling&&<div style={{color:"#2d3748",fontSize:"13px",marginTop:"8px"}}>اضغط لرمي شخصية عشوائية من عالم أمازاد</div>}
      <div style={{marginTop:"24px",fontSize:"10px",color:"#1a2030"}}>Amazad TTRPG — v19 | صور + تحولات ملونة + إرسال مباشر</div>
    </div>
  );
}


    // ══════════════════════════════════════════════
    // نظام الحفظ المحلي (localStorage)
    // ══════════════════════════════════════════════
    const STORAGE_KEY = "amazad_v1";

    const loadFromStorage = () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return null;
        return JSON.parse(raw);
      } catch(e) { return null; }
    };

    const saveToStorage = (data) => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch(e) {
        console.warn("localStorage full or unavailable:", e);
      }
    };

    // ── التطبيق الرئيسي مع الحفظ التلقائي ──
    const AppWithStorage = () => {
      return <NPCGenerator />;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppWithStorage />);

    // إخفاء شاشة التحميل
    document.getElementById('loading').classList.add('hidden');
    setTimeout(() => {
      const el = document.getElementById('loading');
      if(el) el.remove();
    }, 600);
  </script>

  <!-- PWA Service Worker (اختياري - للعمل بدون إنترنت) -->
  <script>
    if('serviceWorker' in navigator){
      // سيتم إضافة service worker لاحقاً
    }
  </script>

</body>
</html>
