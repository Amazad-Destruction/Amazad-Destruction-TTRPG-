function draw() {
  const W=AW, H=AH;
  ctx.clearRect(0,0,W,H);
  // Background
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  bg.addColorStop(0,'#16102a'); bg.addColorStop(0.5,'#0d0a1e'); bg.addColorStop(1,'#070511');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  // Grid
  ctx.save(); ctx.globalAlpha=0.045; ctx.strokeStyle='#e879a0'; ctx.lineWidth=0.5;
  const gs=50;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();
  // Border
  ctx.save(); ctx.strokeStyle='#e879a0'; ctx.lineWidth=2.5; ctx.shadowColor='#e879a0'; ctx.shadowBlur=20; ctx.globalAlpha=0.3;
  ctx.strokeRect(4,4,W-8,H-8); ctx.restore();

  drawLightTrails();
  drawShockwaves();
  drawPortals();
  drawProjs();
  drawRoyalHorses();
  drawParticles();
  drawKnockbackGhosts();
  drawBalls();
  drawWeaponSwings();
  drawFloats();

  // Crit flash — red vignette pulse on the edges
  if(critFlash>0){
    ctx.save();
    const cf=critFlash;
    // Red vignette ring at edges
    const vgn=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.8);
    vgn.addColorStop(0,'transparent');
    vgn.addColorStop(0.6,'transparent');
    vgn.addColorStop(1,`rgba(200,0,20,${cf*0.75})`);
    ctx.fillStyle=vgn;
    ctx.fillRect(0,0,W,H);
    // Center white flash fading quickly
    ctx.globalAlpha=cf*0.22;
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // Hit-stop flash overlay
  if(hitStopFlash>0){
    ctx.save();
    ctx.globalAlpha=hitStopFlash*0.14;
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
}

function drawShockwaves() {
  for(const s of shockwaves){
    const frac=s.life/s.maxLife;
    ctx.save(); ctx.globalAlpha=frac*0.7; ctx.strokeStyle=s.color; ctx.lineWidth=3*frac+1;
    ctx.shadowColor=s.color; ctx.shadowBlur=15*frac;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.stroke(); ctx.restore();
  }
}
function drawLightTrails() {
  for(const t of lightTrails){
    const frac=t.life/t.maxLife;
    ctx.save(); ctx.globalAlpha=frac*0.55; ctx.fillStyle=t.color; ctx.shadowColor=t.color; ctx.shadowBlur=10*frac;
    ctx.beginPath(); ctx.arc(t.x,t.y,Math.max(0.5,t.sz*frac),0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}

function drawKnockbackGhosts() {
  for(const g of knockbackGhosts){
    const frac=g.life/g.maxLife;
    // Multi-layer foggy afterimage: outer fog ring + inner ghost body
    ctx.save();
    // Outer fog halo — blurry and wide
    ctx.globalAlpha=frac*0.18;
    ctx.shadowColor=g.color;
    ctx.shadowBlur=g.r*1.8*frac;
    const outerG=ctx.createRadialGradient(g.x,g.y,g.r*0.3,g.x,g.y,g.r*2.0);
    outerG.addColorStop(0,g.color+'cc');
    outerG.addColorStop(0.5,g.color+'55');
    outerG.addColorStop(1,'transparent');
    ctx.fillStyle=outerG;
    ctx.beginPath(); ctx.arc(g.x,g.y,g.r*2.0,0,Math.PI*2); ctx.fill();
    // Inner ghost body — semi-transparent ball silhouette
    ctx.globalAlpha=frac*0.30;
    ctx.shadowBlur=g.r*0.6*frac;
    const innerG=ctx.createRadialGradient(g.x-g.r*0.2,g.y-g.r*0.2,0,g.x,g.y,g.r);
    innerG.addColorStop(0,g.color+'ff');
    innerG.addColorStop(0.6,g.color+'88');
    innerG.addColorStop(1,g.color+'00');
    ctx.fillStyle=innerG;
    ctx.beginPath(); ctx.arc(g.x,g.y,g.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawWeaponSwings() {
  for(const w of weaponSwings) {
    const frac=w.life/w.maxLife;
    const progress=1-frac;
    // Draw arc sweep from attacker toward target
    const arcStart=w.angle-0.7;
    const arcEnd=w.angle+0.7;
    const arcR=40+progress*30;
    ctx.save();
    ctx.globalAlpha=frac*0.85;
    ctx.strokeStyle=w.color;
    ctx.lineWidth=4*(1-progress)+1;
    ctx.shadowColor=w.color;
    ctx.shadowBlur=20*frac;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.arc(w.x,w.y,arcR,arcStart,arcEnd);
    ctx.stroke();
    // Weapon image/emoji at end of arc
    ctx.globalAlpha=frac;
    const ex=w.x+Math.cos(w.angle)*arcR;
    const ey=w.y+Math.sin(w.angle)*arcR;
    if(w.useBookImg && IMG_BOOK.complete && IMG_BOOK.naturalWidth>0){
      const ws=Math.round(20+progress*10);
      ctx.drawImage(IMG_BOOK,ex-ws/2,ey-ws/2,ws,ws);
    } else {
      ctx.font=`${Math.round(18+progress*8)}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(w.emoji,ex,ey);
    }
    ctx.restore();
  }
}

function drawBalls() {
  for(const ball of GS.balls){
    if(!ball.alive) continue;
    // If rider is on horse, skip drawing ball (drawn inside drawRoyalHorses)
    if(ball.onHorse) continue;
    const r=ball.radius*(ball.scale||1);

    // Determine bounding box for this ball + hat/book accessories
    // Hat extends ~r*2.2 above center, book extends ~r*2 to the side
    const pad   = r * 2.5;
    const bx    = Math.floor(ball.x - r - pad);
    const by    = Math.floor(ball.y - r - pad * 1.4); // more room above for hat
    const bw    = Math.ceil((r + pad) * 2);
    const bh    = Math.ceil((r + pad) * 2 + r * 1.4);
    const hasTint = (ball.hitTint||0) > 0;

    // Draw outer glow directly on main canvas (not tinted)
    const glowAmt=18+Math.sin(ball.pulse)*5;
    {
    ctx.save();
    const outerGlow=ctx.createRadialGradient(ball.x,ball.y,r*0.5,ball.x,ball.y,r*2.2);
    outerGlow.addColorStop(0,ball.color+'55'); outerGlow.addColorStop(0.5,ball.color+'22'); outerGlow.addColorStop(1,'transparent');
    ctx.fillStyle=outerGlow; ctx.beginPath(); ctx.arc(ball.x,ball.y,r*2.2,0,Math.PI*2); ctx.fill();
    ctx.restore();
    }

    // Choose target context: offscreen if tint active, else main canvas
    let dc, ox=0, oy=0;
    if (hasTint) {
      const _ox = getOffCanvas(bw, bh);
      _ox.clearRect(0, 0, _offCanvas.width, _offCanvas.height);
      dc = _ox; ox = bx; oy = by;
    } else {
      dc = ctx; ox = 0; oy = 0;
    }

    // Helper: translate coords for offscreen (offset by -bx,-by)
    const tx = (x) => hasTint ? x - bx : x;
    const ty = (y) => hasTint ? y - by : y;

    dc.save();
    if (hasTint) { dc.translate(-bx, -by); }  // offset so original coords work
    // Shadow
    dc.shadowColor=ball.color; dc.shadowBlur=glowAmt;
    // Body
    const bodyG=dc.createRadialGradient(ball.x-r*0.3,ball.y-r*0.3,r*0.05,ball.x,ball.y,r);
    bodyG.addColorStop(0,lighten(ball.color,70)); bodyG.addColorStop(0.35,lighten(ball.color,25));
    bodyG.addColorStop(0.72,ball.color); bodyG.addColorStop(1,darken(ball.color,40));
    dc.fillStyle=bodyG; dc.beginPath(); dc.arc(ball.x,ball.y,r,0,Math.PI*2); dc.fill();
    // Dash trail
    if(ball.isDashing){
      dc.globalAlpha=0.4;
      dc.fillStyle=ball.color;
      dc.beginPath(); dc.arc(ball.x-ball.dashVx*0.03,ball.y-ball.dashVy*0.03,r*0.8,0,Math.PI*2); dc.fill();
      dc.globalAlpha=0.2;
      dc.beginPath(); dc.arc(ball.x-ball.dashVx*0.06,ball.y-ball.dashVy*0.06,r*0.55,0,Math.PI*2); dc.fill();
      dc.globalAlpha=1;
    }
    // Hit flash (instant white pop)
    if(ball.hitFlash>0){
      const flashA=(ball.hitFlash/0.25)*0.55;
      dc.fillStyle=`rgba(255,255,255,${flashA})`; dc.beginPath(); dc.arc(ball.x,ball.y,r,0,Math.PI*2); dc.fill();
      dc.strokeStyle=`rgba(255,255,255,${flashA*0.8})`; dc.lineWidth=4; dc.shadowColor='#ffffff'; dc.shadowBlur=16;
      dc.beginPath(); dc.arc(ball.x,ball.y,r+2,0,Math.PI*2); dc.stroke();
    }
    dc.shadowBlur=0;
    // Border — soft colored rim matching ball
    dc.strokeStyle=lighten(ball.color,30)+'88'; dc.lineWidth=1.5;
    dc.beginPath(); dc.arc(ball.x,ball.y,r,0,Math.PI*2); dc.stroke();
    // Damage immunity ring (pulsing gold shield)
    if((ball.dmgImmunity||0)>0){
      const immFrac=ball.dmgImmunity/0.5;
      dc.save();
      dc.globalAlpha=immFrac*0.75;
      dc.strokeStyle='#f5c842';
      dc.lineWidth=3;
      dc.shadowColor='#f5c842';
      dc.shadowBlur=14*immFrac;
      dc.setLineDash([6,4]);
      dc.lineDashOffset=ball.pulse*8;
      dc.beginPath(); dc.arc(ball.x,ball.y,r+7,0,Math.PI*2); dc.stroke();
      dc.setLineDash([]);
      dc.restore();
    }

    // Draw weapon and hat
    const target=getNearestEnemy(ball);
    // During knockback, freeze weapon at last known angle (don't track enemy)
    if(target && ball.knockbackCount<=0){
      ball._lastWeapAngle = Math.atan2(target.y-ball.y, target.x-ball.x);
    }
    const effectiveTarget = (ball.knockbackCount > 0) ? null : target;
    // Frozen weapon angle used when knockback active
    const frozenWeapAngle = ball._lastWeapAngle || 0;
    if(effectiveTarget){
      const weapAngle=Math.atan2(effectiveTarget.y-ball.y,effectiveTarget.x-ball.x);

      // ── WEAPON: orbits around the ball ──
      // tilt: as enemy approaches, weapon slides to the side (charge pose)
      // swingTilt goes from 0 (far) to ~PI*0.55 (very close)
      const tilt = ball.swingTilt||0;

      let orbitOffset; // angle offset from weapAngle for the weapon position on the ball
      if(ball.isSwinging){
        // Swing arc: weapon sweeps from +tiltBack to -tiltForward smoothly
        const swingFrac=Math.max(0,ball.swingTimer/0.30); // 1→0 over swing
        // Start pulled back (+side), sweep through center, end past forward (-side)
        orbitOffset = (swingFrac*2 - 1) * (Math.PI * 0.65);
      } else {
        // Charge pose: weapon slides to the side perpendicular to enemy direction
        // At tilt=0 → centered in front; at max tilt → offset 90° to side
        orbitOffset = tilt * 0.9; // slides toward +90° (right-of-facing side)
      }

      // Position weapon on the ball surface + a bit out
      const weapDist = r + 16;
      const weapOrbitAngle = weapAngle + orbitOffset;
      const wx = ball.x + Math.cos(weapOrbitAngle) * weapDist;
      const wy = ball.y + Math.sin(weapOrbitAngle) * weapDist;

      // Weapon image rotates to point toward enemy + follows the orbit
      const weapSelfRotate = weapAngle + orbitOffset * 0.6 + (ball.isSwinging ? Math.PI*0.15 : Math.PI*0.25);

      dc.save();
      dc.translate(wx, wy);
      dc.rotate(weapSelfRotate);
      const weapAlpha = ball.weaponCd>0 ? (0.45+0.45*(1-(ball.weaponCd/getWeaponCd(ball)))) : 1.0;
      dc.globalAlpha = weapAlpha;
      if(ball.id==='wonder1' && IMG_BOOK.complete && IMG_BOOK.naturalWidth>0){
        const ws = r*1.35;
        dc.drawImage(IMG_BOOK,-ws/2,-ws/2,ws,ws);
      } else if(ball.id==='royal_knight' && IMG_SWORD.complete && IMG_SWORD.naturalWidth>0){
        // Sword/spear: drawn pointing straight toward enemy axis (rotate to align tip with weapAngle)
        // weapSelfRotate already contains weapAngle; undo the extra orbit offset and point straight
        dc.restore();
        dc.save();
        dc.translate(wx, wy);
        // Point the spear tip directly toward the enemy: weapAngle + 90° because image top = tip
        dc.rotate(weapAngle + Math.PI * 0.5);
        dc.globalAlpha = weapAlpha;
        const ws = r*2.2;
        const wh = r*2.2;
        dc.drawImage(IMG_SWORD,-ws/2,-wh*0.85,ws,wh);
      } else {
        dc.font=`${Math.round(r*0.75)}px serif`;
        dc.textAlign='center'; dc.textBaseline='middle';
        dc.fillText(ball.weapon.emoji,0,0);
      }
      dc.restore();

      // ── HAT: always on top of ball, leans gently with facing direction ──
      if(ball.id==='wonder1' && IMG_HAT.complete && IMG_HAT.naturalWidth>0){
        dc.save();
        dc.translate(ball.x, ball.y - r*1.05);
        const leanAngle = Math.sin(weapAngle) * 0.18;
        dc.rotate(leanAngle);
        const hs = r * 4.4;
        dc.globalAlpha = 0.97;
        dc.drawImage(IMG_HAT, -hs/2, -hs/2, hs, hs);
        dc.restore();
      }
      // ── ROYAL KNIGHT: draw spear crest on top ──
      if(ball.id==='royal_knight' && IMG_SPEAR.complete && IMG_SPEAR.naturalWidth>0){
        dc.save();
        dc.translate(ball.x, ball.y - r*1.85);
        const leanAngle = Math.sin(weapAngle) * 0.15;
        dc.rotate(leanAngle);
        const hs = r * 3.8;
        dc.globalAlpha = 0.97;
        dc.drawImage(IMG_SPEAR, -hs/2, -hs/2, hs, hs);
        dc.restore();
      }

      // Weapon CD arc
      if(ball.weaponCd>0){
        const wcdTotal=getWeaponCd(ball);
        const cdFrac=ball.weaponCd/wcdTotal;
        dc.save();
        dc.globalAlpha=0.55;
        dc.strokeStyle='rgba(255,200,60,0.6)';
        dc.lineWidth=2.5;
        dc.beginPath();
        dc.arc(ball.x,ball.y,r+5,-Math.PI/2,-Math.PI/2+2*Math.PI*(1-cdFrac));
        dc.stroke();
        dc.restore();
      }
    } else {
      // No target or knockback active — hat on top, book to side, spear frozen
      if(ball.id==='wonder1' && IMG_HAT.complete && IMG_HAT.naturalWidth>0){
        const r2=ball.radius*(ball.scale||1);
        dc.save();
        dc.translate(ball.x, ball.y-r2*1.05);
        const hs=r2*4.4;
        dc.globalAlpha=0.97;
        dc.drawImage(IMG_HAT,-hs/2,-hs/2,hs,hs);
        dc.restore();
      }
      if(ball.id==='wonder1' && IMG_BOOK.complete && IMG_BOOK.naturalWidth>0){
        const r2=ball.radius*(ball.scale||1);
        dc.save();
        dc.translate(ball.x+r2+10, ball.y);
        dc.rotate(0.4);
        const ws=r2*1.35;
        dc.globalAlpha=0.9;
        dc.drawImage(IMG_BOOK,-ws/2,-ws/2,ws,ws);
        dc.restore();
      }
      // Royal knight: draw spear frozen at last known angle during knockback
      if(ball.id==='royal_knight'){
        const weapDist = r + 16;
        const wx2 = ball.x + Math.cos(frozenWeapAngle) * weapDist;
        const wy2 = ball.y + Math.sin(frozenWeapAngle) * weapDist;
        const weapAlpha2 = ball.weaponCd>0 ? (0.45+0.45*(1-(ball.weaponCd/getWeaponCd(ball)))) : 1.0;
        if(IMG_SWORD.complete && IMG_SWORD.naturalWidth>0){
          dc.save();
          dc.translate(wx2, wy2);
          dc.rotate(frozenWeapAngle + Math.PI * 0.5);
          dc.globalAlpha = weapAlpha2 * (ball.knockbackCount>0 ? 0.6 : 1.0);
          const ws2 = r*2.2;
          dc.drawImage(IMG_SWORD,-ws2/2,-ws2*0.85,ws2,ws2);
          dc.restore();
        }
        if(IMG_SPEAR.complete && IMG_SPEAR.naturalWidth>0){
          dc.save();
          dc.translate(ball.x, ball.y - r*1.85);
          const leanAngle2 = Math.sin(frozenWeapAngle) * 0.15;
          dc.rotate(leanAngle2);
          const hs2 = r * 3.8;
          dc.globalAlpha = 0.97 * (ball.knockbackCount>0 ? 0.6 : 1.0);
          dc.drawImage(IMG_SPEAR, -hs2/2, -hs2/2, hs2, hs2);
          dc.restore();
        }
      }
    }

    // HP text — English numerals, soft glow in ball's own color
    dc.textAlign='center'; dc.textBaseline='middle';
    dc.font=`bold ${Math.round(r*0.65)}px Orbitron, monospace`;
    dc.shadowColor=darken(ball.color, 20); dc.shadowBlur=10;
    dc.fillStyle='rgba(255,255,255,0.96)';
    dc.fillText(Math.ceil(ball.hp).toString(), ball.x, ball.y-r*0.10);
    dc.shadowBlur=0;
    // Mana — smaller, blue-tinted
    dc.font=`bold ${Math.round(r*0.30)}px Orbitron, monospace`;
    dc.shadowColor=lighten(ball.color,20)+'bb'; dc.shadowBlur=5;
    dc.fillStyle='rgba(200,225,255,0.85)';
    dc.fillText(Math.floor(ball.mana).toString(), ball.x, ball.y+r*0.54);
    dc.shadowBlur=0;

    // Knockback counter display
    if(ball.knockbackCount>0){
      dc.save();
      dc.fillStyle='#60aaff'; dc.font=`bold ${Math.round(r*0.45)}px Orbitron,monospace`;
      dc.shadowColor='rgba(96,170,255,0.7)'; dc.shadowBlur=10;
      dc.textAlign='center'; dc.textBaseline='middle';
      dc.fillText(`x${ball.knockbackCount}`,ball.x,ball.y-r-14);
      dc.restore();
    }

    // ── Red tint: source-atop paints only on drawn pixels (ball shape, hat, book)
    if (hasTint) {
      const tintA = (ball.hitTint||0) * 0.55;
      dc.globalCompositeOperation = 'source-atop';
      dc.fillStyle = `rgba(220,30,30,${tintA})`;
      dc.fillRect(0, 0, _offCanvas.width, _offCanvas.height);
      dc.globalCompositeOperation = 'source-over';
      // Restore the translate offset before finishing
      dc.restore();
      // Blit offscreen canvas back onto main canvas at the correct position
      ctx.drawImage(_offCanvas, 0, 0, bw, bh, bx, by, bw, bh);
    } else {
      dc.restore();
    }

    ctx.restore(); // matches the outer ctx.save() for glow
  }
}

function drawProjs() {
  for(const p of projs){
    if(!p.alive) continue;
    const r=p.r*(p.scale||1);
    if(p.type==='wb'){
      const bc=p.ownerColor||'#e879a0';
      const bg2=lighten(bc,50);
      for(let i=0;i<p.trail.length;i++){
        const t=p.trail[i];const frac=(i+1)/p.trail.length;const tr=r*frac*0.7;
        ctx.save();ctx.globalAlpha=frac*0.45;ctx.fillStyle=bc;ctx.shadowColor=bc;ctx.shadowBlur=15*frac;
        ctx.beginPath();ctx.arc(t.x,t.y,tr,0,Math.PI*2);ctx.fill();ctx.restore();
      }
      ctx.save();ctx.globalAlpha=0.35;
      const halo=ctx.createRadialGradient(p.x,p.y,r*0.4,p.x,p.y,r*2.8);
      halo.addColorStop(0,bc+'99');halo.addColorStop(0.5,bc+'33');halo.addColorStop(1,'transparent');
      ctx.fillStyle=halo;ctx.beginPath();ctx.arc(p.x,p.y,r*2.8,0,Math.PI*2);ctx.fill();ctx.restore();
      ctx.save();ctx.shadowColor=bc;ctx.shadowBlur=20;
      const bg3=ctx.createRadialGradient(p.x-r*0.28,p.y-r*0.28,r*0.05,p.x,p.y,r);
      bg3.addColorStop(0,lighten(bc,70));bg3.addColorStop(0.4,lighten(bc,25));bg3.addColorStop(0.8,bc);bg3.addColorStop(1,darken(bc,30));
      ctx.fillStyle=bg3;ctx.strokeStyle=darken(bc,50);ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore();
      // (no specular highlight)
      if(p.angle!==undefined){const num=6;for(let i=0;i<num;i++){const a=p.angle+(i/num)*Math.PI*2;const sx=p.x+Math.cos(a)*r*1.8;const sy=p.y+Math.sin(a)*r*1.8;ctx.save();ctx.fillStyle=bg2;ctx.shadowColor=bc;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(sx,sy,r*0.2,0,Math.PI*2);ctx.fill();ctx.restore();}}
      if(p.bounces>=0){
        const bc2=p.ownerColor||'#e879a0';
        ctx.save();
        ctx.font=`bold ${Math.max(7,Math.round(r*0.55))}px Orbitron,monospace`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.shadowColor=darken(bc2,20); ctx.shadowBlur=8;
        ctx.fillStyle='rgba(255,255,255,0.96)';
        ctx.fillText(p.bounces.toString(),p.x,p.y);
        ctx.restore();
      }
    } else if(p.type==='arrow'){
      const angle=Math.atan2(p.vy,p.vx);
      ctx.save();ctx.strokeStyle='#cde';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.shadowColor='#90b0d0';ctx.shadowBlur=8;
      ctx.beginPath();ctx.moveTo(p.x-Math.cos(angle)*12,p.y-Math.sin(angle)*12);ctx.lineTo(p.x+Math.cos(angle)*12,p.y+Math.sin(angle)*12);ctx.stroke();
      ctx.fillStyle='#dce3e8';ctx.beginPath();ctx.moveTo(p.x+Math.cos(angle)*12,p.y+Math.sin(angle)*12);ctx.lineTo(p.x+Math.cos(angle+2.5)*6,p.y+Math.sin(angle+2.5)*6);ctx.lineTo(p.x+Math.cos(angle-2.5)*6,p.y+Math.sin(angle-2.5)*6);ctx.closePath();ctx.fill();ctx.restore();
    }
  }
}

function drawPortals() {
  for(const portal of portals){
    if(!portal.alive) continue;

    // ── Opening animation: openAnim goes 0.65 → 0
    // openFrac=1 means fully open, 0 means just spawned
    const openFrac = portal.openAnim > 0 ? 1 - (portal.openAnim / 0.65) : 1;
    // eased open progress (ease-out cubic)
    const eased = 1 - Math.pow(1 - openFrac, 3);

    // Soft dashed connector — only show when fully open
    ctx.save();ctx.globalAlpha=portal.alpha*0.12*eased;ctx.strokeStyle='#ff8fc8';ctx.lineWidth=1;ctx.setLineDash([3,10]);
    ctx.beginPath();ctx.moveTo(portal.g1.x,portal.g1.y);ctx.lineTo(portal.g2.x,portal.g2.y);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();

    for(const gate of [portal.g1,portal.g2]){
      ctx.save();ctx.globalAlpha=portal.alpha;

      // Scale from 0 → full during opening animation
      const scaledR = gate.r * eased;

      // ── OPENING BURST FLASH: bright white-pink flare at spawn (only during openAnim)
      if(portal.openAnim > 0){
        const burstFrac = portal.openAnim / 0.65; // 1=just spawned, 0=done
        const flashR = gate.r * (1.5 + burstFrac * 4.0); // expands outward
        const flashAlpha = burstFrac * 0.85;
        ctx.save();
        ctx.globalAlpha = flashAlpha * portal.alpha;
        const flashG = ctx.createRadialGradient(gate.x,gate.y,0,gate.x,gate.y,flashR);
        flashG.addColorStop(0,'rgba(255,255,255,0.95)');
        flashG.addColorStop(0.2,'rgba(255,160,230,0.80)');
        flashG.addColorStop(0.55,'rgba(200,50,160,0.35)');
        flashG.addColorStop(1,'transparent');
        ctx.fillStyle=flashG;
        ctx.beginPath();ctx.arc(gate.x,gate.y,flashR,0,Math.PI*2);ctx.fill();
        // Bright spiky ring at the expansion front
        ctx.strokeStyle=`rgba(255,220,245,${flashAlpha*0.9})`;
        ctx.lineWidth=3*burstFrac;
        ctx.shadowColor='#ffb0e8';ctx.shadowBlur=30*burstFrac;
        ctx.beginPath();ctx.arc(gate.x,gate.y,flashR*0.88,0,Math.PI*2);ctx.stroke();
        ctx.shadowBlur=0;
        // Tear-open lines radiating from center (like space being ripped)
        const nTears=8;
        for(let i=0;i<nTears;i++){
          const a=(i/nTears)*Math.PI*2 + portal.angle;
          const len=gate.r*(0.5+burstFrac*2.2);
          ctx.strokeStyle=`rgba(255,180,240,${burstFrac*0.7})`;
          ctx.lineWidth=2*burstFrac;
          ctx.shadowColor='#ff80d0';ctx.shadowBlur=12*burstFrac;
          ctx.beginPath();
          ctx.moveTo(gate.x+Math.cos(a)*scaledR*0.6, gate.y+Math.sin(a)*scaledR*0.6);
          ctx.lineTo(gate.x+Math.cos(a)*len, gate.y+Math.sin(a)*len);
          ctx.stroke();
          ctx.shadowBlur=0;
        }
        ctx.restore();
      }

      // ── Wide outer halo (scales with eased)
      const halo=ctx.createRadialGradient(gate.x,gate.y,scaledR*0.6,gate.x,gate.y,scaledR*3.2);
      halo.addColorStop(0,'rgba(255,80,190,0.22)');
      halo.addColorStop(0.4,'rgba(220,50,160,0.10)');
      halo.addColorStop(1,'transparent');
      ctx.fillStyle=halo;ctx.beginPath();ctx.arc(gate.x,gate.y,scaledR*3.2,0,Math.PI*2);ctx.fill();

      // ── Deep inner void ──
      if(scaledR>1){
        const void1=ctx.createRadialGradient(gate.x,gate.y,0,gate.x,gate.y,scaledR*0.82);
        void1.addColorStop(0,'rgba(8,2,18,0.98)');
        void1.addColorStop(0.55,'rgba(30,5,50,0.90)');
        void1.addColorStop(0.85,'rgba(120,20,90,0.55)');
        void1.addColorStop(1,'rgba(200,50,140,0.0)');
        ctx.fillStyle=void1;ctx.beginPath();ctx.arc(gate.x,gate.y,scaledR,0,Math.PI*2);ctx.fill();
      }

      // ── Outer glowing ring ──
      ctx.strokeStyle='#ff5ec0';ctx.lineWidth=3.5*eased;
      ctx.shadowColor='#ff5ec0';ctx.shadowBlur=22*eased;
      ctx.beginPath();ctx.arc(gate.x,gate.y,scaledR,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;

      // ── Second softer inner ring ──
      ctx.strokeStyle=`rgba(255,160,220,${0.55*eased})`;ctx.lineWidth=1.8*eased;
      ctx.shadowColor='#ffb0e8';ctx.shadowBlur=12*eased;
      ctx.beginPath();ctx.arc(gate.x,gate.y,scaledR*0.78,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;

      // ── Rotating energy wisps ──
      if(eased>0.3){
        const nWisps=5;
        for(let i=0;i<nWisps;i++){
          const baseA=portal.angle+(i/nWisps)*Math.PI*2;
          const wispR=scaledR*0.88;
          const arcSpan=0.38;
          ctx.strokeStyle=`rgba(255,130,210,${0.6*eased})`;ctx.lineWidth=2;
          ctx.shadowColor='#ff80d0';ctx.shadowBlur=10*eased;
          ctx.beginPath();ctx.arc(gate.x,gate.y,wispR,baseA,baseA+arcSpan);ctx.stroke();
          ctx.shadowBlur=0;
        }
        const nWisps2=4;
        for(let i=0;i<nWisps2;i++){
          const baseA=-portal.angle*0.6+(i/nWisps2)*Math.PI*2;
          const wispR=scaledR*0.58;
          ctx.strokeStyle=`rgba(255,200,230,${0.35*eased})`;ctx.lineWidth=1.2;
          ctx.beginPath();ctx.arc(gate.x,gate.y,wispR,baseA,baseA+0.5);ctx.stroke();
        }
      }

      // ── Pulsing center star-dot ──
      const pulse=0.7+Math.sin(portal.angle*2.5)*0.3;
      ctx.fillStyle=`rgba(255,230,245,${0.95*eased})`;
      ctx.shadowColor='#ffaad8';ctx.shadowBlur=20*pulse*eased;
      ctx.beginPath();ctx.arc(gate.x,gate.y,3.5*pulse*eased,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;

      ctx.restore();
    }
  }
}

function drawParticles() {
  for(const p of particles){
    const frac=p.life/p.maxLife;
    ctx.save();ctx.globalAlpha=frac*0.95;

    if(p.isSpark){
      // Metal sparks: thin bright streaks with tail
      const speed=Math.sqrt(p.vx*p.vx+p.vy*p.vy)||1;
      const trailLen=Math.min(speed*0.04, 18);
      const nx=p.vx/speed, ny=p.vy/speed;
      ctx.strokeStyle=p.color;
      ctx.lineWidth=Math.max(0.5, p.sz*0.5*frac);
      ctx.lineCap='round';
      ctx.shadowColor=p.color; ctx.shadowBlur=8;
      ctx.beginPath();
      ctx.moveTo(p.x-nx*trailLen, p.y-ny*trailLen);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    } else if(p.isBlood){
      // Blood drops: elongated teardrop shape
      const speed=Math.sqrt(p.vx*p.vx+p.vy*p.vy)||1;
      const stretch=Math.min(speed*0.018, 2.8);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(Math.atan2(p.vy, p.vx));
      if(p.glow){ctx.shadowColor=p.color;ctx.shadowBlur=10*frac;}
      ctx.fillStyle=p.color;
      ctx.beginPath();
      ctx.ellipse(0, 0, p.sz*(1+stretch), p.sz, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    } else if(p.glow){
      ctx.shadowColor=p.color;ctx.shadowBlur=12;
      if(p.star){
        ctx.fillStyle=p.color;ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=0.8;
        const spikes=4,outerR=p.sz,innerR=p.sz*0.38;
        const rot=(p.rot||0)+(1-frac)*3;
        ctx.beginPath();
        for(let i=0;i<spikes*2;i++){const r2=i%2===0?outerR:innerR;const angle=rot+(i/spikes)*Math.PI;if(i===0)ctx.moveTo(p.x+Math.cos(angle)*r2,p.y+Math.sin(angle)*r2);else ctx.lineTo(p.x+Math.cos(angle)*r2,p.y+Math.sin(angle)*r2);}
        ctx.closePath();ctx.fill();ctx.stroke();
      } else {ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.5,p.sz),0,Math.PI*2);ctx.fill();}
    } else {
      if(p.star){
        ctx.fillStyle=p.color;ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=0.8;
        const spikes=4,outerR=p.sz,innerR=p.sz*0.38;
        const rot=(p.rot||0)+(1-frac)*3;
        ctx.beginPath();
        for(let i=0;i<spikes*2;i++){const r2=i%2===0?outerR:innerR;const angle=rot+(i/spikes)*Math.PI;if(i===0)ctx.moveTo(p.x+Math.cos(angle)*r2,p.y+Math.sin(angle)*r2);else ctx.lineTo(p.x+Math.cos(angle)*r2,p.y+Math.sin(angle)*r2);}
        ctx.closePath();ctx.fill();ctx.stroke();
      } else {ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.5,p.sz),0,Math.PI*2);ctx.fill();}
    }
    ctx.restore();
  }
}

function drawFloats() {
  for(const f of floats){
    const frac=f.life/f.maxLife;
    ctx.save();
    ctx.globalAlpha=frac;
    ctx.font=`bold ${f.sz+2}px Orbitron, monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    // Soft colored shadow — no hard black outline
    ctx.shadowColor=f.color; ctx.shadowBlur=14;
    ctx.fillStyle=f.color;
    ctx.fillText(f.txt,f.x,f.y);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════
function loop(ts) {
  if(!running) return;
  const rawDt=Math.min((ts-lastTs)/1000,0.05);
  lastTs=ts;

  // Hit-stop: freeze gameplay for a brief moment after a hit
  if(hitStopTimer>0){
    hitStopTimer=Math.max(0,hitStopTimer-rawDt);
    hitStopFlash=Math.max(0,hitStopFlash-rawDt*6);
    critFlash=Math.max(0,critFlash-rawDt*3.5);
    draw();
    raf=requestAnimationFrame(loop);
    return;
  }
  hitStopFlash=Math.max(0,hitStopFlash-rawDt*6);
  critFlash=Math.max(0,critFlash-rawDt*3.5);

  // ── PROXIMITY SLOW-MO ──
  // When any two alive balls are close enough to start the weapon-swing animation,
  // reduce dt for ALL gameplay (except the balls in knockback & visual FX).
  // Threshold: same as attackRange approach zone (minD * 2.2)
  let proximityFactor = 1.0;
  const aliveBalls = GS.balls.filter(b=>b.alive && b.knockbackCount<=0);
  if(aliveBalls.length >= 2){
    for(let i=0;i<aliveBalls.length;i++){
      for(let j=i+1;j<aliveBalls.length;j++){
        const a=aliveBalls[i], b=aliveBalls[j];
        const dist=Math.hypot(b.x-a.x,b.y-a.y);
        const ra=a.radius*(a.scale||1), rb=b.radius*(b.scale||1);
        const minD=ra+rb;
        const slowZone = minD*2.8; // distance at which slow starts
        if(dist < slowZone){
          // Lerp: at minD → 0.5x, at slowZone → 1.0x
          const t=Math.max(0,Math.min(1,(dist-minD)/(slowZone-minD)));
          const factor=0.5+t*0.5; // 0.5 at closest, 1.0 at edge
          proximityFactor=Math.min(proximityFactor, factor);
        }
      }
    }
  }

  // ── KNOCKBACK SLOW-MO ──
  // Any ball in knockback → slow everything EXCEPT that ball's own update.
  // We achieve this by passing different dt per-ball inside updateBalls.
  const anyKnockback = GS.balls.some(b=>b.alive&&b.knockbackCount>0);

  // Base dt for normal gameplay (affected by proximity)
  const normalDt = rawDt * proximityFactor;

  // Knockback time factor: 0.10x for non-knockback, 1.0x for the knocked ball
  // This is handled inside updateBalls via per-ball dt selection.
  const slowDt = anyKnockback ? rawDt * 0.10 * proximityFactor : normalDt;

  GS.time += normalDt;

  // AI uses normal dt
  for(const ball of GS.balls) aiTick(ball, normalDt);

  // Physics: pass both dt values; updateBalls will choose per-ball
  updateBalls(slowDt, rawDt, anyKnockback, proximityFactor);
  updateProjs(slowDt);
  updatePortals(slowDt);
  updateRoyalHorses(slowDt);

  // Visual FX always use rawDt — unaffected by slow-mo
  updateParticles(rawDt);
  updateFloats(rawDt);
  updateShockwaves(rawDt);
  updateLightTrails(rawDt);
  updateWeaponSwings(rawDt);
  updateKnockbackGhosts(rawDt);

  draw();
  if(Math.round(GS.time*60)%3===0){
    for(const ball of GS.balls) updateFighterCard(ball);
  }
  raf=requestAnimationFrame(loop);
}

window.addEventListener('resize',()=>{
  if(document.getElementById('screen-game').classList.contains('active')){
    resizeArena();
  }
});
</script>
</body>
</html>
