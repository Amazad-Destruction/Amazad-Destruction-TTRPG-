<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazad Arena — Balls Fight v5</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&family=Tajawal:wght@400;700;900&display=swap');
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --pink:    #e879a0;
  --pink-lt: #f4b8d0;
  --pink-dk: #9d2f5c;
  --gold:    #f5c842;
  --bg:      #0d0812;
  --bg2:     #130d1e;
  --border:  rgba(232,121,160,0.18);
  --muted:   #7a6080;
  --red:     #ff4466;
  --blue:    #60aaff;
  --purple:  #a063d4;
  --teal:    #40e0d0;
}
body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg);
  color: #e8ddf0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.screen { display:none; width:100%; height:100%; }
.screen.active { display:flex; }

/* ══ SELECT SCREEN ══ */
#screen-select {
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 16px;
  padding: 20px 16px;
  background: radial-gradient(ellipse at 50% 0%, rgba(232,121,160,0.12) 0%, transparent 65%), var(--bg);
  overflow-y: auto;
}
.game-title h1 {
  font-family: 'Tajawal', 'Orbitron', sans-serif;
  font-size: 30px; font-weight: 900;
  color: var(--pink-lt); text-align: center;
  letter-spacing: 3px;
  text-shadow: 0 0 30px rgba(232,121,160,0.5);
}
.game-title p { font-size: 11px; color: var(--muted); text-align: center; margin-top: 3px; letter-spacing: 4px; font-weight: 600; }
.select-label { font-size: 12px; color: var(--muted); text-align: center; letter-spacing: 1px; }
.ball-grid { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; max-width: 1100px; direction: ltr; }
.ball-card-select {
  width: 230px;
  background: rgba(255,255,255,0.03);
  border: 1.5px solid rgba(232,121,160,0.15);
  border-radius: 14px; padding: 14px 12px 12px;
  cursor: pointer; transition: border-color .2s, box-shadow .2s, transform .15s;
  position: relative; user-select: none; direction: ltr; text-align: left;
}
.ball-card-select:hover { border-color: rgba(232,121,160,0.45); transform: translateY(-4px); box-shadow: 0 10px 30px rgba(232,121,160,0.15); }
.ball-card-select.selected { border-color: var(--pink); box-shadow: 0 0 0 2px rgba(232,121,160,0.3), 0 10px 30px rgba(232,121,160,0.22); }
.check-circle { position: absolute; top: 10px; right: 10px; width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--muted); display: flex; align-items: center; justify-content: center; font-size: 9px; color: transparent; transition: all .2s; }
.ball-card-select.selected .check-circle { background: var(--pink); border-color: var(--pink); color: white; }
.card-header { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-bottom: 10px; }
.ball-icon-preview { width: 60px; height: 60px; border-radius: 50%; display: block; flex-shrink: 0; }
.ball-card-select h3 { font-size: 13px; font-weight: 700; text-align: center; color: #f0e0f8; letter-spacing: .3px; line-height: 1.2; font-family: 'Tajawal', 'Rajdhani', sans-serif; }
.ball-card-select .ball-subdesc { font-size: 9.5px; color: var(--muted); text-align: center; font-family: 'Tajawal', sans-serif; }
.stat-section-title { font-size: 8px; color: var(--pink); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin: 8px 0 4px; opacity: 0.8; font-family: 'Orbitron', monospace; }
.stat-mini { display:flex; flex-direction:column; gap:3px; }
.stat-mini-row { display:flex; align-items:center; gap:5px; font-size:9px; color:var(--muted); font-family: 'Tajawal', 'Rajdhani', sans-serif; }
.stat-mini-row .stat-label { flex:1; text-align:left; font-weight:600; }
.stat-dots { display:flex; gap:2px; flex-shrink:0; }
.sdot { width:5px; height:5px; border-radius:50%; background:rgba(232,121,160,0.1); }
.sdot.on { background:var(--pink); box-shadow: 0 0 4px rgba(232,121,160,0.65); }
.stat-val { font-size:8px; color:var(--pink-lt); font-weight:700; width:10px; text-align:left; }
.skills-section { margin-top:9px; display:flex; flex-direction:column; gap:7px; }
.skill-entry { background: rgba(232,121,160,0.05); border: 1px solid rgba(232,121,160,0.12); border-radius: 8px; padding: 7px 8px; }
.skill-entry-header { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.skill-entry-emoji { font-size: 15px; flex-shrink:0; }
.skill-entry-name { font-size: 11px; font-weight:700; color:#f0d8f8; font-family: 'Tajawal', 'Rajdhani', sans-serif; flex:1; }
.skill-entry-cost { font-size: 8px; color: #60aaff; font-weight:700; background: rgba(96,170,255,0.1); border-radius: 4px; padding: 1px 5px; white-space: nowrap; font-family: 'Orbitron', monospace; }
.skill-entry-desc { font-size: 9.5px; color: #9a80a8; line-height: 1.5; font-family: 'Tajawal', sans-serif; direction: ltr; text-align: left; }
/* Stat bonuses section in select */
.stat-bonus-row { font-size:8px; color:#60e080; margin-top:2px; font-family:'Tajawal',sans-serif; direction:rtl; }

.btn-start {
  font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700;
  padding: 10px 36px; border-radius: 28px; border: none; cursor: pointer;
  background: linear-gradient(135deg, var(--pink), var(--pink-dk)); color: white;
  letter-spacing: 2px; transition: opacity .2s, transform .15s, box-shadow .2s;
  box-shadow: 0 4px 20px rgba(232,121,160,0.35);
}
.btn-start:hover { opacity: 0.9; transform: scale(1.03); box-shadow: 0 6px 28px rgba(232,121,160,0.5); }
.btn-start:disabled { opacity: 0.25; cursor: not-allowed; transform: none; box-shadow: none; }

/* ══ GAME SCREEN ══ */
#screen-game {
  flex-direction: column;
  background: var(--bg);
  position: relative;
  align-items: center;
  justify-content: center;
}

/* Arena: centered square, not full-screen */
#arena-wrap {
  position: relative;
  z-index: 0;
  flex-shrink: 0;
  /* Square: use the smaller of viewport width/height minus HUD space */
  width:  min(100vw, calc(100vh - 180px));
  height: min(100vw, calc(100vh - 180px));
  border: 2px solid rgba(232,121,160,0.3);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(232,121,160,0.15), 0 0 0 1px rgba(232,121,160,0.08);
}
#arena-canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
}

/* Top HUD - above the arena */
#top-hud {
  width: min(100vw, calc(100vh - 180px));
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 0;
  pointer-events: none;
  flex-shrink: 0;
}

#topbar {
  height: 38px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  background: rgba(13,8,18,0.92);
  pointer-events: auto;
  border-radius: 4px 4px 0 0;
}
.tb-title { font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700; color: var(--pink-lt); letter-spacing: 2px; }
#tb-status { font-size: 10px; color: var(--muted); font-weight: 600; }
.tb-btn {
  font-family: 'Rajdhani', sans-serif; font-size: 10px; padding: 3px 11px; font-weight: 600;
  border-radius: 16px; border: 1px solid var(--border);
  background: rgba(13,8,18,0.7); color: var(--pink-lt);
  cursor: pointer; letter-spacing: .5px; pointer-events: auto;
}
.tb-btn:hover { background: rgba(232,121,160,0.12); }

/* Skill Commentary Banner */
#skill-banner {
  margin: 0 0 0 0;
  background: rgba(20,8,35,0.95);
  border: 1px solid rgba(232,121,160,0.35);
  border-top: none;
  border-radius: 0 0 10px 10px;
  padding: 6px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 32px;
  backdrop-filter: blur(4px);
  transition: opacity 0.3s;
}
#skill-banner-emoji { font-size: 18px; flex-shrink: 0; }
#skill-banner-text { font-size: 11px; color: #e0d0ee; font-family: 'Tajawal', sans-serif; line-height: 1.4; direction: ltr; text-align: left; flex: 1; }

/* Bottom Fighter Cards - below the arena */
#bottom-hud {
  width: min(100vw, calc(100vh - 180px));
  z-index: 10;
  padding: 6px 8px 8px;
  background: rgba(13,8,18,0.92);
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
  border-radius: 0 0 4px 4px;}

/* Fighters row */
#fighters-row {
  display: flex;
  gap: 6px;
  align-items: stretch;
  justify-content: space-between;
  overflow-x: auto;
}
#fighters-row::-webkit-scrollbar { display: none; }

.fighter-card {
  flex: 1;
  min-width: 0;
  background: rgba(20,12,30,0.88);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 7px 8px 6px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  backdrop-filter: blur(4px);
  transition: border-color 0.3s;
}
.fighter-card.dead { opacity: 0.3; }
.fighter-card.attacking { border-color: rgba(255,200,60,0.7); animation: attackPulse 0.3s ease; }
@keyframes attackPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
.fc-header { display: flex; align-items: center; gap: 5px; }
.fc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.fc-name {
  font-size: 9px; font-weight: 700; color: #f0e0f8;
  font-family: 'Tajawal', sans-serif;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
}
.fc-weapon-icon { font-size: 12px; flex-shrink: 0; }
.fc-bars { display: flex; flex-direction: column; gap: 3px; }
.fc-bar-row { display: flex; align-items: center; gap: 4px; }
.fc-bar-label { font-size: 7px; color: var(--muted); font-weight: 700; width: 22px; text-align: right; font-family:'Orbitron',monospace; }
.fc-bar-track { flex: 1; height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.fc-bar-fill { height: 100%; border-radius: 3px; transition: width .2s; }
.hp-fill { background: linear-gradient(90deg, #ff4466, #ff7090); }
.mp-fill { background: linear-gradient(90deg, #4477ff, #60aaff); }
.fc-bar-val { font-size: 7px; color: #c0a8d8; font-weight: 700; width: 26px; text-align: left; font-family:'Orbitron',monospace; white-space:nowrap; }

/* Skills row */
.fc-skills { display: flex; gap: 4px; flex-wrap: wrap; }
.fc-skill-pill {
  display: flex; align-items: center; gap: 3px;
  background: rgba(232,121,160,0.08);
  border: 1px solid rgba(232,121,160,0.18);
  border-radius: 6px;
  padding: 2px 6px;
  font-size: 8px;
  position: relative; overflow: hidden;
  min-width: 0;
}
.fc-skill-pill.ready { border-color: rgba(96,224,128,0.4); background: rgba(96,224,128,0.06); }
.fc-skill-pill.active { border-color: rgba(255,200,60,0.6); background: rgba(255,200,60,0.1); animation: skillActive 0.5s ease infinite alternate; }
@keyframes skillActive { from { box-shadow: 0 0 4px rgba(255,200,60,0.3); } to { box-shadow: 0 0 10px rgba(255,200,60,0.7); } }
.fc-skill-emoji { font-size: 10px; }
.fc-skill-name { color: #c0a8d8; font-family:'Tajawal',sans-serif; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:55px; }
.fc-skill-cd { font-size: 7px; color: var(--muted); font-family:'Orbitron',monospace; margin-left:2px; }
.fc-skill-cd-bar { position:absolute; bottom:0; left:0; height:2px; background:rgba(232,121,160,0.5); transition:width 0.1s; }

/* Stats mini display */
.fc-stats { display: flex; gap: 3px; flex-wrap: wrap; }
.fc-stat-badge {
  font-size: 7px; font-family: 'Orbitron', monospace;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 4px;
  padding: 1px 4px;
  color: var(--muted);
  white-space: nowrap;
}
.fc-stat-badge span { color: var(--pink-lt); font-weight: 700; }
/* Weapon cooldown indicator */
.fc-weapon-cd {
  font-size: 7px; font-family: 'Orbitron', monospace;
  color: #f5c842; font-weight: 700;
  background: rgba(245,200,66,0.1);
  border: 1px solid rgba(245,200,66,0.25);
  border-radius: 4px;
  padding: 1px 5px;
}
.fc-weapon-cd.ready { color: #60e080; border-color: rgba(96,224,128,0.3); background: rgba(96,224,128,0.08); }

/* Overlay */
#overlay { display:none; position:fixed; inset:0; z-index:100; background: rgba(5,2,10,0.92); align-items:center; justify-content:center; flex-direction:column; gap:14px; }
#overlay.show { display:flex; }
#ov-title { font-family:'Orbitron',monospace; font-size:22px; font-weight:900; color:var(--pink-lt); text-align:center; letter-spacing:3px; text-shadow: 0 0 40px rgba(232,121,160,0.6); }
#ov-sub { font-size:11px; color:var(--muted); letter-spacing:2px; font-weight:600; }
.ov-btn { font-family:'Orbitron',monospace; font-size:11px; font-weight:700; padding:8px 26px; border-radius:20px; border:none; cursor:pointer; background:linear-gradient(135deg,var(--pink),var(--pink-dk)); color:white; letter-spacing:1.5px; }
.ov-btn.ghost { background:transparent; border:1px solid var(--border); color:var(--pink-lt); }
.ov-btn:hover { opacity:0.85; }
</style>
</head>
<body>
<!-- SELECT SCREEN -->
<div class="screen active" id="screen-select">
  <div class="game-title">
    <h1>AMAZAD ARENA</h1>
    <p>AMAZAD ARENA · BALLS FIGHT v5</p>
  </div>
  <div class="select-label" style="font-family:'Rajdhani',sans-serif;font-size:13px;">Choose Fighters (at least 2)</div>
  <div class="ball-grid" id="ball-grid"></div>
  <button class="btn-start" id="btn-launch" disabled onclick="launchGame()" style="font-family:'Orbitron',monospace;letter-spacing:2px;">START BATTLE</button>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="screen-game">
  <!-- Top HUD above arena -->
  <div id="top-hud">
    <div id="topbar">
      <div class="tb-title">AMAZAD ⚔</div>
      <div id="tb-status">Ready</div>
      <button class="tb-btn" onclick="goBack()">← Select</button>
    </div>
    <div id="skill-banner">
      <span id="skill-banner-emoji">⚔</span>
      <span id="skill-banner-text">Battle begins...</span>
    </div>
  </div>
  <!-- Arena -->
  <div id="arena-wrap">
    <canvas id="arena-canvas"></canvas>
  </div>
  <!-- Bottom HUD -->
  <div id="bottom-hud">
    <div id="fighters-row"></div>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div id="ov-title"></div>
  <div id="ov-sub"></div>
  <button class="ov-btn" onclick="replayGame()">REMATCH</button>
  <button class="ov-btn ghost" onclick="goBack()">SELECT BALLS</button>
</div>

function lighten(hex, amt) {
  const n = parseInt(hex.replace('#',''),16);
  const r = Math.min(255,((n>>16)&0xff)+amt);
  const g = Math.min(255,((n>>8)&0xff)+amt);
  const b = Math.min(255,(n&0xff)+amt);
  return `rgb(${r},${g},${b})`;
}
function darken(hex, amt) { return lighten(hex,-amt); }

const WEAPON_CD_BASE = 3.0; // 3 seconds weapon cooldown

const S = {
  // Dexterity: per point
  critChance:    v => v * 0.05,           // 5% per point
  critMult:      v => 1.0 + v * 0.10,    // +10% per point
  weaponCdReduce:v => v * 0.3,           // -0.3s per point (subtracted from base 3s)
  // Might: per point
  maxHp:         v => MAX_HP + v * 10,   // +10 HP per point
  // Strength: per point
  ballSpd:       v => BALL_SPD + v * 20, // +20 speed per point
  collDmg:       v => v * 1,             // +1 damage per point
  // Knowledge: per point
  manaRegen:     v => 3.0 + v * 0.4,   // base 3/s + 0.4 per knowledge point
  cdMult:        v => Math.max(0.1, 1 - v * 0.10),  // -10% per point
  // Intelligence: per point
  aimAcc:        v => Math.min(0.98, v * 0.12),    // 12% per point
  dodgeChance:   v => Math.min(0.95, v * 0.12),    // 12% per point
};

// Effective weapon cooldown
function getWeaponCd(ball) {
  return Math.max(0.5, WEAPON_CD_BASE - S.weaponCdReduce(ball.stats.dexterity));
}

      `Weapon CD: -${(val*0.3).toFixed(1)}s`,

// AUDIO
// ═══════════════════════════════════════════
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state==='suspended') audioCtx.resume();
}
function tone(freq, type, dur, vol=0.25, delay=0) {
  if (!audioCtx) return;
  if(audioCtx.state==='suspended') audioCtx.resume();
  try {
    const o=audioCtx.createOscillator(), g=audioCtx.createGain(), comp=audioCtx.createDynamicsCompressor();
    o.connect(g); g.connect(comp); comp.connect(audioCtx.destination);
    o.type=type; o.frequency.value=freq;
    const t=audioCtx.currentTime+delay;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur+0.05);
  } catch(e){}
}
function noise(dur, vol=0.15, delay=0) {
  if (!audioCtx) return;
  try {
    const bufLen=audioCtx.sampleRate*dur, buf=audioCtx.createBuffer(1,bufLen,audioCtx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) data[i]=(Math.random()*2-1);
    const src=audioCtx.createBufferSource(), g=audioCtx.createGain(), filt=audioCtx.createBiquadFilter();
    filt.type='bandpass'; filt.frequency.value=800; filt.Q.value=0.5;
    src.buffer=buf; src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
    const t=audioCtx.currentTime+delay;
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    src.start(t); src.stop(t+dur);
  } catch(e){}
}
// ═══════════════════════════════════════════
// AUDIO ENGINE — FULL OVERHAUL
// ═══════════════════════════════════════════

// ── Core oscillator with envelope ──
function osc(freq, type, dur, vol, delay=0, detune=0) {
  if(!audioCtx) ensureAudio();
  if(!audioCtx) return;
  if(audioCtx.state==='suspended') audioCtx.resume();
  try {
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type=type; o.frequency.value=freq; o.detune.value=detune;
    const t=audioCtx.currentTime+delay;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.05);
  } catch(e){}
}

// ── Pitched oscillator with frequency sweep ──
function sweep(f0, f1, type, dur, vol, delay=0) {
  if(!audioCtx) ensureAudio();
  if(!audioCtx) return;
  if(audioCtx.state==='suspended') audioCtx.resume();
  try {
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type=type;
    const t=audioCtx.currentTime+delay;
    o.frequency.setValueAtTime(f0,t);
    o.frequency.exponentialRampToValueAtTime(f1,t+dur);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.05);
  } catch(e){}
}

// ── Shaped noise burst (for impacts, whooshes, etc.) ──
function burst(dur, vol, delay=0, lpFreq=800, hpFreq=0, attack=0.005, peakAt=0.05) {
  if(!audioCtx) return;
  if(audioCtx.state==='suspended') audioCtx.resume();
  try {
    const sr=audioCtx.sampleRate;
    const len=Math.ceil(sr*dur);
    const buf=audioCtx.createBuffer(1,len,sr);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1);
    const src=audioCtx.createBufferSource();
    src.buffer=buf;
    let node=src;
    if(lpFreq>0){
      const lp=audioCtx.createBiquadFilter();
      lp.type='lowpass'; lp.frequency.value=lpFreq; lp.Q.value=0.7;
      node.connect(lp); node=lp;
    }
    if(hpFreq>0){
      const hp=audioCtx.createBiquadFilter();
      hp.type='highpass'; hp.frequency.value=hpFreq; hp.Q.value=0.5;
      node.connect(hp); node=hp;
    }
    const g=audioCtx.createGain();
    node.connect(g); g.connect(audioCtx.destination);
    const t=audioCtx.currentTime+delay;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+attack);
    if(peakAt<dur) g.gain.setValueAtTime(vol,t+peakAt);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.start(t); src.stop(t+dur+0.05);
  } catch(e){}
}

// ── Resonant click (bone snap, impact transient) ──
function click(freq, dur, vol, delay=0, resonance=8) {
  if(!audioCtx) return;
  if(audioCtx.state==='suspended') audioCtx.resume();
  try {
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    const bp=audioCtx.createBiquadFilter();
    bp.type='bandpass'; bp.frequency.value=freq; bp.Q.value=resonance;
    o.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
    o.type='square'; o.frequency.value=freq;
    const t=audioCtx.currentTime+delay;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.02);
  } catch(e){}
}

// ── Distorted sub-bass thud ──
function thud(freq, dur, vol, delay=0) {
  if(!audioCtx) return;
  if(audioCtx.state==='suspended') audioCtx.resume();
  try {
    const o=audioCtx.createOscillator(), g=audioCtx.createGain(), wav=audioCtx.createWaveShaper();
    const curve=new Float32Array(256);
    for(let i=0;i<256;i++){const x=i/128-1; curve[i]=x<0?-Math.pow(-x,0.5):Math.pow(x,0.5);}
    wav.curve=curve;
    o.connect(wav); wav.connect(g); g.connect(audioCtx.destination);
    o.type='sine'; o.frequency.value=freq;
    const t=audioCtx.currentTime+delay;
    o.frequency.setValueAtTime(freq*1.8,t);
    o.frequency.exponentialRampToValueAtTime(freq,t+0.03);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.05);
  } catch(e){}
}

// ── Metallic ring ──
function ring(freq, dur, vol, delay=0) {
  if(!audioCtx) return;
  if(audioCtx.state==='suspended') audioCtx.resume();
  try {
    const o=audioCtx.createOscillator(), g=audioCtx.createGain(), hp=audioCtx.createBiquadFilter();
    hp.type='highpass'; hp.frequency.value=freq*0.5; hp.Q.value=2;
    o.connect(hp); hp.connect(g); g.connect(audioCtx.destination);
    o.type='triangle'; o.frequency.value=freq;
    const t=audioCtx.currentTime+delay;
    g.gain.setValueAtTime(vol,t);
    g.gain.setValueAtTime(vol*0.6,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.05);
  } catch(e){}
}

// Offscreen canvas for per-ball red-tint compositing
let _offCanvas = null, _offCtx = null;
function getOffCanvas(w, h) {
  const need = Math.ceil(Math.max(w, h));
  if (!_offCanvas || _offCanvas.width < need || _offCanvas.height < need) {
    _offCanvas = document.createElement('canvas');
    _offCanvas.width  = need;
    _offCanvas.height = need;
    _offCtx = _offCanvas.getContext('2d');
  }
  return _offCtx;
}

function resizeArena() {
  const dpr=window.devicePixelRatio||1;
  // Compute square size from CSS (min of vw vs vh-180)
  const sq=Math.min(window.innerWidth, window.innerHeight-180);
  const size=Math.max(200,sq);
  canvas.style.width = size+'px';
  canvas.style.height = size+'px';
  canvas.width = Math.round(size*dpr);
  canvas.height = Math.round(size*dpr);
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr,dpr);
  AW=size; AH=size;
}

// BALL FACTORY
// ═══════════════════════════════════════════
function mkBall(def, x, y) {
  const st=def.stats;
  const maxHp=S.maxHp(st.might);
  const cdM=S.cdMult(st.knowledge);
  const spd=S.ballSpd(st.strength);
  const angle=Math.random()*Math.PI*2;
  const skills=def.skills.map(s=>({...s, effectiveCd:s.baseCd*cdM}));
  const skillCDs={};
  skills.forEach(s=>{skillCDs[s.id]=0;});
  return {
    id:def.id, name:def.name, color:def.color, glow:def.glow,
    weapon: def.weapon,
    stats:st,
    x, y,
    vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
    baseSpd:spd,
    radius:BALL_R,
    hp:maxHp, maxHp,
    mana:MAX_MANA, maxMana:MAX_MANA,
    manaRegen:S.manaRegen(st.knowledge),
    alive:true,
    skills, skillCDs,
    aiTimer:0,
    dodgeCooldown:0,
    pulse:Math.random()*Math.PI*2,
    scale:1, scaleTimer:0,
    hitFlash:0,
    hitTint:0,     // 0→1 red tint, decays over 0.6s
    buffs:[],
    portalCd:0,
    lastSkillTime:-99,
    enhanceCd:0,       // cooldown to prevent speed-buff stacking
    weaponCd:0,         // weapon attack cooldown
    weaponAngle:0,      // angle pointing toward enemy
    weaponRange: def.weapon.range || 30, // melee range from edge of ball
    swingTilt:0,        // weapon tilt animation (0=rest, up to PI/2 at full charge)
    swingTimer:0,       // timer for swing animation
    isSwinging:false,   // currently doing a swing
    pendingHit:false,   // 0.3s delayed hit in progress
    knockbackCount:0,   // remaining wall bounces from weapon knockback
    knockbackVelX:0, knockbackVelY:0, // stored knockback velocity for wall bounce
    dashTimer:0,        // dash animation timer
    isDashing:false,
    dashVx:0, dashVy:0, // dash direction
    dmgImmunity:0,      // invincibility frames after taking damage (0.5s)
  };
}

let activeDefs=[];
function launchGame() {
  ensureAudio();
  activeDefs=BALL_DEFS.filter(d=>selectedIds.has(d.id));
  showScreen('screen-game');
  resizeArena();
  initGame();
  startGame();
}
function replayGame() {
  document.getElementById('overlay').classList.remove('show');
  stopGame(); resizeArena(); initGame(); startGame();
}
function goBack() {
  stopGame();
  document.getElementById('overlay').classList.remove('show');
  showScreen('screen-select');
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function initGame() {
  particles=[]; floats=[]; portals=[]; projs=[]; shockwaves=[]; lightTrails=[]; weaponSwings=[]; knockbackGhosts=[]; royalHorses=[];
  hitStopTimer=0; hitStopFlash=0; critFlash=0;
  const n=activeDefs.length;
  const balls=activeDefs.map((def,i)=>{
    const angle=(i/n)*Math.PI*2;
    const cx=AW/2+Math.cos(angle)*(AW*0.28);
    const cy=AH/2+Math.sin(angle)*(AH*0.28);
    return mkBall(def,cx,cy);
  });
  GS={balls,time:0};
  buildFighterCards();
  document.getElementById('tb-status').textContent='⚔ Battle in progress';
  showBanner('wb', '— Choose your strategy!');
}
function startGame() { running=true; lastTs=performance.now(); raf=requestAnimationFrame(loop); }
function stopGame() { running=false; if(raf) cancelAnimationFrame(raf); }

function updateFighterCard(ball) {
  const card=document.getElementById('fc-'+ball.id);
  if(!card) return;
  if(!ball.alive) card.classList.add('dead'); else card.classList.remove('dead');
  const hpP=Math.max(0,(ball.hp/ball.maxHp)*100).toFixed(1);
  const mpP=Math.max(0,(ball.mana/ball.maxMana)*100).toFixed(1);
  const wcdLeft=ball.weaponCd||0;
  const wcdTotal=getWeaponCd(ball);
  const weaponReady=wcdLeft<=0;

  const skillPills=ball.skills.map(sk=>{
    const cd=ball.skillCDs[sk.id]||0;
    const cdP=(cd/sk.effectiveCd*100).toFixed(0);
    const isReady=cd<=0&&ball.mana>=sk.manaCost;
    // Short description shown in HUD (truncated version)
    const shortDesc = sk.desc || '';
    return `<div class="fc-skill-pill ${isReady?'ready':''}" title="${shortDesc}" style="cursor:help;">
      <span class="fc-skill-emoji">${sk.emoji}</span>

  }).join('');

  const statBadges=`
    <div class="fc-stat-badge">DEX<span>${ball.stats.dexterity}</span></div>
    <div class="fc-stat-badge">MGT<span>${ball.stats.might}</span></div>
    <div class="fc-stat-badge">STR<span>${ball.stats.strength}</span></div>
    <div class="fc-stat-badge">KNW<span>${ball.stats.knowledge}</span></div>
    <div class="fc-stat-badge">INT<span>${ball.stats.intelligence}</span></div>
    <div class="fc-weapon-cd ${weaponReady?'ready':''}">${ball.weapon.emoji} ${weaponReady?'READY':wcdLeft.toFixed(1)+'s'}</div>
    ${(ball.enhanceCd||0)>0?`<div class="fc-stat-badge" style="color:#f4a8c5;border-color:rgba(244,168,197,0.35);">✨ ${ball.enhanceCd.toFixed(1)}s</div>`:''}
  `;

  card.innerHTML=`
    <div class="fc-header">
      <div class="fc-dot" style="background:${ball.color}"></div>
      <div class="fc-name">${ball.name}</div>
      <div class="fc-weapon-icon">${ball.weapon.emoji}</div>
    </div>
    <div class="fc-bars">
      <div class="fc-bar-row">
        <span class="fc-bar-label">HP</span>

      </div>

        <span class="fc-bar-label">MP</span>
        <div class="fc-bar-track"><div class="fc-bar-fill mp-fill" style="width:${mpP}%"></div></div>
        <span class="fc-bar-val">${Math.floor(ball.mana)}/${ball.maxMana}</span>
      </div>
    </div>
    <div class="fc-stats">${statBadges}</div>
    <div style="font-size:7px;color:rgba(232,121,160,0.6);font-family:'Orbitron',monospace;letter-spacing:1px;text-transform:uppercase;margin:4px 0 2px;font-weight:700;">⚡ المهارات</div>

// Hit shards / blood — eject from BEHIND the target in the same direction as the hit
// hitDirX/Y = direction of incoming attack (from attacker toward target)
// Shards spray out the back: same direction, wide cone, long range
function spawnHitShards(ball, hitDirX, hitDirY) {
  const c = ball.color;
  const len = Math.sqrt(hitDirX*hitDirX + hitDirY*hitDirY)||1;
  // Forward = same as hit direction (out the back of the target)
  const fx = hitDirX/len, fy = hitDirY/len;
  const baseSpd = 420; // very fast = long range
  const n = 18;
  for(let i=0;i<n;i++){
    // Wide cone in the hit direction
    const spread = (Math.random()-0.5)*1.8;
    const cos=Math.cos(spread), sin2=Math.sin(spread);
    const dx = fx*cos - fy*sin2;
    const dy = fx*sin2 + fy*cos;
    const spd = baseSpd*(0.55+Math.random()*0.9);
    particles.push({
      x:ball.x, y:ball.y,
      vx:dx*spd, vy:dy*spd,
      color:c,
      life:0.75, maxLife:0.75,
      sz:4+Math.random()*6,
      star:false,
      glow:true
    });
  }
  // Bright white core streaks
  for(let i=0;i<7;i++){
    const spread=(Math.random()-0.5)*1.0;
    const cos=Math.cos(spread), sin2=Math.sin(spread);
    const dx2 = fx*cos - fy*sin2;
    const dy2 = fx*sin2 + fy*cos;
    const spd=baseSpd*1.4*(0.6+Math.random()*0.6);
    particles.push({
      x:ball.x, y:ball.y,
      vx:dx2*spd, vy:dy2*spd,
      color:'#ffffff',
      life:0.5, maxLife:0.5,
      sz:2+Math.random()*3,
      star:false, glow:true
    });
  }
}

function resolveWeaponHit(attacker, defender) {
  // Who hits whom: compare dexterity with 5% per point
  const dA=attacker.stats.dexterity, dD=defender.stats.dexterity;
  const diff=dA-dD;
  const attackerWinChance=0.5+diff*0.05;
  const attackerHits=Math.random()<attackerWinChance;

  if(attackerHits) {
    doWeaponStrike(attacker, defender);
  } else {
    // Defender successfully parries/counters — BLOCK SOUND + sparks
    SFX.block();
    const mx=(attacker.x+defender.x)/2, my=(attacker.y+defender.y)/2;
    // Metallic spark shower at clash point
    spawnBlockSparks(mx, my, attacker.color, defender.color);
    spawnShockwave(mx,my,'#ffffff',90,0.45);
    spawnShockwave(mx,my,'#f5c842',60,0.30);
    spawnFloat(mx,my-30,'🛡 BLOCK','#f5c842',14);
    doWeaponStrike(defender, attacker);
  }
}

function doWeaponStrike(striker, struck) {
  if(!striker.alive||!struck.alive) return;
  if((struck.dmgImmunity||0)>0) return; // immune — skip weapon hit
  SFX.weaponSwing();
  spawnWeaponSwing(striker, struck, striker.weapon.emoji);

  // Damage = strength of striker
  const rawDmg = striker.stats.strength;
  // Crit check
  let dmg=rawDmg, isCrit=false;
  if(Math.random()<S.critChance(striker.stats.dexterity)) {
    dmg=Math.round(dmg*S.critMult(striker.stats.dexterity));
    isCrit=true;
  }
  dmg=Math.max(1,Math.round(dmg));

  // Apply damage with flash
  struck.hp=Math.max(0,struck.hp-dmg);
  struck.hitFlash=0.25;
  struck.hitTint=1.0;
  struck.dmgImmunity=0.5; // 0.5s immunity
  triggerHitStop(isCrit?0.14:0.09, isCrit);
  SFX.weaponHit();

  setTimeout(()=>{
    // Shards fly away from striker direction
    const _sdx=struck.x-striker.x, _sdy=struck.y-striker.y;
    spawnHitShards(struck, _sdx, _sdy);
    if(isCrit){
      spawnFloat(struck.x,struck.y-36,`💥 ${dmg}`,  '#fde68a',22);
      SFX.crit();
      // BLOOD EXPLOSION — massive blood burst from struck ball
      const _sdx2=struck.x-striker.x, _sdy2=struck.y-striker.y;
      spawnCritBlood(struck, _sdx2, _sdy2);
      spawnParticles(struck.x,struck.y,struck.color,35,180,0.9,9,true);
      spawnParticles(struck.x,struck.y,'#ff0033',20,220,0.8,7,true);
      spawnShockwave(struck.x,struck.y,'#ff2244',140,0.70);
      spawnShockwave(struck.x,struck.y,'#fde68a',100,0.55);
      spawnShockwave(struck.x,struck.y,'#ffffff',70,0.38);
      spawnStars(struck.x,struck.y,28,['#fde68a','#ffffff','#ffb340','#ff4466']);
      triggerHitStop(0.22, true); // longer freeze for crit
    } else {
      spawnFloat(struck.x,struck.y-28,`⚔ -${dmg}`,'#ff7070',16);
      spawnParticles(struck.x,struck.y,struck.color,18,110,0.6,6,false);
      spawnShockwave(struck.x,struck.y,striker.color,80,0.45);
      spawnShockwave(struck.x,struck.y,'#ffffff',50,0.28);
    }
    // ── Knockback calculation
    let kbCount=striker.stats.strength-struck.stats.might;
    if(striker._powerCharged) { kbCount = kbCount*2; striker._powerCharged=false; striker._powerChargeTimer=0; spawnFloat(striker.x,striker.y-50,'💥×2 شحن!','#f5c842',16); }
    if(kbCount>0) {
      // Strong knockback — bounce between walls
      const nx=(struck.x-striker.x)||1, ny=(struck.y-striker.y)||0;
      const nlen=Math.sqrt(nx*nx+ny*ny)||1;
      const kbSpd=1000+kbCount*160;
      struck.vx=(nx/nlen)*kbSpd;
      struck.vy=(ny/nlen)*kbSpd;
      struck.knockbackCount=kbCount;
      // Mark as knockback mode — play slowmo entry sound
      SFX.knockbackSlow();
      spawnFloat(struck.x,struck.y-50,`💨 ×${kbCount}`,'#60aaff',14);
      spawnShockwave(struck.x,struck.y,'#60aaff',100,0.6);
    } else {
      // Weak knockback — just a little push
      const nx2=(struck.x-striker.x)||1, ny2=(struck.y-striker.y)||0;
      const nlen2=Math.sqrt(nx2*nx2+ny2*ny2)||1;
      struck.vx=(nx2/nlen2)*180;
      struck.vy=(ny2/nlen2)*180;
    }
    if(struck.hp<=0) killBall(struck);
    updateFighterCard(striker);
    updateFighterCard(struck);
  }, 80);

  // Set weapon cooldown for BOTH balls from this collision
  striker.weaponCd=getWeaponCd(striker);
  struck.weaponCd=getWeaponCd(struck);
}

function triggerHitStop(dur=0.10, isCrit=false) {
  hitStopTimer=Math.max(hitStopTimer, dur);
  hitStopFlash=1.0;
  if(isCrit) critFlash=1.0;
}

function dealDamage(ball, rawDmg, srcId, hitDirX=0, hitDirY=-1) {
  if(!ball.alive) return;
  if((ball.dmgImmunity||0)>0) return; // immune — skip
  const src=GS.balls.find(b=>b.id===srcId);
  let dmg=rawDmg;
  let isCrit=false;
  if(src&&Math.random()<S.critChance(src.stats.dexterity)){
    dmg=Math.round(dmg*S.critMult(src.stats.dexterity));
    isCrit=true;
  }
  ball.hp=Math.max(0,ball.hp-dmg);
  ball.hitFlash=0.22;
  ball.dmgImmunity=0.5; // 0.5s immunity after being hit
  triggerHitStop(isCrit?0.22:0.09, isCrit);
  // Shards fly in opposite direction of the hit
  spawnHitShards(ball, hitDirX, hitDirY);
  if(isCrit){
    SFX.crit();
    // BLOOD EXPLOSION for skill crits too
    spawnCritBlood(ball, hitDirX, hitDirY);
    spawnFloat(ball.x,ball.y-34,`💥 ${dmg}`,'#fde68a',22);
    spawnParticles(ball.x,ball.y,ball.color,32,165,0.9,8,true);
    spawnParticles(ball.x,ball.y,'#ff0033',16,200,0.75,6,true);
    spawnShockwave(ball.x,ball.y,'#ff2244',130,0.65);
    spawnShockwave(ball.x,ball.y,'#fde68a',95,0.50);
    spawnShockwave(ball.x,ball.y,'#ffffff',65,0.35);
    spawnStars(ball.x,ball.y,22,['#fde68a','#ffffff','#ffb340','#ff4466']);
    showBanner('crit');
  } else {
    SFX.hit();
    spawnFloat(ball.x,ball.y-24,`-${dmg}`,'#ff4466',15);
    spawnParticles(ball.x,ball.y,ball.color,16,100,0.55,5,true);
    spawnShockwave(ball.x,ball.y,ball.color,68,0.40);
    spawnShockwave(ball.x,ball.y,'#ffffff',40,0.24);
  }
  if(ball.hp<=0) killBall(ball);
}

function killBall(ball) {
  ball.alive=false; ball.hp=0;
  SFX.death(); SFX.kill();
  spawnParticles(ball.x,ball.y,ball.color,50,200,1.8,10,true);
  spawnParticles(ball.x,ball.y,'#ffffff',24,150,1.1,5,true);
  spawnStars(ball.x,ball.y,35);
  spawnShockwave(ball.x,ball.y,ball.color,160,0.9);
  spawnShockwave(ball.x,ball.y,'#ffffff',100,0.6);
  spawnFloat(ball.x,ball.y-40,'💀 KO','#fde68a',22);
  showBanner('kill', `— ${ball.name} has fallen in battle!`);
  updateFighterCard(ball);
  checkVictory();
}

function checkVictory() {
  const alive=GS.balls.filter(b=>b.alive);
  if(alive.length<=1){
    setTimeout(()=>{
      document.getElementById('ov-title').textContent=alive.length===1?`✨ ${alive[0].name} WINS!`:'DRAW!';
      document.getElementById('ov-sub').textContent='Battle over · Choose wisely';
      document.getElementById('overlay').classList.add('show');
      stopGame();
    },900);
  }
}

// ── Auto-enhance: fires for free on anything exiting a portal (wonder mage owners only) ──
// Max speed a ball can ever reach (prevents runaway stacking)
const MAX_BALL_SPD = BALL_SPD * 3.2;

function autoEnhanceOnPortal(tgt, portalOwnerId) {
  // Only trigger if the portal owner is a wonder-type ball
  const owner = GS.balls.find(b=>b.id===portalOwnerId && b.alive && (b.id==='wonder1'||b.id==='wonder2'));
  if(!owner) return;

  const isBall = !!tgt.hp;
  const isProj  = tgt.type==='wb';

  // ── Guard: never speed-buff a ball that is in knockback (speed already high)
  if(isBall && tgt.knockbackCount > 0) return;

  // ── Guard: per-target cooldown — prevents rapid stacking on the same target
  if(isBall && (tgt.enhanceCd||0) > 0) return;

  // ── Guard: portal owner themselves in knockback → skip all auto-enhance
  const ownerBall = GS.balls.find(b=>b.id===portalOwnerId);
  if(ownerBall && ownerBall.knockbackCount > 0) return;

  SFX.autoEnhance();
  const roll = Math.floor(Math.random()*4)+1;
  const isEnemy = isBall && tgt.id !== owner.id;
  const tx = tgt.x ?? owner.x;
  const ty = tgt.y ?? owner.y;

  spawnStars(tx, ty, 22);
  spawnShockwave(tx, ty, '#f4a8c5', 70, 0.5);

  switch(roll){
    case 1:
      if(isBall){
        if(tgt.id===owner.id){tgt.scale=Math.max(0.45,(tgt.scale||1)*0.55);tgt.scaleTimer=7;}
        else{tgt.scale=(tgt.scale||1)*1.85;tgt.scaleTimer=7;}
      } else if(isProj){tgt.scale=(tgt.scale||1)*2.2;}
      break;
    case 2:
      if(isBall){
        const cur=Math.sqrt(tgt.vx*tgt.vx+tgt.vy*tgt.vy)||1;
        const fac=isEnemy?0.55:1.55;
        const a=Math.atan2(tgt.vy,tgt.vx);
        // Cap the resulting speed so it never exceeds MAX_BALL_SPD
        const newSpd = Math.min(cur*fac, isEnemy ? cur : MAX_BALL_SPD);
        tgt.vx=Math.cos(a)*newSpd; tgt.vy=Math.sin(a)*newSpd;
        tgt.baseSpd=Math.min(newSpd, MAX_BALL_SPD);
        // Set cooldown so this ball can't be speed-buffed again for 6s (longer to prevent cascade)
        tgt.enhanceCd = 6.0;
      } else if(isProj){
        const s=Math.sqrt(tgt.vx*tgt.vx+tgt.vy*tgt.vy)*1.55;
        const a=Math.atan2(tgt.vy,tgt.vx);tgt.vx=Math.cos(a)*s;tgt.vy=Math.sin(a)*s;
      }
      break;
    case 3:
      if(isProj){tgt.dmg=Math.round(tgt.dmg*(isEnemy?0.5:1.55));}
      else if(isBall){tgt.buffs.push({type:'dmg',val:isEnemy?-2:2,dur:8});}
      break;
    case 4:
      if(isBall){tgt.mana=Math.min(tgt.maxMana,tgt.mana+15);}
      break;
  }
  spawnFloat(tx, ty-32, `✨ AUTO ${roll}`, '#f4a8c5', 14);
  showBanner('enh', `— شرارة تلقائية (${owner.name})`);
}

function castEnhance(owner) {
  SFX.enhance();
  const aliveBalls=GS.balls.filter(b=>b.alive);
  const aliveProjs=projs.filter(p=>p.alive&&p.type==='wb');
  const all=[...aliveBalls,...aliveProjs,...portals.filter(p=>p.alive)];
  if(!all.length) return;
  const tgt=all[Math.floor(Math.random()*all.length)];
  const roll=Math.floor(Math.random()*4)+1;
  const isBall=!!tgt.hp, isProj=tgt.type==='wb', isEnemy=isBall&&tgt.id!==owner.id;
  const tx=tgt.x??(tgt.g1?(tgt.g1.x+tgt.g2.x)/2:owner.x);
  const ty=tgt.y??(tgt.g1?(tgt.g1.y+tgt.g2.y)/2:owner.y);
  spawnStars(tx,ty,40); spawnShockwave(tx,ty,'#f4a8c5',90,0.6);
  switch(roll){
    case 1:
      if(isBall){if(tgt.id===owner.id){tgt.scale=Math.max(0.45,(tgt.scale||1)*0.55);tgt.scaleTimer=7;}else{tgt.scale=(tgt.scale||1)*1.85;tgt.scaleTimer=7;}}
      else if(isProj){tgt.scale=(tgt.scale||1)*2.2;}
      else if(tgt.g1){tgt.g1.r*=1.6;tgt.g2.r*=1.6;}
      break;
    case 2:
      if(isBall){
        // Skip if ball is in knockback (speed already high) or on cooldown
        if(tgt.knockbackCount>0 || (tgt.enhanceCd||0)>0) break;
        const cur=Math.sqrt(tgt.vx*tgt.vx+tgt.vy*tgt.vy)||1;
        const fac=isEnemy?0.55:1.55;
        const a=Math.atan2(tgt.vy,tgt.vx);
        const newSpd=Math.min(cur*fac, isEnemy ? cur : MAX_BALL_SPD);
        tgt.vx=Math.cos(a)*newSpd; tgt.vy=Math.sin(a)*newSpd;
        tgt.baseSpd=Math.min(newSpd, MAX_BALL_SPD);
        tgt.enhanceCd=6.0; // 6s cooldown before another speed buff
      }
      else if(isProj){const s=Math.sqrt(tgt.vx*tgt.vx+tgt.vy*tgt.vy)*1.55;const a=Math.atan2(tgt.vy,tgt.vx);tgt.vx=Math.cos(a)*s;tgt.vy=Math.sin(a)*s;}
      break;
    case 3:
      if(isProj){tgt.dmg=Math.round(tgt.dmg*(isEnemy?0.5:1.55));}
      else if(isBall){tgt.buffs.push({type:'dmg',val:isEnemy?-2:2,dur:8});}
      break;
    case 4:
      if(isBall){tgt.mana=Math.min(tgt.maxMana,tgt.mana+15);}
      else if(tgt.g1){owner.mana=Math.min(owner.maxMana,owner.mana+30);}
      break;
  }
  spawnFloat(tx,ty-28,`✨ ${roll}`,'#f4a8c5',16);
  showBanner('enh', `— ${owner.name}`);
}

function fireBow(owner, target) {
  if(!target.alive) return;
  SFX.bow();
  const spd=210, acc=S.aimAcc(owner.stats.intelligence);
  const {pvx,pvy}=predictAim(owner,target,spd,acc);
  projs.push({type:'arrow',x:owner.x,y:owner.y,vx:pvx,vy:pvy,r:5,alive:true,ownerId:owner.id,dmg:3+Math.round(owner.stats.dexterity*0.6),trail:[]});
  showBanner('bow', `— ${owner.name}`);
}

function predictAim(owner, target, spd, acc) {
  const dx=target.x-owner.x, dy=target.y-owner.y;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const t=dist/spd;
  const px=target.x+target.vx*t*acc+(Math.random()-.5)*(1-acc)*60;
  const py=target.y+target.vy*t*acc+(Math.random()-.5)*(1-acc)*60;
  const dx2=px-owner.x, dy2=py-owner.y;
  const d2=Math.sqrt(dx2*dx2+dy2*dy2)||1;
  return {pvx:(dx2/d2)*spd, pvy:(dy2/d2)*spd};
}

// ROYAL KNIGHT SKILLS
// ═══════════════════════════════════════════

// Active horses on battlefield
let royalHorses = [];

// ── spawnRoyalHorse: horse travels ONE fixed straight path, exits arena ──
function spawnRoyalHorse(owner) {
  const W = AW, H = AH;
  const margin = 30;

  // Pick a random ENTRY point on the arena edge
  const side = Math.floor(Math.random()*4); // 0=top,1=right,2=bottom,3=left
  let startX, startY, angle;
  if(side===0)      { startX=margin+Math.random()*(W-margin*2); startY=-30; angle=Math.PI*0.5+(Math.random()-0.5)*0.8; }
  else if(side===1) { startX=W+30; startY=margin+Math.random()*(H-margin*2); angle=Math.PI+(Math.random()-0.5)*0.8; }
  else if(side===2) { startX=margin+Math.random()*(W-margin*2); startY=H+30; angle=-Math.PI*0.5+(Math.random()-0.5)*0.8; }
  else              { startX=-30; startY=margin+Math.random()*(H-margin*2); angle=(Math.random()-0.5)*0.8; }

  const spd = 280;
  const horse = {
    x: startX, y: startY,
    vx: Math.cos(angle)*spd,
    vy: Math.sin(angle)*spd,
    angle: angle,           // fixed direction, never changes
    r: 48,                  // bigger than rider (rider r=22) so horse is clearly larger
    alive: true,
    ownerId: owner.id,
    mounted: false,
    rider: null,
    mountTimer: 0,
    exited: false,          // has left the arena
  };
  royalHorses.push(horse);
  spawnParticles(startX, startY, '#c8a432', 12, 120, 0.5, 6, true);
  spawnShockwave(startX, startY, '#ffe58a', 55, 0.4);
  spawnFloat(startX, startY+40, '🐴 صهيل!', '#ffe58a', 14);
  SFX.horseNeigh();
  showBanner('rk_summon_horse', `— ${owner.name}`);
}

function updateRoyalHorses(dt) {
  const W = AW, H = AH;
  for(let i = royalHorses.length-1; i>=0; i--) {
    const horse = royalHorses[i];
    if(!horse.alive) { royalHorses.splice(i,1); continue; }

    // ── Periodic hoofbeat timer ──
    if(horse.hoofTimer === undefined) horse.hoofTimer = 0.32;
    horse.hoofTimer -= dt;
    if(horse.hoofTimer <= 0) {
      SFX.hoofbeats();
      // Faster clops when mounted+charging, slower when unmounted
      horse.hoofTimer = horse.mounted ? 0.30 : 0.50;
    }

    if(horse.mounted) {
      // ── MOUNTED: rider sits on horse, horse charges toward enemy ──
      horse.mountTimer -= dt;
      const rider = horse.rider;
      if(!rider || !rider.alive || horse.mountTimer <= 0) {
        // Dismount
        horse.alive = false;
        if(rider) {
          rider.onHorse = false;
          rider.baseSpd = S.ballSpd(rider.stats.strength);
          normSpeed(rider);
        }
        continue;
      }
      // Sync rider position to horse
      rider.x = horse.x;
      rider.y = horse.y;
      rider.vx = horse.vx;
      rider.vy = horse.vy;

      // Move horse
      horse.x += horse.vx * dt;
      horse.y += horse.vy * dt;

      // Bounds check: bounce inside arena (keep horse visible for full 5s)
      const W=AW, H=AH;
      if(horse.x - horse.r < 0){ horse.x = horse.r; horse.vx = Math.abs(horse.vx); horse.angle = Math.atan2(horse.vy, horse.vx); }
      if(horse.x + horse.r > W){ horse.x = W - horse.r; horse.vx = -Math.abs(horse.vx); horse.angle = Math.atan2(horse.vy, horse.vx); }
      if(horse.y - horse.r < 0){ horse.y = horse.r; horse.vy = Math.abs(horse.vy); horse.angle = Math.atan2(horse.vy, horse.vx); }
      if(horse.y + horse.r > H){ horse.y = H - horse.r; horse.vy = -Math.abs(horse.vy); horse.angle = Math.atan2(horse.vy, horse.vx); }
      // Trail
      if(Math.random() < 0.5) spawnParticles(horse.x, horse.y, '#ffe58a', 3, 80, 0.25, 4, true);
      continue;
    }

    // ── UNMOUNTED: horse walks straight fixed path ──
    horse.x += horse.vx * dt;
    horse.y += horse.vy * dt;

    // Trail particles
    if(Math.random() < 0.25) spawnParticles(horse.x, horse.y, '#c8a432', 2, 40, 0.2, 3, false);

    // Exit arena → remove
    if(horse.x < -80 || horse.x > W+80 || horse.y < -80 || horse.y > H+80) {
      horse.alive = false;
      continue;
    }

    // Check if OWNER touches horse → mount
    for(const ball of GS.balls) {
      if(!ball.alive || ball.id !== horse.ownerId || ball.onHorse) continue;
      const dist = Math.hypot(ball.x - horse.x, ball.y - horse.y);
      if(dist < ball.radius + horse.r) {
        mountHorse(ball, horse);
        break;
      }
    }
  }
}

function mountHorse(rider, horse) {
  if(horse.mounted) return;
  horse.mounted = true;
  horse.rider = rider;
  horse.mountTimer = 5;
  rider.onHorse = true;
  rider._mountedHitDealt = false; // reset so charge can deal damage once

  const target = getNearestEnemy(rider);
  if(target) {
    const dx = target.x - horse.x, dy = target.y - horse.y;
    const dist = Math.sqrt(dx*dx+dy*dy)||1;
    const chargeSpd = 700;
    horse.vx = (dx/dist)*chargeSpd;
    horse.vy = (dy/dist)*chargeSpd;
    horse.angle = Math.atan2(dy, dx);
    rider.vx = horse.vx;
    rider.vy = horse.vy;
    rider.baseSpd = chargeSpd;

    SFX.chargeFanfare();
    SFX.hoofbeats();
    spawnShockwave(rider.x, rider.y, '#c8a432', 90, 0.5);
    spawnParticles(rider.x, rider.y, '#ffe58a', 18, 180, 0.45, 7, true);
    spawnFloat(rider.x, rider.y-40, '🏇 돌격!', '#f5c842', 18);
    showBanner('rk_mounted', `— ${rider.name}`);

    // After 0.7s: deal guaranteed crit if close enough
    setTimeout(() => {
      if(!rider.alive || !horse.alive) return;
      const nearEnemy = getNearestEnemy(rider);
      if(nearEnemy && nearEnemy.alive && Math.hypot(nearEnemy.x-rider.x, nearEnemy.y-rider.y) < 220) {
        doMountedCritStrike(rider, nearEnemy);
      }
    }, 700);
  }
}

function doMountedCritStrike(striker, struck) {
  if(!striker.alive || !struck.alive) return;
  // Guard: only deal damage once per charge (prevent multiple hits)
  if(striker._mountedHitDealt) return;
  striker._mountedHitDealt = true;
  // ── Damage: fixed 15, no multipliers ──
  const dmg = 15;

  SFX.crit();
  SFX.heavyHammer();
  spawnWeaponSwing(striker, struck, '🏇');
  struck.hp = Math.max(0, struck.hp - dmg);
  struck.hitFlash = 0.3;
  struck.hitTint = 1.0;
  struck.dmgImmunity = 0.5;
  triggerHitStop(0.18, true);

  spawnCritBlood(struck, struck.x-striker.x, struck.y-striker.y);
  spawnFloat(struck.x, struck.y-38, `🏇 ${dmg}`, '#f5c842', 20);
  spawnStars(struck.x, struck.y, 25, ['#f5c842','#ffffff','#ffe58a','#ff4466']);
  spawnShockwave(struck.x, struck.y, '#f5c842', 120, 0.6);

  // Knockback: normal weapon KB
  const kbCount = Math.max(0, striker.stats.strength - struck.stats.might);
  if(kbCount > 0) {
    const nx=(struck.x-striker.x)||1, ny=(struck.y-striker.y)||0;
    const nl=Math.sqrt(nx*nx+ny*ny)||1;
    struck.vx=(nx/nl)*(900+kbCount*150);
    struck.vy=(ny/nl)*(900+kbCount*150);
    struck.knockbackCount=kbCount;
    SFX.knockbackSlow();
    spawnFloat(struck.x, struck.y-55, `💨×${kbCount}`, '#60aaff', 14);
  }
  if(struck.hp<=0) killBall(struck);
  updateFighterCard(striker); updateFighterCard(struck);
}

function castPowerCharge(owner) {
  owner._powerCharged = true;
  owner._powerChargeTimer = 8;
  SFX.heavyHammer();
  spawnStars(owner.x, owner.y, 20, ['#f5c842','#ffffff','#c8a432','#ffe58a']);
  spawnShockwave(owner.x, owner.y, '#f5c842', 80, 0.45);
  spawnFloat(owner.x, owner.y-32, '💥 شحن!', '#f5c842', 16);
  showBanner('rk_power_charge', `— ${owner.name}`);
}

function castDashToHorse(owner) {
  let nearestHorse = null, nearestDist = Infinity;
  for(const h of royalHorses) {
    if(!h.alive || h.mounted) continue;
    const d = Math.hypot(h.x-owner.x, h.y-owner.y);
    if(d < nearestDist) { nearestDist=d; nearestHorse=h; }
  }
  if(!nearestHorse) {
    owner.mana = Math.min(owner.maxMana, owner.mana + 10);
    spawnFloat(owner.x, owner.y-28, 'لا حصان!', '#ff4466', 12);
    return;
  }
  const dx=nearestHorse.x-owner.x, dy=nearestHorse.y-owner.y;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const dashSpd=800;
  owner.isDashing=true;
  owner.dashTimer=Math.min(0.55, dist/dashSpd+0.12);
  owner.dashVx=(dx/dist)*dashSpd;
  owner.dashVy=(dy/dist)*dashSpd;
  owner.vx=owner.dashVx; owner.vy=owner.dashVy;
  owner.dodgeCooldown=0.3;
  SFX.dash();
  SFX.hoofbeats();
  spawnParticles(owner.x, owner.y, '#c8a432', 10, 140, 0.38, 5, true);
  spawnShockwave(owner.x, owner.y, '#ffe58a', 55, 0.3);
  showBanner('rk_dash_to_horse', `— ${owner.name}`);
}

// ── Draw all active horses ──
function drawRoyalHorses() {
  for(const horse of royalHorses) {
    if(!horse.alive) continue;

    ctx.save();
    // Rotate so horse faces the direction of travel
    const angle = horse.angle;
    ctx.translate(horse.x, horse.y);
    ctx.rotate(angle - Math.PI*0.5); // image faces up → rotate to travel angle

    // ── Horse size: MUCH bigger than rider ball (rider r=22, horse should be ~3× bigger)
    const s = horse.r * 4.2; // very large so rider clearly sits ON horse
    ctx.globalAlpha = 0.97;
    ctx.shadowColor = '#ffe58a';
    ctx.shadowBlur = 18;

    if(horse.mounted && horse.rider){
      // ── MOUNTED: draw horse FIRST (underneath), then rider on top ──
      const rider = horse.rider;
      const rr = rider.radius * (rider.scale||1);

      // 1) HORSE body — big, centered at origin (horse center)
      if(IMG_HORSE_ICON.complete && IMG_HORSE_ICON.naturalWidth>0){
        ctx.drawImage(IMG_HORSE_ICON, -s/2, -s/2, s, s);
      } else {
        ctx.font=`${s*0.55}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('🐴', 0, 0);
      }

      // 2) RIDER ball — drawn ON TOP of horse, positioned at the horse's back/saddle area
      // In local space (rotated to travel direction), rider sits above center of horse
      const riderOffsetY = -s * 0.28; // rider sits on the upper/back part of horse
      ctx.shadowBlur = 12;
      ctx.shadowColor = rider.color;

      const bodyG = ctx.createRadialGradient(
        -rr*0.3, riderOffsetY - rr*0.2, rr*0.05,
         0,       riderOffsetY,            rr
      );
      bodyG.addColorStop(0, lighten(rider.color, 70));
      bodyG.addColorStop(0.35, lighten(rider.color, 25));
      bodyG.addColorStop(0.72, rider.color);
      bodyG.addColorStop(1, darken(rider.color, 40));
      ctx.fillStyle = bodyG;
      ctx.beginPath();
      ctx.arc(0, riderOffsetY, rr, 0, Math.PI*2);
      ctx.fill();

      // Rider glow ring
      ctx.strokeStyle = lighten(rider.color, 30) + '88';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(0, riderOffsetY, rr, 0, Math.PI*2);
      ctx.stroke();

      // HP text on rider
      ctx.shadowBlur = 8;
      ctx.shadowColor = darken(rider.color, 20);
      ctx.fillStyle = 'rgba(255,255,255,0.96)';
      ctx.font = `bold ${Math.round(rr*0.65)}px Orbitron,monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(Math.ceil(rider.hp).toString(), 0, riderOffsetY - rr*0.10);

      // 3) Spear crest ABOVE rider (weapon pointing forward)
      ctx.shadowBlur = 0;
      if(IMG_SPEAR.complete && IMG_SPEAR.naturalWidth>0){
        const hs = rr * 3.8;
        ctx.drawImage(IMG_SPEAR, -hs/2, riderOffsetY - rr*0.9 - hs, hs, hs);
      }

      // 4) Sword to the side of rider
      if(IMG_SWORD.complete && IMG_SWORD.naturalWidth>0){
        const ws = rr * 2.0;
        ctx.save();
        ctx.translate(rr*0.7, riderOffsetY);
        ctx.rotate(Math.PI*0.3);
        ctx.drawImage(IMG_SWORD, -ws/2, -ws*0.8, ws, ws);
        ctx.restore();
      }
    } else {
      // ── UNMOUNTED: just the horse, galloping ──
      if(IMG_HORSE_ICON.complete && IMG_HORSE_ICON.naturalWidth>0){
        ctx.drawImage(IMG_HORSE_ICON, -s/2, -s/2, s, s);
      } else {
        ctx.font=`${s*0.55}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('🐴', 0, 0);
      }
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}


// ═══════════════════════════════════════════
// AI
// ═══════════════════════════════════════════
function getNearestEnemy(ball) {
  let best=null, bestD=Infinity;
  for(const b of GS.balls){
    if(!b.alive||b.id===ball.id) continue;
    const d=Math.hypot(b.x-ball.x,b.y-ball.y);
    if(d<bestD){bestD=d;best=b;}
  }
  return best;
}

function aiTick(ball, dt) {
  if(!ball.alive) return;
  // During knockback: AI is completely frozen — no velocity changes allowed
  if(ball.knockbackCount>0) return;
  ball.aiTimer-=dt;
  ball.dodgeCooldown=Math.max(0,ball.dodgeCooldown-dt);

  const target=getNearestEnemy(ball);
  if(!target) return;

  // Update weapon angle toward enemy
  ball.weaponAngle=Math.atan2(target.y-ball.y, target.x-ball.x);

  // DASH DODGE: intelligence-based — dash away from strong enemies
  if(ball.dodgeCooldown<=0 && !ball.isDashing && ball.knockbackCount<=0) {
    const dodgeChance=S.dodgeChance(ball.stats.intelligence);
    // Check if a hostile projectile is incoming
    for(const p of projs){
      if(!p.alive||p.ownerId===ball.id) continue;
      const dx=ball.x-p.x, dy=ball.y-p.y;
      const dist=Math.sqrt(dx*dx+dy*dy)||1;
      if(dist<150){
        const pspd=Math.sqrt(p.vx*p.vx+p.vy*p.vy)||1;
        const dot=(p.vx*(-dx)+p.vy*(-dy))/(pspd*dist);
        if(dot>0.35&&Math.random()<dodgeChance){
          // Dash perpendicular away
          const perp={x:-p.vy/pspd, y:p.vx/pspd};
          const side=(Math.random()<0.5)?1:-1;
          const dashSpd=ball.baseSpd*2.2;
          ball.isDashing=true;
          ball.dashTimer=0.22;
          ball.dashVx=perp.x*side*dashSpd;
          ball.dashVy=perp.y*side*dashSpd;
          ball.vx=ball.dashVx; ball.vy=ball.dashVy;
          ball.dodgeCooldown=0.6;
          SFX.dash();
          spawnParticles(ball.x,ball.y,ball.color,8,100,0.35,4,true);
          showBanner('dodge', `— ${ball.name}`);
          break;
        }
      }
    }
    // Also dodge strong enemies approaching
    if(!ball.isDashing && target.stats.strength > ball.stats.strength) {
      const distToEnemy=Math.hypot(target.x-ball.x,target.y-ball.y);
      if(distToEnemy<(BALL_R*2+30)&&Math.random()<dodgeChance*0.4){
        const awayAngle=Math.atan2(ball.y-target.y,ball.x-target.x);
        const dashSpd=ball.baseSpd*1.8;
        ball.isDashing=true;
        ball.dashTimer=0.18;
        ball.dashVx=Math.cos(awayAngle)*dashSpd;
        ball.dashVy=Math.sin(awayAngle)*dashSpd;
        ball.vx=ball.dashVx; ball.vy=ball.dashVy;
        ball.dodgeCooldown=0.5;
        SFX.dash();
        spawnParticles(ball.x,ball.y,ball.color,6,80,0.28,3.5,true);
      }
    }
  }

  // Handle dash timer
  if(ball.isDashing){
    ball.dashTimer-=dt;
    if(ball.dashTimer<=0){
      ball.isDashing=false;
      normSpeed(ball);
    }
  }

  if(ball.aiTimer<=0){
    ball.aiTimer=0.1+Math.random()*0.12;
    skillAI(ball,target);
  }
}

function skillAI(ball, target) {
  const t=GS.time;
  if(t<10&&(t-(ball.lastSkillTime||0))<2) return;

  const dist=Math.hypot(target.x-ball.x,target.y-ball.y);

  // Find the most expensive skill this ball has (highest manaCost)
  const highestCostSk = ball.skills.reduce((a,b)=>b.manaCost>a.manaCost?b:a, ball.skills[0]);
  const highestCost = highestCostSk ? highestCostSk.manaCost : 0;

  // Check if the highest-cost skill is available now or almost ready
  const bestCd = ball.skillCDs[highestCostSk.id]||0;
  const bestReady = bestCd<=0 && ball.mana>=highestCost;
  // If we have enough mana for the big skill OR it's on cooldown but we're saving up, hold off spending on cheaper ones
  const saving = !bestReady && ball.mana >= highestCost * 0.65 && bestCd<=0;
  // Also save if we're close to affording the big skill (within 10 mana) and cd is off
  const nearlyAffordBig = !bestReady && (ball.mana >= highestCost - 10) && bestCd<=0;

  // Build priority-sorted skill list: highest manaCost first
  const sortedSkills = [...ball.skills].sort((a,b)=>b.manaCost-a.manaCost);

  for(const sk of sortedSkills){
    const cd=ball.skillCDs[sk.id]||0;
    if(cd>0||ball.mana<sk.manaCost) continue;

    // If this is NOT the highest-cost skill, skip it while saving for the big one
    const isHighest = sk.manaCost===highestCost;
    if(!isHighest && (saving || nearlyAffordBig)) continue;

    // Skill-specific conditions
    if(sk.id==='wb'&&dist<380){
      ball.mana-=sk.manaCost;ball.skillCDs[sk.id]=sk.effectiveCd;ball.lastSkillTime=t;fireWonderBall(ball,target);return;
    } else if(sk.id==='port'&&portals.filter(p=>p.alive).length<2&&Math.random()<0.38){
      ball.mana-=sk.manaCost;ball.skillCDs[sk.id]=sk.effectiveCd;ball.lastSkillTime=t;firePortal(ball);return;
    } else if(sk.id==='enh'&&Math.random()<0.52){
      ball.mana-=sk.manaCost;ball.skillCDs[sk.id]=sk.effectiveCd;ball.lastSkillTime=t;castEnhance(ball);return;
    } else if(sk.id==='bow'&&dist<340){
      ball.mana-=sk.manaCost;ball.skillCDs[sk.id]=sk.effectiveCd;ball.lastSkillTime=t;fireBow(ball,target);return;
    } else if(sk.id==='rk_summon_horse') {
      ball.mana-=sk.manaCost;ball.skillCDs[sk.id]=sk.effectiveCd;ball.lastSkillTime=t;spawnRoyalHorse(ball);return;
    } else if(sk.id==='rk_power_charge'&&dist<300) {
      ball.mana-=sk.manaCost;ball.skillCDs[sk.id]=sk.effectiveCd;ball.lastSkillTime=t;castPowerCharge(ball);return;
    } else if(sk.id==='rk_dash_to_horse'&&royalHorses.some(h=>h.alive&&!h.mounted)) {
      ball.mana-=sk.manaCost;ball.skillCDs[sk.id]=sk.effectiveCd;ball.lastSkillTime=t;castDashToHorse(ball);return;
    }
  }
}

function normSpeed(ball) {
  const spd=ball.isDashing?(ball.baseSpd*2):ball.baseSpd||BALL_SPD;
  const s=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy)||1;
  ball.vx=(ball.vx/s)*spd; ball.vy=(ball.vy/s)*spd;
}

// ═══════════════════════════════════════════
// PHYSICS UPDATE
// ═══════════════════════════════════════════
// slowDt = slowed dt for non-knockback balls (knockback slow-mo + proximity slow)
// rawDt  = real elapsed time for knockback balls themselves (they move at full speed)
// anyKnockback = whether any ball is currently in knockback
// proximityFactor = 0.5..1.0 from proximity check
function updateBalls(slowDt, rawDt, anyKnockback, proximityFactor) {
  // dt for normal (non-knockback) ball movement
  const normalMoveDt = slowDt;
  const W=AW, H=AH;
  for(const ball of GS.balls){
    if(!ball.alive) continue;

    // Knockback ball uses rawDt for its own movement;
    // all other per-ball timers (mana, CD, etc.) use slowDt
    const isKB = ball.knockbackCount > 0;
    const ballMoveDt = isKB ? rawDt : normalMoveDt;
    const timerDt = slowDt; // cooldowns/mana tick at slowed rate for non-KB, KB balls also slowed on timers

    ball.pulse+=rawDt*1.8; // pulse always real-time (visual)
    ball.hitFlash=Math.max(0,ball.hitFlash-rawDt); // visual — real-time
    ball.hitTint=Math.max(0,(ball.hitTint||0)-rawDt*1.65); // 0.6s red fade
    ball.enhanceCd=Math.max(0,(ball.enhanceCd||0)-timerDt);
    if(ball._powerChargeTimer) ball._powerChargeTimer=Math.max(0,ball._powerChargeTimer-timerDt);
    if(ball._powerChargeTimer<=0) ball._powerCharged=false;
    ball.dmgImmunity=Math.max(0,(ball.dmgImmunity||0)-timerDt);
    // During knockback, always maintain dmgImmunity so nothing can interrupt it
    if(isKB) ball.dmgImmunity=Math.max(ball.dmgImmunity, 0.1);
    ball.mana=Math.min(ball.maxMana,ball.mana+ball.manaRegen*timerDt);
    ball.portalCd=Math.max(0,(ball.portalCd||0)-timerDt);
    ball.weaponCd=Math.max(0,(ball.weaponCd||0)-timerDt);
    if(ball.swingTimer>0){ ball.swingTimer-=timerDt; if(ball.swingTimer<=0){ball.isSwinging=false;ball.swingTilt=0;ball.swingTimer=0;} }
    for(const sk of ball.skills) if(ball.skillCDs[sk.id]>0) ball.skillCDs[sk.id]=Math.max(0,ball.skillCDs[sk.id]-timerDt);
    if(ball.buffs) ball.buffs=ball.buffs.filter(b=>{b.dur-=timerDt;return b.dur>0;});
    if(ball.scaleTimer>0){ball.scaleTimer-=timerDt;if(ball.scaleTimer<=0)ball.scale=1;}

    // Handle weapon knockback wall bouncing — knockback ball moves at FULL rawDt speed
    if(isKB){
      // Move first at full real-time speed
      ball.x+=ball.vx*rawDt;
      ball.y+=ball.vy*rawDt;

      // ── KNOCKBACK GHOST TRAIL: spawn foggy afterimage every few ms
      if(!ball._ghostTimer) ball._ghostTimer=0;
      ball._ghostTimer-=rawDt;
      if(ball._ghostTimer<=0){
        ball._ghostTimer=0.035; // spawn ghost every 35ms
        knockbackGhosts.push({
          x: ball.x, y: ball.y,
          r: ball.radius*(ball.scale||1),
          color: ball.color,
          life: 0.55, maxLife: 0.55,
          inKB: true, // still fading while alive
        });
      }
      const r=ball.radius*(ball.scale||1);
      let bouncedX=false, bouncedY=false;
      if(ball.x-r<0){ball.x=r;ball.vx=Math.abs(ball.vx);bouncedX=true;}
      if(ball.x+r>W){ball.x=W-r;ball.vx=-Math.abs(ball.vx);bouncedX=true;}
      if(ball.y-r<0){ball.y=r;ball.vy=Math.abs(ball.vy);bouncedY=true;}
      if(ball.y+r>H){ball.y=H-r;ball.vy=-Math.abs(ball.vy);bouncedY=true;}
      // Count corner hit as ONE bounce (not two), so knockback lasts full intended bounces
      if(bouncedX || bouncedY){
        ball.knockbackCount--;
        if(ball.knockbackCount<=0) ball._ghostTimer=0; // reset ghost timer when KB ends
        SFX.wallBounce();
        spawnWallBounceEffect(ball.x,ball.y,ball.color);
        // Wall bounces deal 1 damage — each impact hurts slightly
        const wallDmg = 1;
        ball.hp = Math.max(0, ball.hp - wallDmg);
        ball.hitFlash=0.3; ball.hitTint=0.8;
        spawnFloat(ball.x,ball.y-32,`💨 -${wallDmg}`,'#60aaff',14);
        showBanner('knockback_wall');
        if(ball.hp<=0){killBall(ball);continue;}
      }
    } else {
      // Normal movement — use slowed dt (proximity + knockback slow-mo)
      if(!ball.isDashing) normSpeed(ball);
      ball.x+=ball.vx*normalMoveDt;
      ball.y+=ball.vy*normalMoveDt;
      const r=ball.radius*(ball.scale||1);
      if(ball.x-r<0){ball.x=r;ball.vx=Math.abs(ball.vx);SFX.bounce();normSpeed(ball);}
      if(ball.x+r>W){ball.x=W-r;ball.vx=-Math.abs(ball.vx);SFX.bounce();normSpeed(ball);}
      if(ball.y-r<0){ball.y=r;ball.vy=Math.abs(ball.vy);SFX.bounce();normSpeed(ball);}
      if(ball.y+r>H){ball.y=H-r;ball.vy=-Math.abs(ball.vy);SFX.bounce();normSpeed(ball);}
    }

    // Portal travel
    if(ball.portalCd<=0){
      for(const portal of portals){
        if(!portal.alive) continue;
        for(const [gIn,gOut] of [[portal.g1,portal.g2],[portal.g2,portal.g1]]){
          const d=Math.hypot(ball.x-gIn.x,ball.y-gIn.y);
          if(d<gIn.r*0.82){
            SFX.teleport();
            spawnParticles(ball.x,ball.y,'#ff8fc8',18,100,0.7,5,true);
            ball.x=gOut.x; ball.y=gOut.y;
            spawnParticles(ball.x,ball.y,'#ff8fc8',18,100,0.7,5,true);
            spawnShockwave(ball.x,ball.y,'#ff8fc8',70,0.5);
            spawnFloat(ball.x,ball.y-32,'✦ WARP','#f4a8c5',13);
            ball.portalCd=1.5;
            showBanner('portal_travel', `— ${ball.name}`);
            // Auto-enhance: wonder mage portals buff/debuff whatever exits
            autoEnhanceOnPortal(ball, portal.ownerId);
            break;
          } else if(d<gIn.r*1.5 && ball.id!==portal.ownerId && ball.knockbackCount<=0 && (ball.portalCd||0)<=0){
            // ── PORTAL AURA REPULSION: enemy balls near portal edge get pushed away ──
            // This gives the wonder witch portals physical presence / knockback aura
            const nx=(ball.x-gIn.x)/d||1, ny=(ball.y-gIn.y)/d||0;
            const repulse=Math.max(0,(gIn.r*1.5-d)/(gIn.r*0.7)); // 0=edge, 1=at portal center
            if(repulse>0.15){
              ball.vx+=nx*repulse*180;
              ball.vy+=ny*repulse*180;
              spawnParticles(ball.x,ball.y,'#ff8fc8',3,60,0.25,3,true);
            }
          }
        }
      }
    }
  }

  // Ball-ball collision: WEAPON ATTACK SYSTEM (no paralysis)
  const balls=GS.balls.filter(b=>b.alive);
  for(let i=0;i<balls.length;i++){
    for(let j=i+1;j<balls.length;j++){
      const a=balls[i], b=balls[j];
      const dx=b.x-a.x, dy=b.y-a.y;
      const dist=Math.sqrt(dx*dx+dy*dy)||1;
      const ra=a.radius*(a.scale||1), rb=b.radius*(b.scale||1);
      const minD=ra+rb;
      // Weapon attack range: ball radii + max of the two weapon ranges
      const attackRange=minD+Math.max(a.weaponRange||30, b.weaponRange||30);
      const aKB = a.knockbackCount>0;
      const bKB = b.knockbackCount>0;

      // ── Swing tilt: weapon tilts toward enemy as they approach ──
      if(!aKB && dist<attackRange*1.4){
        const closeness=Math.max(0,1-(dist-minD)/(attackRange*1.4-minD));
        // charge angle: tilt weapon back (opposite of attack dir) as closeness increases
        a.swingTilt=closeness*(Math.PI*0.45);
      } else if(!aKB){
        a.swingTilt=Math.max(0,a.swingTilt-normalMoveDt*4);
      }
      if(!bKB && dist<attackRange*1.4){
        const closeness=Math.max(0,1-(dist-minD)/(attackRange*1.4-minD));
        b.swingTilt=closeness*(Math.PI*0.45);
      } else if(!bKB){
        b.swingTilt=Math.max(0,b.swingTilt-normalMoveDt*4);
      }

      if(dist<minD){
        const nx=dx/dist, ny=dy/dist;

        // If EITHER ball is in knockback → that ball is UNTOUCHABLE
        if(!aKB && !bKB){
          // Normal collision: separate both
          const overlap=(minD-dist)/2;
          a.x-=nx*overlap*1.5; a.y-=ny*overlap*1.5;
          b.x+=nx*overlap*1.5; b.y+=ny*overlap*1.5;

          // Weapon attack: 0.3s delay so long-range weapons don't dominate
          const aReady=a.weaponCd<=0;
          const bReady=b.weaponCd<=0;
          if((aReady||bReady) && !(a.pendingHit||b.pendingHit)){
            // Trigger swing animation immediately
            if(aReady){ a.isSwinging=true; a.swingTimer=0.30; SFX.weaponDraw(); }
            if(bReady){ b.isSwinging=true; b.swingTimer=0.30; SFX.weaponDraw(); }
            // Mark as pending so we don't double-trigger
            a.pendingHit=true; b.pendingHit=true;
            const snapA={x:a.x,y:a.y}, snapB={x:b.x,y:b.y};
            setTimeout(()=>{
              if(a.alive&&b.alive&&a.pendingHit){
                resolveWeaponHit(a,b);
              }
              a.pendingHit=false; b.pendingHit=false;
            }, 300);
          }

          // Visual collision effect
          spawnShockwave((a.x+b.x)/2,(a.y+b.y)/2,'#ffffff',90,0.45);
          spawnShockwave((a.x+b.x)/2,(a.y+b.y)/2,a.color,60,0.35);
          SFX.knockback();

          // Light trails
          for(let t=0;t<10;t++){
            const frac=t/10;
            lightTrails.push({x:a.x+nx*frac*55,y:a.y+ny*frac*55,life:0.5,maxLife:0.5,sz:4+frac*7,color:a.color,offsetT:frac});
            lightTrails.push({x:b.x-nx*frac*55,y:b.y-ny*frac*55,life:0.5,maxLife:0.5,sz:4+frac*7,color:b.color,offsetT:frac});
          }

          // Velocity exchange
          const aVn=a.vx*nx+a.vy*ny;
          const bVn=b.vx*nx+b.vy*ny;
          a.vx+=(-aVn+bVn)*nx; a.vy+=(-aVn+bVn)*ny;
          b.vx+=(-bVn+aVn)*nx; b.vy+=(-bVn+aVn)*ny;
          normSpeed(a); normSpeed(b);

        } else {
          // At least one ball is in knockback — ghost pass-through
          // The non-knockback ball gets slightly pushed, the knockback ball is unaffected
          if(!aKB){ a.x-=nx*((minD-dist)/2)*0.8; a.y-=ny*((minD-dist)/2)*0.8; }
          if(!bKB){ b.x+=nx*((minD-dist)/2)*0.8; b.y+=ny*((minD-dist)/2)*0.8; }
          // Small visual spark so it doesn't look invisible
          spawnParticles((a.x+b.x)/2,(a.y+b.y)/2,'#ffffff',4,60,0.2,2,false);
        }
      } else if(dist<attackRange && !aKB && !bKB){
        // Within weapon range but not physically touching — weapon attack only
        const aReady=a.weaponCd<=0;
        const bReady=b.weaponCd<=0;
        if((aReady||bReady) && !(a.pendingHit||b.pendingHit)){
          if(aReady){ a.isSwinging=true; a.swingTimer=0.30; SFX.weaponDraw(); }
          if(bReady){ b.isSwinging=true; b.swingTimer=0.30; SFX.weaponDraw(); }
          a.pendingHit=true; b.pendingHit=true;
          setTimeout(()=>{
            if(a.alive&&b.alive&&a.pendingHit){
              resolveWeaponHit(a,b);
            }
            a.pendingHit=false; b.pendingHit=false;
          }, 300);
        }
      }
    }
  }
}

function updateProjs(dt) {
  const W=AW, H=AH;
  for(const p of projs){
    if(!p.alive) continue;
    if(!p.trail) p.trail=[];
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>18) p.trail.shift();
    if(p.angle!==undefined) p.angle+=dt*5;
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    if(p.type==='wb'){
      const pr=p.r*(p.scale||1);
      let wb=false;
      if(p.x-pr<0){p.x=pr;p.vx=Math.abs(p.vx);wb=true;}
      if(p.x+pr>W){p.x=W-pr;p.vx=-Math.abs(p.vx);wb=true;}
      if(p.y-pr<0){p.y=pr;p.vy=Math.abs(p.vy);wb=true;}
      if(p.y+pr>H){p.y=H-pr;p.vy=-Math.abs(p.vy);wb=true;}
      if(wb){p.bounces--;p.needsRealBounce=false;SFX.bounce();spawnParticles(p.x,p.y,p.ownerColor||'#e879a0',14,100,0.5,5,true);spawnShockwave(p.x,p.y,p.ownerColor||'#e879a0',50,0.3);if(p.bounces<0){p.alive=false;continue;}}
      // Portal interaction for all projectiles (no position restriction)
      if(!p.portalCd || p.portalCd<=0){
        for(const portal of portals){
          if(!portal.alive) continue;
          for(const [gIn,gOut] of [[portal.g1,portal.g2],[portal.g2,portal.g1]]){
            const d=Math.hypot(p.x-gIn.x,p.y-gIn.y);
            if(d<gIn.r*0.88){
              SFX.teleport();
              spawnParticles(gIn.x,gIn.y,'#ff8fc8',14,80,0.55,4,true);
              spawnShockwave(gIn.x,gIn.y,'#ff8fc8',50,0.3);
              p.x=gOut.x; p.y=gOut.y;
              spawnParticles(gOut.x,gOut.y,'#ff8fc8',14,80,0.55,4,true);
              spawnShockwave(gOut.x,gOut.y,'#ff8fc8',60,0.4);
              p.portalCd=0.8; // prevent immediate re-teleport
              p.needsRealBounce=true;
              // Auto-enhance: wonder mage portals enhance the projectile on exit
              autoEnhanceOnPortal(p, portal.ownerId);
              showBanner('portal_travel','— projectile teleported!');
              break;
            }
          }
          if(p.portalCd>0) break;
        }
      } else {
        p.portalCd-=dt;
      }
      for(const ball of GS.balls){
        if(!ball.alive||ball.id===p.ownerId) continue;
        const bR=ball.radius*(ball.scale||1),pR=p.r*(p.scale||1);
        const d=Math.hypot(ball.x-p.x,ball.y-p.y);
        if(d<bR+pR){
          // Deal damage but never interrupt an active knockback
          if(ball.knockbackCount<=0){
            dealDamage(ball,Math.round(p.dmg),p.ownerId,p.vx,p.vy);
            // ── Wonder Ball physical redirect: alter enemy movement direction, no wall-bounce knockback ──
            if(p.type==='wb' && ball.alive && ball.knockbackCount<=0){
              const owner=GS.balls.find(b=>b.id===p.ownerId);
              const kbStrength = owner ? (p.scale||1) * 1.1 : 1.0;
              const plen=Math.sqrt(p.vx*p.vx+p.vy*p.vy)||1;
              // Push speed: moderate, just enough to redirect/impede
              const pushSpd=200*kbStrength;
              // Blend current velocity with push direction (partial redirect)
              const blendFactor = 0.65;
              ball.vx = ball.vx*(1-blendFactor) + (p.vx/plen)*pushSpd*blendFactor;
              ball.vy = ball.vy*(1-blendFactor) + (p.vy/plen)*pushSpd*blendFactor;
              // NO knockbackCount — no wall bouncing, just a course change
              spawnFloat(ball.x,ball.y-38,'🔮 إعاقة!','#e879a0',13);
              SFX.knockback();
            }
          } else {
            // Ball in knockback — only deal damage if not immune (prevent rapid repeated hits)
            if((ball.dmgImmunity||0)<=0){
              ball.hp=Math.max(0,ball.hp-Math.round(p.dmg));
              ball.hitFlash=0.18; ball.hitTint=0.85;
              ball.dmgImmunity=0.45; // short immunity even in knockback
              spawnHitShards(ball,p.vx,p.vy);
              spawnFloat(ball.x,ball.y-22,`-${Math.round(p.dmg)}`,'#ff4466',13);
              if(ball.hp<=0){killBall(ball);}
            }
          }
          p.bounces--;p.needsRealBounce=false;
          spawnParticles(p.x,p.y,p.ownerColor||'#e879a0',18,110,0.65,6,true);
          spawnShockwave(p.x,p.y,p.ownerColor||'#e879a0',70,0.45);
          if(p.bounces<0){p.alive=false;break;}
          const nx2=(p.x-ball.x)/d||1,ny2=(p.y-ball.y)/d||0;
          const dot=p.vx*nx2+p.vy*ny2;
          p.vx-=2*dot*nx2;p.vy-=2*dot*ny2;
          const ov=bR+pR-d;p.x+=nx2*ov;p.y+=ny2*ov;break;
        }
      }
    } else {
      // Arrow type — also interacts with portals
      if(!p.portalCd || p.portalCd<=0){
        for(const portal of portals){
          if(!portal.alive) continue;
          for(const [gIn,gOut] of [[portal.g1,portal.g2],[portal.g2,portal.g1]]){
            const d=Math.hypot(p.x-gIn.x,p.y-gIn.y);
            if(d<gIn.r*0.88){
              SFX.teleport();
              spawnParticles(gIn.x,gIn.y,'#ff8fc8',10,70,0.5,3,true);
              p.x=gOut.x; p.y=gOut.y;
              spawnParticles(gOut.x,gOut.y,'#ff8fc8',10,70,0.5,3,true);
              spawnShockwave(gOut.x,gOut.y,'#ff8fc8',45,0.35);
              p.portalCd=0.8;
              // Auto-enhance on exit
              autoEnhanceOnPortal(p, portal.ownerId);
              break;
            }
          }
          if(p.portalCd>0) break;
        }
      } else { p.portalCd-=dt; }
      if(p.x<0||p.x>W||p.y<0||p.y>H){p.alive=false;continue;}
      for(const ball of GS.balls){
        if(!ball.alive||ball.id===p.ownerId) continue;
        const bR=ball.radius*(ball.scale||1);
        if(Math.hypot(ball.x-p.x,ball.y-p.y)<bR+p.r){dealDamage(ball,Math.round(p.dmg),p.ownerId,p.vx,p.vy);spawnParticles(p.x,p.y,'#b0bec5',10,80,0.45,3.5,false);p.alive=false;break;}
      }
    }
  }
  if(projs.length>80) projs=projs.filter(p=>p.alive);
}

function updatePortals(dt) {
  const W=AW, H=AH;
  for(const portal of portals){
    if(!portal.alive) continue;
    portal.dur-=dt; portal.angle+=dt*2.2;
    // Opening animation — counts down from 0.65 → 0
    if(portal.openAnim>0) portal.openAnim=Math.max(0,portal.openAnim-dt);
    // Closing animation — starts when dur<=2
    if(portal.dur<=2) portal.alpha=portal.dur/2;
    if(portal.dur<=0){portal.alive=false;continue;}
    for(const gate of [portal.g1,portal.g2]){
      gate.x+=gate.vx*dt; gate.y+=gate.vy*dt;
      if(gate.x-gate.r<0){gate.x=gate.r;gate.vx=Math.abs(gate.vx);}
      if(gate.x+gate.r>W){gate.x=W-gate.r;gate.vx=-Math.abs(gate.vx);}
      if(gate.y-gate.r<0){gate.y=gate.r;gate.vy=Math.abs(gate.vy);}
      if(gate.y+gate.r>H){gate.y=H-gate.r;gate.vy=-Math.abs(gate.vy);}
    }
  }
}
function updateParticles(dt) { for(const p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.87;p.vy*=0.87;p.vy+=28*dt;p.life-=dt;p.sz*=0.975;} particles=particles.filter(p=>p.life>0); }
function updateFloats(dt) { for(const f of floats){f.y+=f.vy*dt;f.vy*=0.96;f.life-=dt;} floats=floats.filter(f=>f.life>0); }
function updateShockwaves(dt) { for(const s of shockwaves){s.r+=(s.maxR-s.r)*dt*8;s.life-=dt;} shockwaves=shockwaves.filter(s=>s.life>0); }
function updateLightTrails(dt) { for(const t of lightTrails)t.life-=dt; lightTrails=lightTrails.filter(t=>t.life>0); }
function updateWeaponSwings(dt) { for(const w of weaponSwings) w.life-=dt; weaponSwings=weaponSwings.filter(w=>w.life>0); }
function updateKnockbackGhosts(dt) {
  for(const g of knockbackGhosts) g.life-=dt;
  knockbackGhosts=knockbackGhosts.filter(g=>g.life>0);
}
